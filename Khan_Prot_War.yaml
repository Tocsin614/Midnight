spec: 73
name: "Prot Warrior - Mountain Thane"
version: "1.5.5"
author: "Khan"
description: "Mountain Thane Protection Warrior | Midnight 12.0 | Full ST + AoE with Opener"

entry: main

config:

  # === ACTIVE MITIGATION ===
  shield_block_hp:
    label: "Shield Block HP %"
    type: slider
    min: 20
    max: 100
    default: 100

  ignore_pain_hp:
    label: "Ignore Pain HP %"
    type: slider
    min: 20
    max: 100
    default: 80

  impending_victory_hp:
    label: "Impending Victory HP %"
    type: slider
    min: 20
    max: 100
    default: 75

  use_impending_victory:
    label: "Auto Impending Victory"
    type: checkbox
    default: true

  rage_dump_threshold:
    label: "Rage Dump Threshold"
    type: slider
    min: 60
    max: 95
    default: 80

  shield_wall_hp:
    label: "Shield Wall HP %"
    type: slider
    min: 10
    max: 60
    default: 30

  auto_defensives:
    label: "Auto Defensives"
    type: checkbox
    default: true

  aoe_threshold:
    label: "AoE Target Count"
    type: slider
    min: 2
    max: 5
    default: 2

  use_execute:
    label: "Use Execute"
    type: checkbox
    default: true

  sync_cds_with_burst:
    label: "Sync CDs with Burst Window"
    type: checkbox
    default: true

  use_potion:
    label: "Use Combat Potion"
    type: checkbox
    default: false

variables:

  # === COMBAT STATE ===
  avatar_up: buff.avatar.up
  demo_shout_up: buff.demoralizing_shout.up
  shield_block_up: buff.shield_block.up
  burst_of_power: buff.burst_of_power.up
  burst_window: buff.avatar.up|buff.demoralizing_shout.up

  # === MOUNTAIN THANE: THUNDER BLAST ===
  # Stacks to 2 — consume before Avatar (Avatar of the Storm grants 2 fresh stacks)
  thunder_blast_up: buff.thunder_blast.stack>=1
  thunder_blast_capped: buff.thunder_blast.stack>=2

  # === AoE MODE ===
  in_aoe: active_enemies>=config.aoe_threshold&state.aoe

  # === RAGE MANAGEMENT ===
  # Prevent rage overcap — Ignore Pain dumps rage to stay below cap
  rage_overcap: rage>=config.rage_dump_threshold
  rage_safe_to_spend: rage>=30&!var.rage_overcap

  # === HEALTH / EXECUTE ===
  health_critical: health.pct<20
  # Massacre talent = 35% threshold (raid/delve), default = 20% (M+)
  execute_phase: (talent.massacre.enabled&target.health.pct<35)|target.health.pct<20

lists:

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target

    # Battle Shout — maintain buff, refresh before it drops (.any = any warrior in group)
    - battle_shout,range_check=none,if=!buff.battle_shout.up.any|buff.battle_shout.remains.any<60

    # Combat Check
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&target.targeting_party&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)

    - call_action_list,name=auto_heal

    # Interrupts
    - pummel,if=interrupt.target.check
    - pummel.mouseover,if=interrupt.mouseover.check
    - pummel.focus,if=interrupt.focus.check
    # CC Interrupt
    - storm_bolt,if=interrupt.cc.check
    # AoE Interrupt
    - shockwave,if=incoming_cast.8y.kickable.count>=2|incoming_cast.8y.stunnable.count>=2
    - intimidating_shout,if=incoming_cast.8y.kickable.count>=2|incoming_cast.8y.stunnable.count>=2

    # Target Check
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)
    - ravager,if=!player.combat&!player.mounted&target.exists&target.enemy&target.range<=40&cooldown.ravager.ready

    # Rage overcap safety — fires before everything
    - ignore_pain.player,range_check=none,if=player.combat&var.rage_overcap

    - call_action_list,name=opener,if=player.combat&player.combat.time<=10
    - call_action_list,name=defensives,if=player.combat&config.auto_defensives
    - call_action_list,name=active_mitigation,if=player.combat
    - call_action_list,name=cooldowns,if=player.combat&state.cds

    - blood_fury,if=player.combat&var.burst_window
    - berserking,if=player.combat&var.burst_window
    - fireblood,if=player.combat&var.burst_window
    - ancestral_call,if=player.combat&var.burst_window
    - bag_of_tricks,if=player.combat
    - lights_judgment,if=player.combat

    - run_action_list,name=aoe_rotation,if=player.combat&var.in_aoe
    - run_action_list,name=st_rotation,if=player.combat

  opener:
    - avatar,if=cooldown.avatar.ready&player.combat.time<=2
    - shield_block,if=!var.shield_block_up&cooldown.shield_block.ready
    - shield_slam,if=cooldown.shield_slam.ready&player.combat.time<=4
    - demoralizing_shout,if=!var.demo_shout_up&cooldown.demoralizing_shout.ready
    - thunder_blast,if=var.thunder_blast_up
    - shield_charge,if=cooldown.shield_charge.ready
    - revenge,if=buff.revenge.up|rage>=30

  cooldowns:
    # Consume Thunder Blasts before Avatar — Avatar grants 2 fresh stacks on cast
    - thunder_blast,if=var.thunder_blast_capped&cooldown.avatar.ready
    - avatar,if=cooldown.avatar.ready
    - demoralizing_shout,if=cooldown.demoralizing_shout.ready&!var.demo_shout_up
    - ravager,if=cooldown.ravager.ready&(var.burst_window|!config.sync_cds_with_burst)
    - shield_charge,if=cooldown.shield_charge.ready&(var.burst_window|!config.sync_cds_with_burst)
    - trinket_1,if=trinket_1.sync
    - trinket_2,if=trinket_2.sync
    - combat_potion,if=config.use_potion&(buff.bloodlust.react|var.avatar_up)

  active_mitigation:
    - impending_victory,if=config.use_impending_victory&health.pct<config.impending_victory_hp&target.valid
    - ignore_pain.player,range_check=none,if=var.rage_overcap
    - ignore_pain.player,range_check=none,if=health.pct<config.ignore_pain_hp&rage>=40
    - shield_block,if=health.pct<config.shield_block_hp&!var.shield_block_up&cooldown.shield_block.ready

  defensives:
    - shield_wall.player,range_check=none,if=health.pct<config.shield_wall_hp&cooldown.shield_wall.ready&!buff.shield_wall.up
    - spell_reflection.player,range_check=none,if=cooldown.spell_reflection.ready&incoming_cast.player.reflectable.up
    - healthstone.player,range_check=none,if=var.health_critical&healthstone.ready
    - health_potion.player,range_check=none,if=var.health_critical&health_potion.ready&!healthstone.ready

  st_rotation:
    # Consume Thunder Blasts before Avatar — don't waste stacks
    - thunder_blast,if=var.thunder_blast_capped&cooldown.avatar.ready
    - avatar,if=cooldown.avatar.ready
    - demoralizing_shout,if=cooldown.demoralizing_shout.ready&!var.demo_shout_up
    - ravager,if=cooldown.ravager.ready
    - shield_charge,if=cooldown.shield_charge.ready
    # Burst of Power proc = no CD on next 2 Shield Slams
    - shield_slam,if=var.burst_of_power
    - shield_slam,if=cooldown.shield_slam.ready
    # With Avatar up Thunder Blast is #1 priority (Capacitance)
    - thunder_blast,if=var.thunder_blast_up&var.avatar_up
    - thunder_blast,if=var.thunder_blast_up
    - thunder_clap,if=cooldown.thunder_clap.ready
    - execute,if=config.use_execute&var.execute_phase&var.rage_safe_to_spend&talent.deep_wounds
    - revenge,if=buff.revenge.up
    - revenge,if=!var.execute_phase&var.rage_safe_to_spend
    - ignore_pain.player,range_check=none,if=rage>=70

  aoe_rotation:
    # Consume Thunder Blasts before Avatar — don't waste stacks
    - thunder_blast,if=var.thunder_blast_capped&cooldown.avatar.ready
    - avatar,if=cooldown.avatar.ready
    - demoralizing_shout,if=cooldown.demoralizing_shout.ready&!var.demo_shout_up
    - ravager,if=cooldown.ravager.ready
    - shield_charge,if=cooldown.shield_charge.ready
    # Thunder Blast is #1 AoE priority — consume every proc immediately
    - thunder_blast,if=var.thunder_blast_up
    - shield_slam,if=var.burst_of_power
    - shield_slam,if=cooldown.shield_slam.ready
    # Prefer Thunder Clap in dungeons for mob pickup
    - thunder_clap,if=cooldown.thunder_clap.ready
    - revenge,if=buff.revenge.up
    - revenge,if=var.rage_safe_to_spend
    - ignore_pain.player,range_check=none,if=rage>=65