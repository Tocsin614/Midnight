version: 1.10.0
author: Khan
spec: 1468
name: Khan's Preservation Evoker
description: |
  Preservation Evoker healing rotation for Midnight 12.0.
  Supports Chronowarden and Flameshaper hero builds.
  Echo-focused engine: Temporal Anomaly on cooldown for free Echo spread,
  Essence Burst consumed with Emerald Blossom for Twin Echoes, smart
  Merithra's Blessing proc tracking, and Fire Breath / Leaping Flames loop.
  Empowered spells use casting_check release lines:
    Dream Breath → Rank 1 normally; Rank 4 instantly via Tip the Scales emergency combo
    Fire Breath  → releases at Rank 4 for maximum Leaping Flames + Essence Burst gen
  v1.5.0: Configurable empower levels via sliders — Dream Breath (1-3), Fire Breath
    Chronowarden (1-3), Fire Breath Flameshaper (1-4). Default to max for raid;
    lower for faster M+ cycling.

entry: main

movement_allowed: true

config:

  hero_build:
    label: "Hero Talent Build"
    type: dropdown
    options:
      - label: "Chronowarden"
        value: 1
      - label: "Flameshaper"
        value: 2
    default: 1

  emergency_hp:
    label: "Emergency HP %"
    type: slider
    min: 10
    max: 40
    default: 25

  tank_heal_hp:
    label: "Tank Heal HP %"
    type: slider
    min: 40
    max: 90
    default: 70

  member_heal_hp:
    label: "Member Heal HP %"
    type: slider
    min: 50
    max: 95
    default: 80

  group_heal_count:
    label: "AoE Injured Count"
    type: slider
    min: 2
    max: 5
    default: 3

  echo_hp:
    label: "Echo Apply HP %"
    type: slider
    min: 40
    max: 95
    default: 80

  reversion_hp:
    label: "Reversion HoT HP %"
    type: slider
    min: 40
    max: 90
    default: 75

  reversion_spread_enabled:
    label: "Reversion Group Spread"
    type: checkbox
    default: true

  verdant_embrace_hp:
    label: "Verdant Embrace HP %"
    type: slider
    min: 40
    max: 95
    default: 80

  emerald_blossom_hp:
    label: "Emerald Blossom HP %"
    type: slider
    min: 50
    max: 95
    default: 80

  living_flame_heal_hp:
    label: "Living Flame Heal HP %"
    type: slider
    min: 20
    max: 70
    default: 50

  dream_breath_empower:
    label: "D. Breath Emp. Level"
    type: slider
    min: 1
    max: 4
    default: 1

  fire_breath_empower_chrono:
    label: "F. Breath Emp. (Chrono)"
    type: slider
    min: 1
    max: 3
    default: 3

  fire_breath_empower_flame:
    label: "F. Breath Emp. (Flame)"
    type: slider
    min: 1
    max: 4
    default: 4

  cauterizing_flame_hp:
    label: "Cauterizing Flame HP %"
    type: slider
    min: 20
    max: 100
    default: 45

  trinket_usage:
    label: "Trinket Usage"
    type: dropdown
    options:
      - label: "On Cooldown"
        value: 1
      - label: "With Major Cooldowns"
        value: 2
      - label: "When Group Damaged"
        value: 3
      - label: "Manual Only"
        value: 0
    default: 1

  mana_conserve_threshold:
    label: "Low Mana Conserve %"
    type: slider
    min: 10
    max: 40
    default: 20

  mouseover:
    label: "Enable Mouseover Healing"
    type: checkbox
    default: true

  auto_dispel:
    label: "Auto Dispel"
    type: checkbox
    default: true

  deep_breath_enabled:
    label: "Enable Deep Breath"
    type: checkbox
    default: false

variables:

  # === HERO BUILD DETECTION ===
  chrono_build: config.hero_build=1
  flame_build: config.hero_build=2

  # === GROUP HEALTH STATE ===
  needs_emergency: group.lowest.health.pct<config.emergency_hp
  needs_tank_healing: group.tanks.lowest.range>0&group.tanks.lowest.health.pct<config.tank_heal_hp
  needs_member_healing: group.lowest.health.pct<config.member_heal_hp
  group_heavy_damage: group.count(cycle.health.pct<config.member_heal_hp)>=config.group_heal_count
  group_critical: group.count(cycle.health.pct<config.emergency_hp)>=3
  tank_emergency: group.tanks.lowest.health.pct<config.emergency_hp
  player_low: health.pct<config.emergency_hp
  player_needs_healing: health.pct<config.member_heal_hp

  # === MANA STATE ===
  mana_ok: mana.pct>config.mana_conserve_threshold
  mana_healthy: mana.pct>50

  # === RESOURCE STATE ===
  essence_burst_up: buff.essence_burst.up
  have_essence_echo: essence>=2
  have_essence_blossom: essence>=3

  # === KEY PROCS & BUFFS ===
  merithra_proc: buff.merithras_blessing.up
  leaping_flames_up: buff.leaping_flames.up
  temporal_burst_active: buff.temporal_burst.up
  primacy_stacks: buff.primacy.stack

  # === COOLDOWN READINESS ===
  temporal_anomaly_ready: cooldown.temporal_anomaly.ready
  dream_breath_ready: cooldown.dream_breath.ready
  fire_breath_ready: cooldown.fire_breath.ready
  verdant_embrace_ready: cooldown.verdant_embrace.ready
  tip_the_scales_ready: cooldown.tip_the_scales.ready&talent.tip_the_scales.enabled
  stasis_ready: cooldown.stasis.ready&talent.stasis.enabled
  dream_flight_ready: cooldown.dream_flight.ready&talent.dream_flight.enabled
  zephyr_ready: cooldown.zephyr.ready&talent.zephyr.enabled
  time_dilation_ready: cooldown.time_dilation.ready&talent.time_dilation.enabled
  # Stasis is only worth firing when Dream Breath AND Temporal Anomaly are nearly ready
  # so the storage window captures both high-value spells (per community APL)
  stasis_spells_ready: cooldown.dream_breath.remains<3&cooldown.temporal_anomaly.remains<3

  # === ECHO MANAGEMENT ===
  # Echo spread tracking — how many group members currently hold the Echo buff
  echo_spread_wide: group.count(cycle.buff.echo.up)>=3
  tank_has_echo: group.tanks.lowest.health.pct<100&buff.echo.up.any
  # Reversion HoT coverage
  reversion_spread: group.count(cycle.buff.reversion.up)>=3

  # === MOUSEOVER ===
  mo_friendly_valid: mouseover.exists&mouseover.alive&mouseover.friendly&mouseover.range>0&mouseover.range<=30

lists:

  empower_releases:
    # casting_check gates these to ONLY fire while mid-empower
    # Top priority in main so the release is never blocked
    - dream_breath,casting_check=dream_breath,empower_to=1,if=config.dream_breath_empower=1
    - dream_breath,casting_check=dream_breath,empower_to=2,if=config.dream_breath_empower=2
    - dream_breath,casting_check=dream_breath,empower_to=3,if=config.dream_breath_empower=3
    - dream_breath,casting_check=dream_breath,empower_to=4,if=config.dream_breath_empower=4
    - fire_breath,casting_check=fire_breath,empower_to=1,if=var.chrono_build&config.fire_breath_empower_chrono=1
    - fire_breath,casting_check=fire_breath,empower_to=2,if=var.chrono_build&config.fire_breath_empower_chrono=2
    - fire_breath,casting_check=fire_breath,empower_to=3,if=var.chrono_build&config.fire_breath_empower_chrono=3
    - fire_breath,casting_check=fire_breath,empower_to=1,if=var.flame_build&config.fire_breath_empower_flame=1
    - fire_breath,casting_check=fire_breath,empower_to=2,if=var.flame_build&config.fire_breath_empower_flame=2
    - fire_breath,casting_check=fire_breath,empower_to=3,if=var.flame_build&config.fire_breath_empower_flame=3
    - fire_breath,casting_check=fire_breath,empower_to=4,if=var.flame_build&config.fire_breath_empower_flame=4

  spell_queue:
    - queue_spell

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.loot_nearby

  pre_pull_setup:
    # Apply Echo to tanks and key members before pull
    - echo,cycle=tanks,if=cycle.buff.echo.down&cycle.range>0&cycle.range<=30
    - echo,cycle=members,if=cycle.buff.echo.down&cycle.range>0&cycle.range<=30&var.have_essence_echo
    # Pre-cast Temporal Anomaly to shield up and spread Echo at the pull
    - temporal_anomaly,if=cooldown.temporal_anomaly.ready

  out_of_combat:
    - echo.player,if=health.pct<90&buff.echo.down&var.have_essence_echo
    - echo,cycle=members,if=cycle.health.pct<90&cycle.buff.echo.down&cycle.range>0&cycle.range<=30&var.have_essence_echo
    - reversion.player,if=health.pct<config.member_heal_hp&buff.reversion.down
    - reversion,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace.player,if=health.pct<config.verdant_embrace_hp&var.verdant_embrace_ready
    - verdant_embrace,cycle=members,if=cycle.health.pct<config.verdant_embrace_hp&var.verdant_embrace_ready&cycle.range>0&cycle.range<=30

  auto_target:
    - target_enemy,if=player.combat&(!target.exists|target.dead|target.friendly)&active_enemies>0
    - target_enemy,if=player.combat&!target.valid&active_enemies>0

  dispel:
    # Naturalize — removes Magic and Poison, 8s CD, use freely when type matches
    - naturalize,cycle=members,if=config.auto_dispel&(cycle.dispelable.magic|cycle.dispelable.poison)&cycle.range>0&cycle.range<=30
    - naturalize.player,if=config.auto_dispel&(player.dispelable.magic|player.dispelable.poison)
    # Cauterizing Flame — removes Bleed, Poison, Curse, Disease, 1min CD
    # Gate behind HP threshold — save for tanks/low members, not healthy targets
    # cycle.dispelable catch-all covers bleeds (no specific bleed type in framework)
    - cauterizing_flame,cycle=tanks,if=config.auto_dispel&(cycle.dispelable.disease|cycle.dispelable.curse|cycle.dispelable.poison|cycle.dispelable)&cycle.health.pct<config.cauterizing_flame_hp&cycle.range>0&cycle.range<=30
    - cauterizing_flame,cycle=members,if=config.auto_dispel&(cycle.dispelable.disease|cycle.dispelable.curse|cycle.dispelable.poison|cycle.dispelable)&cycle.health.pct<config.cauterizing_flame_hp&cycle.range>0&cycle.range<=30
    - cauterizing_flame.player,if=config.auto_dispel&(player.dispelable.disease|player.dispelable.curse|player.dispelable.poison|player.dispelable)&health.pct<config.cauterizing_flame_hp

  emergency_healing:
    # Tip the Scales + Dream Breath — instant max-rank AoE panic button (both builds)
    # TtS makes the next empower instant — no release line needed, cast completes immediately
    # Fires when 2+ members are critically low and TtS is available
    - tip_the_scales,interrupt=true,range_check=none,if=var.tip_the_scales_ready&!buff.tip_the_scales.up&group.count(cycle.health.pct<config.emergency_hp)>=2
    - dream_breath,interrupt=true,if=buff.tip_the_scales.up&var.group_critical
    # Verdant Embrace — instant single-target burst on dying tank/member
    - verdant_embrace.player,interrupt=true,if=var.verdant_embrace_ready&health.pct<15
    - verdant_embrace,cycle=tanks,interrupt=true,if=var.verdant_embrace_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    - verdant_embrace,cycle=members,interrupt=true,if=var.verdant_embrace_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    # Time Dilation — external buff on tank or lowest member buying them extra time
    - time_dilation,cycle=tanks,interrupt=true,if=var.time_dilation_ready&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    - time_dilation,cycle=members,interrupt=true,if=var.time_dilation_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    # Merithra's Blessing proc → Reversion on emergency target (instant burst + HoT)
    - reversion,cycle=tanks,interrupt=true,if=var.merithra_proc&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    - reversion,cycle=members,interrupt=true,if=var.merithra_proc&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    # Emergency Reversion on anyone critical
    - reversion,cycle=members,interrupt=true,if=cycle.health.pct<config.emergency_hp&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30
    - reversion.player,interrupt=true,if=var.player_low

  defensive_cooldowns:
    # Obsidian Scales — personal physical damage reduction; use when threatened
    - obsidian_scales,range_check=none,if=cooldown.obsidian_scales.ready&health.pct<50
    # Zephyr — 20% AoE damage reduction for 5 closest allies; pre-emptive on predictable AoE
    - zephyr,range_check=none,if=var.zephyr_ready&var.group_heavy_damage
    # Time Dilation — external sustain CD on tank below tank_heal_hp threshold
    # Lower priority than emergency use above; this is the proactive maintenance line
    - time_dilation,cycle=tanks,if=var.time_dilation_ready&cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=30

  major_cooldowns:
    # Tip the Scales (Chronowarden) — normal burst window usage: fire before heavy healing ramps
    # Emergency path is handled above in emergency_healing; this is the planned usage
    - tip_the_scales,range_check=none,if=var.tip_the_scales_ready&var.chrono_build&var.group_heavy_damage&player.combat&!buff.tip_the_scales.up
    - tip_the_scales,range_check=none,if=var.tip_the_scales_ready&var.chrono_build&state.cds&player.combat&!buff.tip_the_scales.up
    # Stasis — only fire when Dream Breath AND Temporal Anomaly are within 3s of ready
    # This ensures the storage window captures both high-value spells (DB → EB → TA order)
    - stasis,range_check=none,if=var.stasis_ready&var.stasis_spells_ready&state.cds&player.combat
    # Dream Flight (Flameshaper alternative to Stasis) — flying AoE heal + long HoT
    - dream_flight,range_check=none,if=var.dream_flight_ready&var.flame_build&var.group_heavy_damage&player.combat
    - dream_flight,range_check=none,if=var.dream_flight_ready&var.flame_build&state.cds&player.combat

  trinkets:
    - trinket_1,if=trinket_1.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&(var.tip_the_scales_ready|buff.temporal_burst.up))|(config.trinket_usage=3&var.group_heavy_damage))
    - trinket_2,if=trinket_2.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&(var.tip_the_scales_ready|buff.temporal_burst.up))|(config.trinket_usage=3&var.group_heavy_damage))

  echo_prep:
    # Echo BEFORE major heals so the next heal gets duplicated
    # .player lines handle self-targeting (cycle.range>0 excludes self)
    - echo.player,if=var.have_essence_echo&buff.echo.down&health.pct<config.tank_heal_hp&player.combat
    - echo,cycle=tanks,if=var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=30&player.combat
    - echo.player,if=var.have_essence_echo&buff.echo.down&health.pct<config.emergency_hp&player.combat
    - echo,cycle=members,if=var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30&player.combat
    - echo,cycle=members,if=var.have_essence_echo&cycle.buff.echo.down&var.group_heavy_damage&cycle.health.pct<config.echo_hp&cycle.range>0&cycle.range<=30&player.combat

  temporal_anomaly_rotation:
    # Always cast Temporal Anomaly on cooldown — critical for Resonating Sphere Echo spread
    # Nozdormu Adept (Chronowarden) reduces cooldown significantly
    - temporal_anomaly,if=var.temporal_anomaly_ready&player.combat

  reversion_spread:
    # Blanket group with Reversion for Grace Period uptime — toggle off for easy content
    # Health gate added so it doesn't fire on 100% HP targets
    - reversion.player,if=config.reversion_spread_enabled&buff.reversion.down&health.pct<config.reversion_hp&player.combat
    - reversion,cycle=tanks,if=config.reversion_spread_enabled&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat
    - reversion,cycle=members,if=config.reversion_spread_enabled&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat

  dream_breath_rotation:
    # Only cast when healing is actually needed — group count check uses group_heal_count slider
    # Also fires for tank emergency or any member critically low
    # Start lines only — release handled by empower_releases at top of main
    - dream_breath,empower_to=1,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=1&!player.casting.dream_breath&(var.group_heavy_damage|var.needs_tank_healing|var.needs_emergency)
    - dream_breath,empower_to=2,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=2&!player.casting.dream_breath&(var.group_heavy_damage|var.needs_tank_healing|var.needs_emergency)
    - dream_breath,empower_to=3,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=3&!player.casting.dream_breath&(var.group_heavy_damage|var.needs_tank_healing|var.needs_emergency)
    - dream_breath,empower_to=4,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=4&!player.casting.dream_breath&(var.group_heavy_damage|var.needs_tank_healing|var.needs_emergency)

  essence_management:
    # Essence Burst → Emerald Blossom (highest priority, free cost)
    # With Twin Echoes talent, EB generates free Echo on nearby allies
    - emerald_blossom,target=lowest,if=var.essence_burst_up&group.lowest.health.pct<config.emerald_blossom_hp&var.mana_ok&player.combat
    # Spend on Emerald Blossom for AoE healing when group is taking heavy damage
    - emerald_blossom,target=lowest,if=var.have_essence_blossom&var.group_heavy_damage&group.lowest.health.pct<config.emerald_blossom_hp&var.mana_ok&player.combat
    # Essence cap safety dump — spend before overcapping when no healing need exists
    - echo,cycle=members,if=essence>=4&cycle.buff.echo.down&cycle.range>0&cycle.range<=30&player.combat

  echo_consumption:
    # Echo → Reversion is the PRIMARY consumer per guides
    # Grace Period + Golden Hour make this the highest value Echo spend

    # 1. Merithra's Blessing proc — interrupt to fire immediately on burst-hit targets
    - reversion.player,interrupt=true,if=var.merithra_proc&health.pct<config.member_heal_hp
    - reversion,cycle=tanks,interrupt=true,if=var.merithra_proc&cycle.buff.echo.up&cycle.range>0&cycle.range<=30
    - reversion,cycle=members,interrupt=true,if=var.merithra_proc&cycle.buff.echo.up&cycle.range>0&cycle.range<=30
    - reversion,cycle=members,interrupt=true,if=var.merithra_proc&cycle.range>0&cycle.range<=30

    # 2. Reversion maintenance — spread to anyone without it when toggle enabled
    - reversion.player,if=config.reversion_spread_enabled&buff.reversion.down&health.pct<config.reversion_hp&player.combat
    - reversion,cycle=tanks,if=config.reversion_spread_enabled&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat
    - reversion,cycle=members,if=config.reversion_spread_enabled&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat

    # 3. Verdant Embrace — single-target burst; especially valuable on tanks
    - verdant_embrace.player,if=var.verdant_embrace_ready&health.pct<config.verdant_embrace_hp
    - verdant_embrace,cycle=tanks,if=var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace,cycle=members,if=var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30

  living_flame_heal_filler:
    # Truly desperate only — per Icy Veins, never in raid, M+ last resort when all else on CD
    - living_flame.player,if=health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&var.dream_breath_ready=0
    - chrono_flames.player,if=health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&var.dream_breath_ready=0
    - living_flame,cycle=members,if=cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&var.dream_breath_ready=0&cycle.range>0&cycle.range<=30
    - chrono_flames,cycle=members,if=cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&var.dream_breath_ready=0&cycle.range>0&cycle.range<=30
    # Chrono Flame ST spot heal when stronger tools are on CD
    - living_flame,cycle=members,if=cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&cycle.range>0&cycle.range<=30
    - chrono_flames,cycle=members,if=var.chrono_build&cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&cycle.range>0&cycle.range<=30
    - living_flame.player,if=health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0
    - chrono_flames.player,if=var.chrono_build&health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0

  fire_breath_leaping_flames:
    # Start lines only — release is handled by empower_releases at top of main
    # !player.casting.fire_breath prevents starting while already empowering
    # Chronowarden: max stage 3
    - fire_breath,empower_to=1,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=1&!player.casting.fire_breath
    - fire_breath,empower_to=2,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=2&!player.casting.fire_breath
    - fire_breath,empower_to=3,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=3&!player.casting.fire_breath
    # Flameshaper: max stage 4
    - fire_breath,empower_to=1,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=1&!player.casting.fire_breath
    - fire_breath,empower_to=2,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=2&!player.casting.fire_breath
    - fire_breath,empower_to=3,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=3&!player.casting.fire_breath
    - fire_breath,empower_to=4,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=4&!player.casting.fire_breath

  mouseover_healing:
    # Verdant Embrace on mouseover — instant single-target burst
    - verdant_embrace.mouseover,interrupt=true,if=var.verdant_embrace_ready&mouseover.health.pct<config.emergency_hp

  movement:
    # Only instant casts while moving — .player lines cover self when solo
    - echo.player,if=player.moving&var.have_essence_echo&buff.echo.down&health.pct<config.echo_hp
    - echo,cycle=members,if=player.moving&var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.echo_hp&cycle.range>0&cycle.range<=30
    - reversion.player,if=player.moving&buff.reversion.down&health.pct<config.reversion_hp
    - reversion,cycle=members,if=player.moving&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace.player,if=player.moving&var.verdant_embrace_ready&health.pct<config.verdant_embrace_hp
    - verdant_embrace,cycle=members,if=player.moving&var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30
    - emerald_blossom,target=lowest,if=player.moving&var.essence_burst_up&group.lowest.health.pct<config.emerald_blossom_hp

  dps_fillers:
    # Deep Breath — AoE damage when group is healthy and 3+ enemies are present
    - deep_breath,if=config.deep_breath_enabled&active_enemies>=3&group.lowest.health.pct>80&target.valid
    # Disintegrate — top filler for both builds; Energy Loop procs per guides
    - disintegrate,if=target.valid&var.mana_ok
    # Living Flame / Chrono Flame (morph) — list both, framework uses whichever is active
    - living_flame,if=var.leaping_flames_up&target.valid
    - chrono_flames,if=var.leaping_flames_up&target.valid&var.chrono_build
    - living_flame,if=target.valid
    - chrono_flames,if=target.valid&var.chrono_build

  racial_defensive:
    - stoneform,if=player.dispelable
    - fireblood,if=player.dispelable
    - will_of_the_forsaken,if=player.feared|player.charmed
    - escape_artist,if=player.rooted
    - gift_of_the_naaru,if=health.pct<30
    - stoneform,if=health.pct<30
    - fireblood,if=health.pct<30

  racial_offensive:
    - berserking,if=var.group_heavy_damage|buff.temporal_burst.up
    - blood_fury,if=var.group_heavy_damage|buff.temporal_burst.up
    - ancestral_call,if=var.group_heavy_damage|buff.temporal_burst.up
    - fireblood,if=(var.group_heavy_damage|buff.temporal_burst.up)&!player.dispelable

  main:
    - call_action_list,name=empower_releases
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    # Interrupts
    - wing_buffet,if=interrupt.target.check
    - wing_buffet.mouseover,if=interrupt.mouseover.check
    - wing_buffet.focus,if=interrupt.focus.check
    # AoE Interrupt
    - tail_swipe,if=interrupt.stun.aoe.check
    # Racial Interrupts
    - quaking_palm,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    # Combat Check
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    - call_action_list,name=pre_pull_setup,if=!player.combat&target.exists&target.boss
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat
    # Emergency healing — interrupts everything
    - call_action_list,name=emergency_healing,if=var.needs_emergency
    - call_action_list,name=defensive_cooldowns
    # Block non-emergency healing during active channels (Disintegrate, etc.)
    # Empower releases (dream_breath, fire_breath casting_check lines) are NOT channels — they still fire
    - return,if=player.channeling
    # Dispels
    - call_action_list,name=dispel
    - call_action_list,name=racial_defensive
    # Cooldowns
    - call_action_list,name=major_cooldowns
    - call_action_list,name=trinkets
    # Core healing engine — Temporal Anomaly and Dream Breath never fall off cooldown
    # These also handle their own empower release lines via casting_check
    - call_action_list,name=temporal_anomaly_rotation
    - call_action_list,name=reversion_spread
    - call_action_list,name=echo_prep
    - call_action_list,name=dream_breath_rotation
    # Essence management: Essence Burst → Emerald Blossom (Twin Echoes), then Echo spread
    - call_action_list,name=essence_management
    # Consume Echo buffs: Merithra's Blessing proc → Reversion → Verdant Embrace
    - call_action_list,name=echo_consumption
    # Living Flame last-resort spot heal (both CDs down, member still low)
    - call_action_list,name=living_flame_heal_filler,if=var.needs_member_healing
    # Fire Breath on cooldown — empower release fires via casting_check at Rank 4
    - call_action_list,name=fire_breath_leaping_flames
    # Mouseover and movement
    - call_action_list,name=mouseover_healing,if=config.mouseover&var.mo_friendly_valid&!player.casting
    - call_action_list,name=movement,if=player.moving
    # DPS fillers — only when group is healthy; healing always takes priority
    - call_action_list,name=racial_offensive
    - call_action_list,name=dps_fillers,if=!var.needs_member_healing