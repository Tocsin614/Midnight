version: "3.1.9"
author: Khan
spec: 65
name: Argent Crusade Holy Paladin
movement_allowed: true
description: |
  Holy Paladin Midnight | Argent Crusade
entry: main
config:
  auto_beacon_of_savior:
    section: "v3.1.9"
    label: "Beacon of the Savior (auto, lowest hp)"
    type: checkbox
    default: true
  beacon_of_virtue:
    label: "Beacon of Virtue Members"
    type: slider
    min: 2
    max: 5
    default: 3
  blessing_of_sacrifice:
    label: "Blessing of Sacrifice %"
    type: slider
    min: 20
    max: 50
    default: 35
  divine_protection:
    label: "Divine Protection %"
    type: slider
    min: 30
    max: 60
    default: 45
  divine_shield:
    label: "Divine Shield %"
    type: slider
    min: 10
    max: 30
    default: 18
  flash_of_light:
    label: "Flash of Light %"
    type: slider
    min: 30
    max: 80
    default: 66
  holy_light:
    label: "Holy Light %"
    type: slider
    min: 60
    max: 90
    default: 72
  holy_shock:
    label: "Holy Shock %"
    type: slider
    min: 70
    max: 95
    default: 92
  lay_on_hands:
    label: "Lay on Hands %"
    type: slider
    min: 10
    max: 35
    default: 27
  mouseover_healing:
    label: "Mouseover Healing"
    type: checkbox
    default: true
  word_of_glory:
    label: "Word of Glory %"
    type: slider
    min: 60
    max: 95
    default: 90
variables:
  avenging_wrath_active: buff.avenging_wrath.up|buff.avenging_crusader.up
  avenging_wrath_ready: cooldown.avenging_wrath.ready
  awakening_active: buff.awakening.up
  beacon_of_virtue_active: buff.beacon_of_virtue.up
  divine_favor_active: buff.divine_favor.up
  divine_purpose: buff.divine_purpose.up
  divine_toll_ready: cooldown.divine_toll.ready
  empyrean_legacy: buff.empyrean_legacy.up
  group_critical: group.count(cycle.health.pct<30)>=1
  group_emergency: group.count(cycle.health.pct<50)>=2
  group_needs_healing: group.count(cycle.health.pct<85)>=2
  hand_of_divinity_active: buff.hand_of_divinity.up
  has_absorbs: group.count(cycle.heal_absorb.pct>0)>=1
  has_eternal_flame: talent.eternal_flame
  has_living_silk: var.trinket1_living_silk|var.trinket2_living_silk
  holy_bulwark_ready: cooldown.holy_bulwark.ready
  holy_shock_ready: cooldown.holy_shock.charges>=1
  hp_capped: holy_power>=5
  hp_deficit_ok: holy_power.deficit>=3
  hp_pool_for_toll: "!var.group_emergency&cooldown.divine_toll.remains>0&cooldown.divine_toll.remains<3&holy_power>=2"
  hp_spendable: holy_power>=3|buff.divine_purpose.up
  infusion_of_light: buff.infusion_of_light.up
  mo_friendly_valid: mouseover.exists&mouseover.alive&mouseover.friendly
  needs_member_healing: group.lowest.health.pct<config.word_of_glory
  racial_defensive_hp: 50
  racial_emergency_hp: 35
  racial_heal_ally_hp: 60
  righteous_judgment: talent.righteous_judgment.enabled
  rising_sunlight_active: buff.rising_sunlight.up
  sacred_weapon_ready: cooldown.sacred_weapon.ready
  sun_sear_active: buff.sun_sear.up
  suns_avatar_active: buff.suns_avatar.up
  trinket1_living_silk: trinket_1.id=242393
  trinket2_living_silk: trinket_2.id=242393
  tyrs_deliverance_active: buff.tyrs_deliverance.up
  tyrs_deliverance_ready: talent.tyrs_deliverance.enabled&cooldown.tyrs_deliverance.ready
lists:
  interrupts:
    - hammer_of_justice,if=interrupt.target.check
    - hammer_of_justice.mouseover,if=interrupt.mouseover.check
    - hammer_of_justice.focus,if=interrupt.focus.check
    - blinding_light,if=interrupt.stun.aoe.check
  out_of_combat:
    - devotion_aura,if=buff.devotion_aura.down
    - beacon_of_light,cycle=tanks,if=!talent.beacon_of_virtue.enabled&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range>0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=talent.beacon_of_faith.enabled&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range>0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down
    - redemption,cycle=members,if=cycle.dead
    - word_of_glory,cycle=members,if=var.hp_spendable&cycle.health.pct<90
    - eternal_flame,cycle=members,if=var.hp_spendable&cycle.health.pct<90
    - holy_shock,cycle=members,if=cycle.heal_absorb.pct>0&var.holy_shock_ready
    - flash_of_light,cycle=members,if=cycle.heal_absorb.pct>0
  emergency:
    - divine_shield,interrupt=true,if=health.pct<config.divine_shield
    - lay_on_hands,cycle=tanks,interrupt=true,if=cycle.health.pct<config.lay_on_hands
    - lay_on_hands,cycle=members,interrupt=true,if=cycle.health.pct<config.lay_on_hands
    - divine_protection,if=health.pct<config.divine_protection
    - divine_protection,if=cooldown.divine_protection.ready&health.pct<80
    - blessing_of_sacrifice,cycle=tanks,if=cycle.health.pct<config.blessing_of_sacrifice&health.pct>40
    - word_of_glory,cycle=members,if=cycle.health.pct<40&var.hp_spendable
    - eternal_flame,cycle=members,if=cycle.health.pct<40&var.hp_spendable
    - holy_shock,cycle=members,if=cycle.health.pct<50&var.holy_shock_ready
    - flash_of_light,cycle=members,if=cycle.health.pct<40&var.infusion_of_light
  major_cooldowns:
    - avenging_wrath,if=group.count(cycle.health.pct<70)>=2
    - avenging_crusader,if=group.count(cycle.health.pct<70)>=2
    - aura_mastery,if=group.count(cycle.health.pct<60)>=3|group.count(cycle.health.pct<=50)>=2
    - divine_toll,if=group.count(cycle.health.pct<90)>=2&holy_power<=2
    - divine_toll,if=var.divine_toll_ready&holy_power<=2&!var.needs_member_healing&target.valid
    - beacon_of_virtue,if=group.count(cycle.health.pct<85)>=config.beacon_of_virtue&var.hp_spendable&var.avenging_wrath_active
    - beacon_of_virtue,if=group.count(cycle.health.pct<70)>=2&var.hp_spendable
    - tyrs_deliverance,if=var.tyrs_deliverance_ready&var.group_needs_healing
    - holy_prism,if=cooldown.holy_prism.ready&var.hp_deficit_ok
    - holy_bulwark,cycle=tanks,if=var.holy_bulwark_ready
    - holy_bulwark,if=var.holy_bulwark_ready&health.pct<80
    - sacred_weapon,if=var.sacred_weapon_ready&var.avenging_wrath_active
    - sacred_weapon,if=var.sacred_weapon_ready
  virtue_window:
    - word_of_glory,cycle=members,if=var.hp_spendable&cycle.health.pct<85
    - eternal_flame,cycle=members,if=var.hp_spendable&cycle.health.pct<85
    - light_of_dawn,if=group.count(cycle.health.pct<90)>=2&var.hp_spendable
    - holy_shock,cycle=members,if=cycle.health.pct<config.holy_shock&var.holy_shock_ready
    - flash_of_light,cycle=members,if=var.infusion_of_light&cycle.health.pct<config.flash_of_light
    - judgment,if=holy_power.deficit>=1
  avenging_crusader_rotation:
    - light_of_dawn,if=var.hp_capped&group.count(cycle.health.pct<90)>=2
    - word_of_glory,cycle=members,if=var.hp_capped&cycle.health.pct<80
    - eternal_flame,cycle=members,if=var.hp_capped&cycle.health.pct<80
    - shield_of_the_righteous,if=var.hp_capped&!var.group_needs_healing
    - light_of_dawn,if=var.divine_purpose&group.count(cycle.health.pct<90)>=2
    - word_of_glory,cycle=members,if=var.divine_purpose&cycle.health.pct<80
    - eternal_flame,cycle=members,if=var.divine_purpose&cycle.health.pct<80
    - shield_of_the_righteous,if=var.divine_purpose&!var.group_needs_healing
    - judgment,if=holy_power.deficit>=1
    - hammer_of_wrath,if=holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&holy_power.deficit>=1
    - consecration,if=!buff.consecration.up
    - holy_light,cycle=members,if=var.hand_of_divinity_active&cycle.health.pct<config.holy_light
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.pct<85)>=2
    - word_of_glory,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - eternal_flame,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - flash_of_light,cycle=members,if=var.infusion_of_light&cycle.health.pct<config.flash_of_light
  spenders:
    - light_of_dawn,if=var.empyrean_legacy&group.count(cycle.health.pct<config.word_of_glory)>=2
    - light_of_dawn,if=var.sun_sear_active&var.hp_spendable&group.count(cycle.health.pct<config.word_of_glory)>=2
    - light_of_dawn,if=var.suns_avatar_active&var.hp_spendable&group.count(cycle.health.pct<config.word_of_glory)>=2
    - light_of_dawn,if=var.hp_capped&group.count(cycle.heal_absorb.pct>0)>=2
    - light_of_dawn,if=!var.beacon_of_virtue_active&group.count(cycle.health.pct<config.word_of_glory)>=2&var.hp_spendable&!var.hp_pool_for_toll
    - shield_of_the_righteous,if=var.hp_capped
    - shield_of_the_righteous,if=var.hp_spendable&!var.hp_pool_for_toll
  dawnlight_maintenance:
    - holy_prism,if=cooldown.holy_prism.ready
  generators:
    - consecration,if=!buff.consecration.up
    - holy_light,cycle=members,if=var.hand_of_divinity_active&cycle.health.pct<config.holy_light
    - holy_light,cycle=members,if=var.divine_favor_active&var.infusion_of_light&cycle.health.pct<80
    - holy_shock,cycle=members,if=var.tyrs_deliverance_active&cycle.health.pct<90&var.holy_shock_ready
    - holy_shock,cycle=members,if=var.rising_sunlight_active&var.holy_shock_ready&cycle.health.pct<config.holy_shock
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - judgment,if=var.righteous_judgment&holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&holy_power.deficit>=1
    - judgment,if=holy_power.deficit>=1
    - hammer_of_wrath,if=holy_power.deficit>=1
    - flash_of_light,cycle=members,if=var.infusion_of_light&cycle.health.pct<config.flash_of_light
    - flash_of_light,if=holy_power.deficit>=1
  member_healing:
    - holy_shock.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100&var.holy_shock_ready
    - word_of_glory.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100&var.hp_spendable&!var.has_eternal_flame
    - eternal_flame.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100&var.hp_spendable&var.has_eternal_flame
    - flash_of_light.focus_mouseover,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100
    - holy_shock,interrupt=true,cycle=members,if=cycle.heal_absorb.pct>0
    - eternal_flame,cycle=members,if=cycle.heal_absorb.pct>0&var.hp_spendable&var.has_eternal_flame
    - word_of_glory,cycle=members,if=cycle.heal_absorb.pct>0&var.hp_spendable&!var.has_eternal_flame
    - holy_light,cycle=members,if=cycle.heal_absorb.pct>0&mana.pct>30
    - word_of_glory,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - eternal_flame,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.heal_absorb.pct>0)>=2
    - flash_of_light,cycle=members,if=var.infusion_of_light&cycle.health.pct<config.flash_of_light
    - holy_light,cycle=members,if=cycle.health.pct<config.word_of_glory&mana.pct>30
    - judgment,if=holy_power.deficit>=1
    - hammer_of_wrath,if=holy_power.deficit>=1
    - flash_of_light,cycle=members,if=cycle.heal_absorb.pct>0
  proactive_healing:
    - holy_shock,if=var.holy_shock_ready&casting_target.health.pct<80
    - flash_of_light,if=var.infusion_of_light&casting_target.health.pct<60
  mouseover_friendly:
    - word_of_glory.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.word_of_glory&var.hp_spendable
    - eternal_flame.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.word_of_glory&var.hp_spendable
    - holy_shock.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.holy_shock&var.holy_shock_ready
    - flash_of_light.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.flash_of_light
  beacons:
    - beacon_of_light,cycle=tanks,if=!talent.beacon_of_virtue.enabled&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range>0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=talent.beacon_of_faith.enabled&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range>0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down
  trinkets:
    - trinket_1,if=var.trinket1_living_silk&trinket_1.ready&(var.avenging_wrath_active|var.group_emergency)
    - trinket_2,if=var.trinket2_living_silk&trinket_2.ready&(var.avenging_wrath_active|var.group_emergency)
    - trinket_1,if=!var.trinket1_living_silk&trinket_1.ready&trinket_1.sync
    - trinket_2,if=!var.trinket2_living_silk&trinket_2.ready&trinket_2.sync
    - trinket_1,if=!var.trinket1_living_silk&trinket_1.ready&var.group_emergency
    - trinket_2,if=!var.trinket2_living_silk&trinket_2.ready&var.group_emergency
  moving:
    - holy_shock,cycle=members,if=cycle.health.pct<config.holy_shock&var.holy_shock_ready
    - word_of_glory,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - eternal_flame,cycle=members,if=var.hp_spendable&cycle.health.pct<config.word_of_glory
    - light_of_dawn,if=group.count(cycle.health.pct<85)>=2&var.hp_spendable
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - judgment,if=holy_power.deficit>=1
    - hammer_of_wrath,if=holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&!var.group_needs_healing
  racial_defensive:
    - fireblood,if=health.pct<var.racial_defensive_hp
    - gift_of_the_naaru,if=health.pct<var.racial_emergency_hp
    - regeneratin,if=health.pct<var.racial_emergency_hp&!player.combat
    - stoneform,if=health.pct<var.racial_defensive_hp
  racial_offensive:
    - ancestral_call,if=var.avenging_wrath_active
    - berserking,if=var.avenging_wrath_active
    - blood_fury,if=var.avenging_wrath_active
    - fireblood,if=var.avenging_wrath_active
  racial_cc:
    - arcane_pulse,if=enemies.8y.count>=3
    - bull_rush,if=target.casting.interruptible
    - haymaker,if=target.casting.interruptible
    - quaking_palm,if=target.casting.interruptible
    - war_stomp,if=interrupts.8y.stun.count>=1
    - wing_buffet,if=target.casting.interruptible
  racial_utility:
    - arcane_torrent,if=mana.pct<=90
    - bag_of_tricks,target=lowest,if=group.lowest.health.pct<var.racial_heal_ally_hp
    - gift_of_the_naaru,target=lowest,if=group.lowest.health.pct<var.racial_heal_ally_hp
    - shadowmeld,if=target.threat>=3&!player.casting
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=auto_heal,if=player.combat
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    - return,if=player.channeling
    - call_action_list,name=emergency
    - call_action_list,name=major_cooldowns
    - call_action_list,name=racial_defensive
    - call_action_list,name=interrupts
    - call_action_list,name=racial_cc
    - return,if=player.cc
    - call_action_list,name=beacons
    - call_action_list,name=racial_offensive,if=var.avenging_wrath_active
    - call_action_list,name=virtue_window,if=var.beacon_of_virtue_active
    - call_action_list,name=avenging_crusader_rotation,if=buff.avenging_crusader.up
    - call_action_list,name=moving,if=player.moving
    - call_action_list,name=proactive_healing,if=target.casting&casting_target.health.pct<config.word_of_glory
    - call_action_list,name=mouseover_friendly,if=var.mo_friendly_valid&!player.casting
    - call_action_list,name=racial_utility
    - call_action_list,name=trinkets
    - call_action_list,name=dawnlight_maintenance
    - call_action_list,name=spenders
    - call_action_list,name=member_healing,if=var.needs_member_healing|var.has_absorbs
    - call_action_list,name=generators
