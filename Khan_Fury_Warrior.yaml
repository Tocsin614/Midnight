# ──────────────────────────────────────────────────────────────────────
# Warrior – Fury  |  spec: 72
# Converted from SimC APL, cleaned up and enhanced by Khan
# ──────────────────────────────────────────────────────────────────────

spec: 72
name: "Warrior Fury"
version: "1.0.0"
author: "Khan"
date: "2026-03-28"
patch: "12.0"
movement_allowed: true
entry: main
description: "SimC APL conversion with defensives & interrupts"

config:
  impending_victory_hp_pct:
    section: "Defensives"
    label: "Impending Victory HP %"
    type: slider
    min: 0
    max: 100
    default: 65
  enraged_regeneration_hp_pct:
    section: "Defensives"
    label: "Enraged Regeneration HP %"
    type: slider
    min: 0
    max: 100
    default: 40
  rallying_cry_hp_pct:
    section: "Defensives"
    label: "Rallying Cry HP %"
    type: slider
    min: 0
    max: 100
    default: 50
  aoe_threshold:
    section: "Combat"
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_cds:
    section: "Cooldowns"
    label: "Use Cooldowns"
    type: checkbox
    default: true

variables:
  # raid_event not supported — simplified to enemy count check
  st_planning: active_enemies=1
  adds_remain: active_enemies>=2
  execute_phase: (talent.massacre&target.health.pct<35)|target.health.pct<20
  # Fixed: second buff.recklessness.down → buff.avatar.down (matches SimC APL intent)
  on_gcd_racials: buff.recklessness.down&buff.avatar.down&rage<80&buff.sudden_death.down&!cooldown.bladestorm.ready&(!cooldown.execute.ready|!var.execute_phase)

lists:

  # ==========================================================================
  # DEFENSIVES
  # ==========================================================================
  defensives:
    - enraged_regeneration,range_check=none,if=health.pct<=config.enraged_regeneration_hp_pct
    - rallying_cry,range_check=none,if=health.pct<=config.rallying_cry_hp_pct
    - impending_victory,if=health.pct<=config.impending_victory_hp_pct
    - spell_reflection,range_check=none,if=reflectable.ready

  # ==========================================================================
  # INTERRUPTS
  # ==========================================================================
  interrupts:
    - pummel,if=interrupt.target.check
    - pummel.mouseover,if=interrupt.mouseover.check
    - pummel.focus,if=interrupt.focus.check
    # CC Interrupt
    - storm_bolt,if=interrupt.cc.check
    # AoE Interrupt / stun
    - shockwave,if=interrupts.8y.count>=2|interrupts.8y.stun.count>=2
    - intimidating_shout,if=interrupts.8y.count>=2|interrupts.8y.stun.count>=2

  # ==========================================================================
  # TRINKETS
  # ==========================================================================
  trinkets:
    - trinket_1,if=trinket_1.sync
    - trinket_2,if=trinket_2.sync

  # ==========================================================================
  # SLAYER (single-target)
  # ==========================================================================
  slayer:
    - recklessness
    - avatar
    - rampage,if=buff.enrage.remains<gcd|rage>=100
    - bladestorm,if=(buff.enrage.up&talent.deft_experience|buff.enrage.remains>1)&(buff.recklessness.up|cooldown.recklessness.remains>30)
    - odyns_fury
    - bloodbath
    - rampage,if=buff.recklessness.up
    - execute
    - crushing_blow
    - bloodthirst
    - rampage
    - wrecking_throw
    - rend,if=dot.rend.duration<6
    - raging_blow
    - whirlwind
    - storm_bolt,if=buff.bladestorm.up

  # ==========================================================================
  # SLAYER AoE
  # ==========================================================================
  slayer_aoe:
    - whirlwind,if=talent.improved_whirlwind&buff.whirlwind.stack=0
    - recklessness
    - avatar
    - rampage,if=buff.enrage.remains<gcd|rage>=110
    - bladestorm,if=(buff.enrage.up&talent.deft_experience|buff.enrage.remains>1)&(buff.recklessness.up|cooldown.recklessness.remains>10)
    - odyns_fury
    - bloodbath
    - execute,if=buff.sudden_death.up
    - rampage,if=buff.recklessness.up
    - whirlwind,if=talent.improved_whirlwind&buff.recklessness.up
    - crushing_blow
    - bloodthirst
    - rend,if=dot.rend.duration<6
    - execute
    - rampage
    - whirlwind,if=talent.improved_whirlwind
    - raging_blow
    - storm_bolt,if=buff.bladestorm.up

  # ==========================================================================
  # THANE (single-target)
  # ==========================================================================
  thane:
    - odyns_fury
    - recklessness
    - avatar
    - rampage,if=buff.enrage.remains<gcd|rage>=100
    - thunder_blast,if=buff.thunder_blast.stack=2
    - bloodbath
    - rampage,if=buff.recklessness.up
    - thunder_blast,if=buff.avatar.up
    - bloodthirst
    - execute
    - crushing_blow
    - thunder_blast
    - rampage
    - raging_blow
    - thunder_clap
    - whirlwind

  # ==========================================================================
  # THANE AoE
  # ==========================================================================
  thane_aoe:
    - odyns_fury
    - recklessness
    - avatar
    - thunder_blast,if=buff.thunder_blast.stack=2
    - thunder_blast,if=buff.avatar.up
    - thunder_clap,if=talent.improved_whirlwind&buff.whirlwind.stack=0|(buff.avatar.up&active_enemies>6)
    - rampage,if=buff.enrage.remains<gcd|rage>=100
    - bloodbath
    - rampage,if=buff.recklessness.up
    - thunder_clap,if=buff.avatar.up
    - bloodthirst
    - thunder_blast
    - execute
    - thunder_clap
    - crushing_blow
    - rampage
    - raging_blow
    - whirlwind

  # ==========================================================================
  # MAIN
  # ==========================================================================
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target

    # Buff maintenance (fires out of combat)
    - battle_shout,range_check=none,if=!buff.battle_shout.up.any|buff.battle_shout.remains.any<60
    - berserker_stance,range_check=none,if=!buff.berserker_stance.up

    # Combat check
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)

    # Defensives (highest priority survival)
    - call_action_list,name=defensives

    # Interrupts
    - call_action_list,name=interrupts

    # Target validation
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)

    - charge,if=target.range>8&player.combat.time<=0.5

    # Trinkets
    - call_action_list,name=trinkets

    # Racials
    - lights_judgment,if=var.on_gcd_racials
    - bag_of_tricks,if=var.on_gcd_racials
    - berserking,if=buff.recklessness.up
    - blood_fury
    - fireblood
    - ancestral_call

    # Hero tree routing
    - run_action_list,name=slayer,if=talent.slayers_dominance&active_enemies=1
    - run_action_list,name=slayer_aoe,if=talent.slayers_dominance&active_enemies>1
    - run_action_list,name=thane,if=talent.lightning_strikes&active_enemies=1
    - run_action_list,name=thane_aoe,if=talent.lightning_strikes&active_enemies>1

    # Unconditional fallback — works pre-70 when no hero talents are learned
    - run_action_list,name=thane
