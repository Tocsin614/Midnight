# Mistweaver Monk — Midnight 12.0.1 | Spec 270 | Author: Khan
# Version : 4.9.0  |  Source: Method.gg (Tincell)
version: "4.9.0"
spec: 270
name: "Mistweaver Monk Method"
description: "Midnight 12.0 - Method.gg (Tincell): CotC and MoH for Raid and Mythic+"
author: "Khan"
date: "2026-03-26"
patch: "12.0.1"

movement_allowed: true

# CONFIG
config:
  rotation_profile:
    section: "Profile"
    type: dropdown
    label: "Rotation Profile"
    options:
      - label: "CotC - Raid"
        value: 1
      - label: "CotC - Mythic+"
        value: 2
      - label: "MoH - Raid"
        value: 3
      - label: "MoH - Mythic+"
        value: 4
    default: 1

  aoe_threshold:
    section: "Healing"
    type: slider
    label: "AoE Threshold (enemies for SCK)"
    min: 1
    max: 100
    default: 3

  heal_threshold:
    section: "Healing"
    type: slider
    label: "Heal Threshold - group member HP%"
    min: 1
    max: 100
    default: 80

  tank_heal_threshold:
    section: "Healing"
    type: slider
    label: "Tank Heal Threshold - tank HP%"
    min: 1
    max: 100
    default: 88

  life_cocoon_threshold:
    section: "Healing"
    type: slider
    label: "Life Cocoon HP% Threshold"
    min: 1
    max: 100
    default: 35

  cooldown_threshold:
    section: "Cooldowns"
    type: slider
    label: "Celestial CD Threshold - group HP% to use Yu'lon or Chi-Ji"
    min: 1
    max: 100
    default: 55

  celestial_conduit_threshold:
    section: "Cooldowns"
    type: slider
    label: "Celestial Conduit Threshold - group HP% to use Conduit"
    min: 1
    max: 100
    default: 65

  auto_celestials:
    section: "Cooldowns"
    type: checkbox
    label: "Auto-use Celestial CDs (uncheck for manual timing)"
    value: true

  dps_threshold:
    section: "DPS"
    type: slider
    label: "DPS Mode Threshold - min group HP% to allow DPS"
    min: 1
    max: 100
    default: 92

  use_dps_filler:
    section: "DPS"
    type: checkbox
    label: "Enable DPS Filler (when no heal needed)"
    value: true

  use_defensives:
    section: "Defensives"
    type: checkbox
    label: "Enable Defensive Cooldowns"
    value: true

  healthstone:
    section: "Defensives"
    type: slider
    label: "Healthstone HP% Threshold"
    min: 1
    max: 100
    default: 40

  healthpotion:
    section: "Defensives"
    type: slider
    label: "Health Potion HP% Threshold"
    min: 1
    max: 100
    default: 40

  mana_tea_threshold:
    section: "Mana"
    type: slider
    label: "Mana Tea Stack Threshold (min stacks to use)"
    min: 1
    max: 100
    default: 10

  mana_tea_mana:
    section: "Mana"
    type: slider
    label: "Mana Tea Mana Threshold (only use below this % mana)"
    min: 1
    max: 100
    default: 80

  ramp_trigger:
    section: "Ramp"
    type: toggle
    label: "Force Pre-Ramp Spread"
    description: "Manually trigger RenM+TFT spread sequence. Hotkey this for pull or known damage events."
    show_override: true
    spell: 116680

  ramp_window:
    section: "Ramp"
    type: slider
    label: "Ramp Window (seconds before event)"
    min: 3
    max: 15
    default: 8

# VARIABLES
variables:
  # Hero talent detection
  is_cotc: talent.celestial_conduit
  is_moh: talent.aspect_of_harmony

  # Buff/proc states
  hotjs_active: buff.heart_of_the_jade_serpent.up
  yulon_active: buff.invoke_yulon_the_jade_serpent.up
  chiji_active: buff.invoke_chi_ji_the_red_crane.up
  aoh_active: buff.aspect_of_harmony.up
  zen_pulse_ready: buff.zen_pulse.stack>=2
  spiritfont_ready: buff.spiritfont.stack>=2
  sox_proc: buff.strength_of_the_black_ox.up
  vivacious_up: buff.vivacious_vivification.up
  harmonic_surge_ready: buff.harmonic_surge.stack>=6
  dance_of_chiji: buff.dance_of_chi_ji.up

  # Talent flags
  has_rwk: talent.rushing_wind_kick
  has_focused_thunder: talent.focused_thunder
  has_pool_of_mists: talent.pool_of_mists
  has_spiritfont: talent.spiritfont
  has_sheiluns_gift: talent.sheiluns_gift
  has_veil_of_pride: talent.veil_of_pride
  has_endless_draught: talent.endless_draught
  has_refreshment: talent.refreshment

  # Cooldown shorthands
  renm_capped: cooldown.renewing_mist.charges>=3
  renm_has_charge: cooldown.renewing_mist.charges>=1
  rsk_ready: cooldown.rising_sun_kick.ready
  rwk_ready: cooldown.rushing_wind_kick.ready
  tft_ready: cooldown.thunder_focus_tea.ready
  tft_capped: cooldown.thunder_focus_tea.charges=cooldown.thunder_focus_tea.max_charges

  # Group health
  group_injured: group.lowest.health.pct<config.dps_threshold
  group_critical: group.lowest.health.pct<50
  group_needs_cd: (group.lowest.health.pct<config.cooldown_threshold)|(encounter.active&encounter.next.remains<3)
  group_needs_conduit: (group.lowest.health.pct<config.celestial_conduit_threshold)|(encounter.active&encounter.next.remains<3)

  # Ramp
  # ramp_active fires on encounter timeline OR manual toggle — triggers Phase 1 spread only
  # ramp_imminent fires ONLY on encounter timeline — Phase 2 CDs never blow on toggle alone
  ramp_active: (encounter.active&encounter.next.remains<config.ramp_window)|(config.ramp_trigger=1)
  ramp_imminent: encounter.active&encounter.next.remains<3

# LISTS
lists:

  # === PRE-RAMP: TFT + RenM spread + EnvMist only ===
  # Toggle fires THIS list only. LC and celestials are NEVER fired by toggle.
  pre_ramp:
    - thunder_focus_tea,range_check=none,if=var.tft_ready
    - renewing_mist,cycle=members,if=var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40
    - renewing_mist,range_check=none,if=var.renm_capped
    - renewing_mist,cycle=members,if=!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge
    - enveloping_mist,target=tanks.lowest,if=!tank1.buff.enveloping_mist.up&group.tanks.lowest.range<=40
    - enveloping_mist,target=lowest,if=group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40

  # === ENCOUNTER RAMP: encounter timeline CDs only — never fires from toggle ===
  encounter_ramp:
    # LC: only on Type 3 (severity 2) tank busters — wipe mechanics only
    - life_cocoon,interrupt=true,target=tanks.lowest,range_check=none,if=encounter.next_tank.remains<3&encounter.next_tank.severity>=2&cooldown.life_cocoon.ready&group.tanks.lowest.range<=40
    # LC: only on Type 3 healer events — NOT routine debuffs like Flaming Updraft
    - life_cocoon,interrupt=true,target=healers.lowest,range_check=none,if=encounter.next_healer.remains<3&encounter.next_healer.severity>=2&cooldown.life_cocoon.ready&group.healers.lowest.health.pct<=config.life_cocoon_threshold&group.healers.lowest.range<=40
    # Celestials: Type 2+ AND health dropping despite the ramp
    # Higher thresholds than normal since AoE keeps coming — don't wait for crisis
    - invoke_chi_ji_the_red_crane,interrupt=true,range_check=none,if=var.ramp_imminent&encounter.next.severity>=1&group.lowest.health.pct<60&var.is_cotc&(config.rotation_profile=2|config.rotation_profile=4)&config.auto_celestials&cooldown.invoke_chi_ji_the_red_crane.ready
    - invoke_yulon_the_jade_serpent,interrupt=true,range_check=none,if=var.ramp_imminent&encounter.next.severity>=1&group.lowest.health.pct<60&var.is_cotc&config.rotation_profile=1&config.auto_celestials&cooldown.invoke_yulon_the_jade_serpent.ready
    - invoke_yulon_the_jade_serpent,interrupt=true,range_check=none,if=var.ramp_imminent&encounter.next.severity>=1&group.lowest.health.pct<60&var.is_moh&config.auto_celestials&cooldown.invoke_yulon_the_jade_serpent.ready
    - celestial_conduit,interrupt=true,range_check=none,if=var.ramp_imminent&encounter.next.severity>=1&group.lowest.health.pct<70&var.is_cotc&config.auto_celestials&cooldown.celestial_conduit.ready

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=auto_heal,if=player.combat
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat
    # LC tank — highest priority
    - life_cocoon,interrupt=true,target=tanks.lowest,if=group.tanks.lowest.health.pct<=config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.tanks.lowest.range<=40
    - call_action_list,name=soothing_mist_channel,if=buff.soothing_mist.up
    - call_action_list,name=defensives,if=config.use_defensives
    - call_action_list,name=interrupt
    - call_action_list,name=emergency_heal
    - call_action_list,name=cooldowns,if=state.cds
    - call_action_list,name=pre_ramp,if=var.ramp_active
    - call_action_list,name=encounter_ramp,if=encounter.active&var.ramp_imminent
    # RSK: keep on CD at all times (Method rule 1). Procs VV for instant SG next line.
    - rushing_wind_kick,range_check=none,if=var.has_rwk&var.rwk_ready&target.exists&target.enemy
    - rising_sun_kick,range_check=none,if=var.rsk_ready&target.exists&target.enemy
    # VV proc: instant SG immediately after RSK, always on lowest
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - call_action_list,name=cotc_raid,if=(config.rotation_profile=1)&var.is_cotc
    - call_action_list,name=cotc_mplus,if=(config.rotation_profile=2)&var.is_cotc
    - call_action_list,name=moh_raid,if=(config.rotation_profile=3)&var.is_moh
    - call_action_list,name=moh_mplus,if=(config.rotation_profile=4)&var.is_moh
    - call_action_list,name=tank_heal
    - call_action_list,name=healer_heal
    - call_action_list,name=dps_cotc,if=config.use_dps_filler&var.is_cotc&!var.group_injured
    - call_action_list,name=dps_moh,if=config.use_dps_filler&var.is_moh&!var.group_injured

  out_of_combat:
    - mana_tea,range_check=none,if=buff.mana_tea.stack>=config.mana_tea_threshold&mana.pct<config.mana_tea_mana&!buff.soothing_mist.up
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40

  # === SOOTHING MIST CHANNEL ===
  soothing_mist_channel:
    - vivify,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.pct<25&group.lowest.range<=40
    - sheiluns_gift,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.pct<25&group.lowest.range<=40
    - enveloping_mist,casting_check=soothing_mist,ignore_usable=true,cycle=members,if=!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - vivify,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - sheiluns_gift,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
  interrupt:
    - paralysis,if=interrupt.target.check
    - paralysis.mouseover,range_check=mouseover,if=interrupt.mouseover.check
    - paralysis.focus,range_check=focus,if=interrupt.focus.check
    - leg_sweep,if=interrupt.stun.aoe.check
    - quaking_palm,if=interrupt.cc.check

  # === DEFENSIVES ===
  defensives:
    - healthstone,if=health.pct<=config.healthstone
    - health_potion,if=health.pct<=config.healthpotion
    # Fortifying Brew — self-only 20% HP/DR cooldown at 50% health
    - fortifying_brew,range_check=none,if=health.pct<=50&cooldown.fortifying_brew.ready

  # === EMERGENCY HEAL: instant CDs only ===
  emergency_heal:
    - life_cocoon,interrupt=true,target=tanks.lowest,if=config.use_defensives&group.tanks.lowest.health.pct<=config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.tanks.lowest.range<=40
    - life_cocoon,interrupt=true,target=healers.lowest,if=config.use_defensives&group.healers.lowest.health.pct<=config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.healers.lowest.range<=40
    - life_cocoon,interrupt=true,target=dps.lowest,if=config.use_defensives&group.dps.lowest.health.pct<=config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.dps.lowest.range<=40
    - revival,interrupt=true,if=!talent.restoral&cooldown.revival.ready&group.lowest.range<=40&(group.count(cycle.health.effective.pct<40)>=3|(group.tanks.lowest.health.pct<15&cooldown.life_cocoon.down))
    - restoral,if=talent.restoral&cooldown.restoral.ready&group.lowest.range<=40&(group.count(cycle.health.effective.pct<40)>=3|(group.tanks.lowest.health.pct<15&cooldown.life_cocoon.down))
    - soothing_mist,cycle=members,if=!buff.soothing_mist.up&group.count(cycle.health.effective.pct<config.heal_threshold)=1&cycle.health.effective.pct<40&cycle.range<=40

  # === TANK HEAL: instant-only safety net ===
  tank_heal:
    - vivify,target=tanks.lowest,if=!var.has_sheiluns_gift&group.tanks.lowest.health.pct<config.tank_heal_threshold&group.tanks.lowest.range<=40&var.vivacious_up
    - sheiluns_gift,target=tanks.lowest,if=var.has_sheiluns_gift&group.tanks.lowest.health.pct<config.tank_heal_threshold&group.tanks.lowest.range<=40&var.vivacious_up

  # === HEALER HEAL: keep co-healers up ===
  healer_heal:
    - life_cocoon,interrupt=true,target=healers.lowest,if=group.healers.lowest.health.pct<=config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.healers.lowest.range<=40
    - vivify,target=healers.lowest,if=!var.has_sheiluns_gift&group.healers.lowest.health.pct<config.heal_threshold&group.healers.lowest.range<=40&var.vivacious_up
    - sheiluns_gift,target=healers.lowest,if=var.has_sheiluns_gift&group.healers.lowest.health.pct<config.heal_threshold&group.healers.lowest.range<=40&var.vivacious_up

  # === COOLDOWNS ===
  cooldowns:
    - trinket_1,if=trinket_1.usable&trinket_1.ready
    - trinket_2,if=trinket_2.usable&trinket_2.ready

  cotc_raid:
    - call_action_list,name=cotc_raid_yulon,if=var.yulon_active
    - call_action_list,name=cotc_raid_hotjs,if=var.hotjs_active
    - renewing_mist,cycle=members,if=var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40
    - renewing_mist,if=var.renm_capped
    - thunder_focus_tea,range_check=none,if=var.tft_ready&var.renm_has_charge
    - renewing_mist,cycle=members,if=!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge
    - invoke_yulon_the_jade_serpent,interrupt=true,if=config.auto_celestials&cooldown.invoke_yulon_the_jade_serpent.ready&var.group_needs_cd&group.lowest.range<=40
    - celestial_conduit,interrupt=true,if=config.auto_celestials&cooldown.celestial_conduit.ready&var.group_needs_conduit&group.lowest.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.zen_pulse_ready&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.zen_pulse_ready&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - enveloping_mist,cycle=members,if=var.spiritfont_ready&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.sox_proc&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - renewing_mist,cycle=members,if=!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge
    - spinning_crane_kick,if=enemies.combat.8y>=config.aoe_threshold
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - life_cocoon,target=tanks.lowest,if=var.has_refreshment&cooldown.life_cocoon.ready&group.tanks.lowest.health.pct<config.life_cocoon_threshold&group.tanks.lowest.range<=40
    - life_cocoon,target=dps.lowest,if=var.has_refreshment&cooldown.life_cocoon.ready&group.dps.lowest.health.pct<config.life_cocoon_threshold&group.dps.lowest.range<=40
    - mana_tea,range_check=none,if=buff.mana_tea.stack>=config.mana_tea_threshold&mana.pct<config.mana_tea_mana&group.lowest.health.pct>config.heal_threshold&!buff.soothing_mist.up
    - blackout_kick,if=target.exists&target.enemy
    - tiger_palm,if=target.exists&target.enemy

  cotc_raid_yulon:
    - renewing_mist,cycle=members,if=var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40
    - renewing_mist,if=var.renm_capped
    - enveloping_mist,cycle=members,if=!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.spiritfont_ready&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.sox_proc&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - renewing_mist,cycle=members,if=!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.zen_pulse_ready&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.zen_pulse_ready&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
    - thunder_focus_tea,range_check=none,if=var.tft_ready&var.renm_has_charge

  cotc_raid_hotjs:
    - renewing_mist,cycle=members,if=!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge
    - renewing_mist,if=var.renm_capped
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - enveloping_mist,cycle=members,if=var.spiritfont_ready&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.sox_proc&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - thunder_focus_tea,range_check=none,if=var.tft_ready&var.renm_has_charge
    - life_cocoon,interrupt=true,target=tanks.lowest,if=group.tanks.lowest.health.pct<config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.tanks.lowest.range<=40
    - life_cocoon,interrupt=true,target=dps.lowest,if=group.dps.lowest.health.pct<config.life_cocoon_threshold&cooldown.life_cocoon.ready&group.dps.lowest.range<=40

  cotc_mplus:
    - call_action_list,name=cotc_mplus_chiji,if=var.chiji_active
    - call_action_list,name=cotc_mplus_hotjs,if=var.hotjs_active
    - renewing_mist,cycle=members,if=var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40
    - renewing_mist,if=var.renm_capped
    - thunder_focus_tea,range_check=none,if=var.tft_ready&group.lowest.health.pct<60
    - enveloping_mist,cycle=members,if=lastcast.thunder_focus_tea<2&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<60&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.spiritfont_ready&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.sox_proc&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.heal_threshold&cycle.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.range<=40
    - invoke_chi_ji_the_red_crane,interrupt=true,if=config.auto_celestials&cooldown.invoke_chi_ji_the_red_crane.ready&var.group_needs_cd&group.lowest.range<=40
    - celestial_conduit,interrupt=true,if=config.auto_celestials&cooldown.celestial_conduit.ready&var.group_needs_conduit&group.lowest.range<=40
    - spinning_crane_kick,if=enemies.combat.8y>=config.aoe_threshold
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.pct<config.heal_threshold&group.lowest.range<=40
