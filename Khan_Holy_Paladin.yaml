    - call_action_list,name=virtue_window,if=var.in_bov
    - call_action_list,name=avenging_crusader_rotation,if=var.in_ac
    - call_action_list,name=moving,if=player.moving
    - call_action_list,name=preemptive_healing,if=target.casting&casting_target.health.effective.pct<config.word_of_glory_hp
    - call_action_list,name=mouseover_friendly,if=var.mo_friendly_valid&!player.casting
    - call_action_list,name=racial_offensive,if=var.in_burst
