version: "1.7.6"
spec: 65
name: "Holy Paladin - Wowhead / Herald of the Sun"
description: "Wowhead (HolyClarius) | Herald of the Sun | Midnight Season 1"
author: "Khan"
date: "2026-04-01"
patch: "12.0"
movement_allowed: true
entry: main
config:
  content_mode:
    section: "Profile v1.7.6 Best @ Raid ok m+ but Argent Crusade better at high keys"
    label: "Content Mode"
    type: dropdown
    options:
      - label: "Auto Mode Detection"
        value: 0
      - label: "Mythic+ (Eternal Flame / Word of Glory)"
        value: 1
      - label: "Raid (Light of Dawn priority)"
        value: 2
    default: 0
  lay_on_hands_hp:
    section: "Emergency"
    label: "Lay on Hands HP %"
    type: slider
    min: 1
    max: 100
    default: 15
  divine_shield_hp:
    section: "Emergency"
    label: "Divine Shield HP %"
    type: slider
    min: 1
    max: 100
    default: 15
  blessing_of_sacrifice_hp:
    section: "Emergency"
    label: "Blessing of Sacrifice HP %"
    type: slider
    min: 1
    max: 100
    default: 35
  bos_self_hp:
    section: "Emergency"
    label: "Blessing of Sacrifice min self HP %"
    type: slider
    min: 1
    max: 100
    default: 40
  emergency_hp:
    section: "Emergency"
    label: "Emergency HP %"
    type: slider
    min: 1
    max: 100
    default: 35
  divine_protection_hp:
    section: "Defensives"
    label: "Divine Protection HP %"
    type: slider
    min: 1
    max: 100
    default: 45
  defensive_cd_hp:
    section: "Defensives"
    label: "Defensive CD HP %"
    type: slider
    min: 1
    max: 100
    default: 55
  tank_hp:
    section: "Healing"
    label: "Tank Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 95
  tank_critical_hp:
    section: "Healing"
    label: "Tank Critical HP %"
    type: slider
    min: 1
    max: 100
    default: 55
  group_needs_hp:
    section: "Healing"
    label: "Group Needs Healing HP %"
    type: slider
    min: 1
    max: 100
    default: 90
  word_of_glory_hp:
    section: "Healing"
    label: "Word of Glory HP %"
    type: slider
    min: 1
    max: 100
    default: 95
  holy_shock_hp:
    section: "Healing"
    label: "Holy Shock HP %"
    type: slider
    min: 1
    max: 100
    default: 95
  flash_of_light_hp:
    section: "Healing"
    label: "Flash of Light HP %"
    type: slider
    min: 1
    max: 100
    default: 60
  holy_light_hp:
    section: "Healing"
    label: "Holy Light HP %"
    type: slider
    min: 1
    max: 100
    default: 55
  mana_holy_light:
    section: "Healing"
    label: "Holy Light min mana %"
    type: slider
    min: 1
    max: 100
    default: 30
  light_of_dawn_hp:
    section: "Healing"
    label: "Light of Dawn HP %"
    type: slider
    min: 1
    max: 100
    default: 90
  light_of_dawn_injured:
    section: "Healing"
    label: "Light of Dawn min injured count"
    type: slider
    min: 1
    max: 5
    default: 2
  auto_beacon_of_savior:
    section: "Beacons"
    label: "Beacon of the Savior (auto, lowest health)"
    type: checkbox
    default: true
  avenging_wrath_hp:
    section: "Cooldowns"
    label: "Avenging Wrath HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 55
  avenging_wrath_injured:
    section: "Cooldowns"
    label: "Avenging Wrath min injured count"
    type: slider
    min: 1
    max: 5
    default: 2
  aura_mastery_hp:
    section: "Cooldowns"
    label: "Aura Mastery HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 45
  aura_mastery_injured:
    section: "Cooldowns"
    label: "Aura Mastery min injured count"
    type: slider
    min: 1
    max: 5
    default: 3
  dt_hp_threshold:
    section: "Cooldowns"
    label: "Divine Toll HP %"
    type: slider
    min: 1
    max: 100
    default: 80
  bov_hp:
    section: "Cooldowns"
    label: "Beacon of Virtue HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 55
  beacon_of_virtue_injured:
    section: "Cooldowns"
    label: "Beacon of Virtue min injured count"
    type: slider
    min: 1
    max: 5
    default: 3
  mouseover_spells:
    section: "Utility"
    label: "Mouseover Spells"
    type: multi_select
    options:
      - label: "Lay on Hands"
        value: 0
      - label: "Word of Glory / Eternal Flame"
        value: 1
      - label: "Holy Shock"
        value: 2
      - label: "Flash of Light"
        value: 3
    default: []
  auto_blessing_of_freedom:
    section: "Utility"
    label: "Auto Blessing of Freedom"
    type: checkbox
    default: true
  arcane_torrent_mana:
    section: "Utility"
    label: "Arcane Torrent max mana %"
    type: slider
    min: 1
    max: 100
    default: 55
variables:
  use_herald: talent.herald_of_the_sun
  has_ac:                 talent.avenging_crusader
  has_bov:                talent.beacon_of_virtue
  has_holy_prism:         talent.holy_prism
  has_eternal_flame:      talent.eternal_flame
  has_empyrean_legacy:    talent.empyrean_legacy
  has_divine_purpose:     talent.divine_purpose
  has_hand_of_divinity:   talent.hand_of_divinity
  has_righteous_judgment: talent.righteous_judgment
  has_beacon_of_faith:    talent.beacon_of_faith
  has_tyrs_deliverance:   talent.tyrs_deliverance
  is_mplus: config.content_mode=1|(config.content_mode=0&!player.inraid)
  is_raid:  config.content_mode=2|(config.content_mode=0&player.inraid)
  hp_capped:     holy_power>=5
  hp_spendable:  holy_power>=3|buff.divine_purpose.up
  hp_deficit_ok: holy_power.deficit>=3
  in_aw:               buff.avenging_wrath.up
  in_ac:               buff.avenging_crusader.up
  in_burst:            buff.avenging_wrath.up|buff.avenging_crusader.up
  in_bov:              buff.beacon_of_virtue.up
  iof_proc:            buff.infusion_of_light.up
  dp_proc:             buff.divine_purpose.up
  el_proc:             buff.empyrean_legacy.up
  hod_proc:            buff.hand_of_divinity.up
  suns_avatar_up:      buff.suns_avatar.up
  tyrs_deliverance_up: buff.tyrs_deliverance.up
  rising_sunlight_up:  buff.rising_sunlight.up
  awakening_up:        buff.awakening.up
  holy_shock_ready:       cooldown.holy_shock.charges>=1
  avenging_wrath_ready:   cooldown.avenging_wrath.ready
  tyrs_deliverance_ready: var.has_tyrs_deliverance&cooldown.tyrs_deliverance.ready
  tank_needs_healing:   group.tanks.lowest.health.effective.pct<config.tank_hp
  tank_critical:        group.tanks.lowest.health.effective.pct<config.tank_critical_hp
  group_emergency:      group.count(cycle.health.effective.pct<config.emergency_hp)>=1
  group_critical:       group.count(cycle.health.effective.pct<config.emergency_hp)>=2
  group_needs_healing:  group.count(cycle.health.effective.pct<config.group_needs_hp)>=2
  needs_member_healing: group.lowest.health.effective.pct<config.word_of_glory_hp
  has_absorbs:          group.count(cycle.heal_absorb.pct>0)>=1
  mo_friendly_valid:    mouseover.exists&mouseover.alive&mouseover.friendly
  trinket1_living_silk: trinket_1.id=242393
  trinket2_living_silk: trinket_2.id=242393
  aw_condition:  group.count(cycle.health.effective.pct<config.avenging_wrath_hp)>=config.avenging_wrath_injured
  am_condition:  (group.count(cycle.health.effective.pct<config.aura_mastery_hp)>=config.aura_mastery_injured)|var.group_critical
  bov_condition: group.count(cycle.health.effective.pct<config.bov_hp)>=config.beacon_of_virtue_injured
lists:
  out_of_combat:
    - devotion_aura,if=buff.devotion_aura.down
    - beacon_of_light,cycle=tanks,if=!var.has_bov&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=var.has_beacon_of_faith&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down
    - redemption,cycle=members,if=cycle.dead
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.effective.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=cycle.health.effective.pct<config.flash_of_light_hp
  emergency:
    - divine_shield,interrupt=true,if=health.pct<config.divine_shield_hp&!debuff.forbearance.up
    - lay_on_hands,cycle=tanks,interrupt=true,if=cycle.health.effective.pct<config.lay_on_hands_hp
    - lay_on_hands,cycle=members,interrupt=true,if=cycle.health.effective.pct<config.lay_on_hands_hp
    - divine_protection,if=health.pct<config.divine_protection_hp&cooldown.divine_protection.ready
    - blessing_of_sacrifice,cycle=tanks,if=cycle.health.effective.pct<config.blessing_of_sacrifice_hp&health.pct>config.bos_self_hp
    - light_of_dawn,if=var.hp_capped&var.group_emergency&var.is_raid
    - eternal_flame,target=lowest,if=var.hp_capped&var.group_emergency&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.hp_capped&var.group_emergency&!var.has_eternal_flame&var.is_mplus
  interrupts:
    - hammer_of_justice,if=interrupt.target.check
    - hammer_of_justice.focus,if=interrupt.focus.check
    - blinding_light,if=interrupt.stun.aoe.check
    - quaking_palm,if=interrupt.cc.check
    - haymaker,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    - bull_rush,if=interrupt.stun.aoe.check
    - arcane_pulse,if=interrupt.stun.aoe.check
  beacon_maintenance:
    - beacon_of_light,cycle=tanks,if=!var.has_bov&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=var.has_beacon_of_faith&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down
  major_cooldowns:
    - avenging_wrath,if=!var.has_ac&var.avenging_wrath_ready&var.aw_condition
    - avenging_crusader,if=var.has_ac&cooldown.avenging_crusader.ready&!var.in_ac&var.aw_condition
    - aura_mastery,if=cooldown.aura_mastery.ready&var.am_condition
    - divine_toll,interrupt=true,if=cooldown.divine_toll.ready&holy_power<5&group.lowest.health.effective.pct<config.dt_hp_threshold&var.use_herald&(active_enemies>=2|!var.group_needs_healing)&target.enemy
    - divine_toll,target=lowest,interrupt=true,if=cooldown.divine_toll.ready&holy_power<5&group.lowest.health.effective.pct<config.dt_hp_threshold
    - holy_prism,if=var.has_holy_prism&holy_power<=2&cooldown.holy_prism.ready&var.group_needs_healing&target.enemy
    - holy_prism,target=lowest,if=var.has_holy_prism&holy_power<=2&cooldown.holy_prism.ready&var.group_needs_healing&!target.enemy
    - beacon_of_virtue,target=lowest,if=var.has_bov&cooldown.beacon_of_virtue.ready&var.bov_condition&var.hp_spendable
    - tyrs_deliverance,if=var.tyrs_deliverance_ready&var.group_needs_healing
  tank_healing:
    - light_of_dawn,if=var.hp_capped&var.tank_critical&var.is_raid
    - eternal_flame,target=tanks.lowest,if=var.hp_capped&var.has_eternal_flame&var.tank_critical
    - word_of_glory,target=tanks.lowest,if=var.hp_capped&!var.has_eternal_flame&var.tank_critical
    - holy_light,target=tanks.lowest,if=var.hod_proc
    - flash_of_light,target=tanks.lowest,if=var.iof_proc&var.tank_needs_healing
    - holy_shock,target=tanks.lowest,if=var.holy_shock_ready&var.tank_needs_healing
    - eternal_flame,target=tanks.lowest,if=var.hp_spendable&var.has_eternal_flame&var.tank_needs_healing
    - word_of_glory,target=tanks.lowest,if=var.hp_spendable&!var.has_eternal_flame&var.tank_needs_healing
    - flash_of_light,target=tanks.lowest,if=group.tanks.lowest.health.effective.pct<config.flash_of_light_hp
  virtue_window:
    - light_of_dawn,if=var.hp_capped&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.hp_capped&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_capped&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.dp_proc&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.dp_proc&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.dp_proc&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.effective.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.effective.pct<config.flash_of_light_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - judgment,if=var.hp_deficit_ok&target.enemy
  avenging_crusader_rotation:
    - light_of_dawn,if=var.hp_capped&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.hp_capped&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_capped&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.hp_capped&!var.group_needs_healing
    - light_of_dawn,if=var.dp_proc&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.dp_proc&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.dp_proc&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.dp_proc&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=var.in_ac&!var.in_aw&cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&holy_power.deficit>=1
    - consecration,if=var.has_righteous_judgment&!buff.consecration.up
    - holy_light,cycle=members,if=var.hod_proc&cycle.health.effective.pct<config.holy_light_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.effective.pct<config.flash_of_light_hp
  moving:
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.effective.pct<config.holy_shock_hp
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&target.enemy&!var.group_needs_healing
  preemptive_healing:
    - holy_shock,if=var.holy_shock_ready&casting_target.health.effective.pct<config.holy_shock_hp
    - flash_of_light,if=var.iof_proc&casting_target.health.effective.pct<config.flash_of_light_hp
  mouseover_friendly:
    - intercession.mouseover,if=mouseover.dead&health.pct>20
    - lay_on_hands.mouseover,if=config.mouseover_spells.has(0)&mouseover.health.effective.pct<config.lay_on_hands_hp
    - eternal_flame.mouseover,if=config.mouseover_spells.has(1)&mouseover.health.effective.pct<config.word_of_glory_hp&var.hp_spendable&var.has_eternal_flame
    - word_of_glory.mouseover,if=config.mouseover_spells.has(1)&mouseover.health.effective.pct<config.word_of_glory_hp&var.hp_spendable&!var.has_eternal_flame
    - holy_shock.mouseover,if=config.mouseover_spells.has(2)&mouseover.health.effective.pct<config.holy_shock_hp&var.holy_shock_ready
    - flash_of_light.mouseover,if=config.mouseover_spells.has(3)&mouseover.health.effective.pct<config.flash_of_light_hp
  trinkets:
    - trinket_1,if=var.trinket1_living_silk&trinket_1.ready&(var.in_burst|var.group_emergency)
    - trinket_2,if=var.trinket2_living_silk&trinket_2.ready&(var.in_burst|var.group_emergency)
    - trinket_1,if=!var.trinket1_living_silk&trinket_1.ready&trinket_1.sync
    - trinket_2,if=!var.trinket2_living_silk&trinket_2.ready&trinket_2.sync
    - trinket_1,if=!var.trinket1_living_silk&trinket_1.ready&var.group_emergency
    - trinket_2,if=!var.trinket2_living_silk&trinket_2.ready&var.group_emergency
  spenders:
    - eternal_flame,target=lowest,if=var.el_proc&var.has_eternal_flame
    - word_of_glory,target=lowest,if=var.el_proc&!var.has_eternal_flame
    - light_of_dawn,if=var.hp_capped&var.is_raid
    - eternal_flame,target=lowest,if=var.hp_capped&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.hp_capped&!var.has_eternal_flame&var.is_mplus
    - light_of_dawn,if=var.dp_proc&var.is_raid
    - eternal_flame,target=lowest,if=var.dp_proc&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.dp_proc&!var.has_eternal_flame&var.is_mplus
    - light_of_dawn,if=var.hp_spendable&var.is_raid&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured&!var.in_bov
    - eternal_flame,target=lowest,if=var.hp_spendable&var.has_eternal_flame&var.is_mplus&var.needs_member_healing
    - word_of_glory,target=lowest,if=var.hp_spendable&!var.has_eternal_flame&var.is_mplus&var.needs_member_healing
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
  generators:
    - consecration,if=var.has_righteous_judgment&!buff.consecration.up
    - holy_light,cycle=members,if=var.hod_proc&cycle.health.effective.pct<config.holy_light_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&var.tyrs_deliverance_up&cycle.health.effective.pct<config.holy_shock_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&var.rising_sunlight_up&cycle.health.effective.pct<config.holy_shock_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.effective.pct<config.holy_shock_hp
    - holy_shock,if=var.holy_shock_ready&target.enemy&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.effective.pct<config.flash_of_light_hp
    - judgment,if=var.iof_proc&!var.group_needs_healing&target.enemy
    - flash_of_light,cycle=members,if=cycle.health.effective.pct<config.flash_of_light_hp
  member_healing:
    - holy_shock,interrupt=true,cycle=members,if=cycle.heal_absorb.pct>0
    - eternal_flame,cycle=members,if=cycle.heal_absorb.pct>0&var.hp_spendable&var.has_eternal_flame
    - word_of_glory,cycle=members,if=cycle.heal_absorb.pct>0&var.hp_spendable&!var.has_eternal_flame
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.effective.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.hp_spendable&var.is_raid&group.count(cycle.health.effective.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.effective.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.effective.pct<config.flash_of_light_hp
    - holy_light,cycle=members,if=cycle.health.effective.pct<config.holy_light_hp&mana.pct>config.mana_holy_light
    - flash_of_light,cycle=members,if=cycle.health.effective.pct<config.flash_of_light_hp
  racial_defensive:
    - stoneform,if=player.dispelable.list.stoneform
    - fireblood,if=player.dispelable.list.fireblood
    - will_of_the_forsaken,if=player.feared|player.charmed
    - escape_artist,if=player.rooted
    - will_to_survive,if=player.stunned
    - gift_of_the_naaru,if=health.pct<35
    - regeneratin,if=health.pct<35&!player.combat
    - stoneform,if=health.pct<50
    - fireblood,if=health.pct<50
  racial_offensive:
    - berserking,if=var.in_burst
    - blood_fury,if=var.in_burst
    - ancestral_call,if=var.in_burst
    - fireblood,if=var.in_burst&!player.dispelable.list.fireblood
  racial_cc:
    - war_stomp,if=interrupt.stun.aoe.check
    - quaking_palm,if=target.casting.interruptible
    - haymaker,if=target.casting.interruptible
    - bull_rush,if=target.casting.interruptible
    - arcane_pulse,if=enemies.8y.count>=3
  racial_utility:
    - arcane_torrent,if=mana.pct<=config.arcane_torrent_mana
    - gift_of_the_naaru,target=lowest,if=group.lowest.health.effective.pct<60
    - bag_of_tricks,target=lowest,if=group.lowest.health.effective.pct<60
    - shadowmeld,if=target.threat>=3&!player.casting
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    - return,if=player.channeling
    - call_action_list,name=emergency
    - call_action_list,name=major_cooldowns
    - call_action_list,name=racial_defensive
    - call_action_list,name=interrupts
    - call_action_list,name=racial_cc
    - return,if=player.cc
