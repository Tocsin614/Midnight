# ============================================================================
# Holy Paladin — Midnight Season 1  [Wowhead/Herald of the Sun]  v1.4.0
# ============================================================================

version: "1.4.0"
spec: 65
name: "Holy Paladin - Wowhead / Herald of the Sun"
description: "Wowhead (HolyClarius) | Herald of the Sun | Midnight Season 1"
author: "Khan"
date: "2026-03-18"
patch: "12.0"

movement_allowed: true

# ============================================================================
# CONFIG
# ============================================================================
config:

  # ── Profile ────────────────────────────────────────────────────────────────
  # Wowhead (HolyClarius) | Herald of the Sun
  content_mode:
    section: "Profile"
    label: "Content Mode"
    type: dropdown
    options:
      - label: "Mythic+ (Eternal Flame / Word of Glory)"
        value: 1
      - label: "Raid (Light of Dawn priority)"
        value: 2
    default: 1

  # ── Emergency ─────────────────────────────────────────────────────────────
  lay_on_hands_hp:
    section: "Emergency"
    label: "Lay on Hands HP %"
    type: slider
    min: 1
    max: 100
    default: 15

  divine_shield_hp:
    section: "Emergency"
    label: "Divine Shield HP %"
    type: slider
    min: 1
    max: 100
    default: 15

  blessing_of_sacrifice_hp:
    section: "Emergency"
    label: "Blessing of Sacrifice HP %"
    type: slider
    min: 1
    max: 100
    default: 35

  bos_self_hp:
    section: "Emergency"
    label: "Blessing of Sacrifice min self HP %"
    type: slider
    min: 1
    max: 100
    default: 40

  emergency_hp:
    section: "Emergency"
    label: "Emergency HP %"
    type: slider
    min: 1
    max: 100
    default: 35

  # ── Defensives ────────────────────────────────────────────────────────────
  divine_protection_hp:
    section: "Defensives"
    label: "Divine Protection HP %"
    type: slider
    min: 1
    max: 100
    default: 45

  defensive_cd_hp:
    section: "Defensives"
    label: "Defensive CD HP %"
    type: slider
    min: 1
    max: 100
    default: 55

  # ── Healing ───────────────────────────────────────────────────────────────
  tank_hp:
    section: "Healing"
    label: "Tank Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 95

  tank_critical_hp:
    section: "Healing"
    label: "Tank Critical HP %"
    type: slider
    min: 1
    max: 100
    default: 55

  group_needs_hp:
    section: "Healing"
    label: "Group Needs Healing HP %"
    type: slider
    min: 1
    max: 100
    default: 90

  word_of_glory_hp:
    section: "Healing"
    label: "Word of Glory HP %"
    type: slider
    min: 1
    max: 100
    default: 95

  holy_shock_hp:
    section: "Healing"
    label: "Holy Shock HP %"
    type: slider
    min: 1
    max: 100
    default: 95

  flash_of_light_hp:
    section: "Healing"
    label: "Flash of Light HP %"
    type: slider
    min: 1
    max: 100
    default: 60

  holy_light_hp:
    section: "Healing"
    label: "Holy Light HP %"
    type: slider
    min: 1
    max: 100
    default: 55

  mana_holy_light:
    section: "Healing"
    label: "Holy Light min mana %"
    type: slider
    min: 1
    max: 100
    default: 30

  light_of_dawn_hp:
    section: "Healing"
    label: "Light of Dawn HP %"
    type: slider
    min: 1
    max: 100
    default: 90

  light_of_dawn_injured:
    section: "Healing"
    label: "Light of Dawn min injured count"
    type: slider
    min: 1
    max: 5
    default: 2

  # ── Beacons ───────────────────────────────────────────────────────────────
  # Beacon of Light always on tank | Beacon of Faith cycles lowest DPS
  auto_beacon_of_savior:
    section: "Beacons"
    label: "Beacon of the Savior (auto, lowest health)"
    type: checkbox
    default: true

  # ── Cooldowns ─────────────────────────────────────────────────────────────
  avenging_wrath_hp:
    section: "Cooldowns"
    label: "Avenging Wrath HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 55

  avenging_wrath_injured:
    section: "Cooldowns"
    label: "Avenging Wrath min injured count"
    type: slider
    min: 1
    max: 5
    default: 2

  aura_mastery_hp:
    section: "Cooldowns"
    label: "Aura Mastery HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 45

  aura_mastery_injured:
    section: "Cooldowns"
    label: "Aura Mastery min injured count"
    type: slider
    min: 1
    max: 5
    default: 3

  dt_hp_threshold:
    section: "Cooldowns"
    label: "Divine Toll HP %"
    type: slider
    min: 1
    max: 100
    default: 80

  bov_hp:
    section: "Cooldowns"
    label: "Beacon of Virtue HP threshold %"
    type: slider
    min: 1
    max: 100
    default: 55

  beacon_of_virtue_injured:
    section: "Cooldowns"
    label: "Beacon of Virtue min injured count"
    type: slider
    min: 1
    max: 5
    default: 3

  # ── Mouseover ─────────────────────────────────────────────────────────────
  # Uncheck any spell to disable its mouseover cast
  mouseover_spells:
    section: "Mouseover"
    label: "Mouseover Spells"
    type: multi_select
    options:
      - label: "Lay on Hands"
        value: 1
      - label: "Word of Glory / Eternal Flame"
        value: 2
      - label: "Holy Shock"
        value: 3
      - label: "Flash of Light"
        value: 4
    default_values: [1, 2, 3, 4]

  # ── Utility ───────────────────────────────────────────────────────────────
  auto_blessing_of_freedom:
    section: "Utility"
    label: "Auto Blessing of Freedom"
    type: checkbox
    default: true

  auto_cleanse:
    section: "Utility"
    label: "Auto Cleanse Debuffs"
    type: checkbox
    default: true

  arcane_torrent_mana:
    section: "Utility"
    label: "Arcane Torrent max mana %"
    type: slider
    min: 1
    max: 100
    default: 55

# ============================================================================
# VARIABLES
# ============================================================================
variables:

  # ── Hero Talent ────────────────────────────────────────────────────────────
  use_herald: talent.herald_of_the_sun

  # ── Talent Flags ───────────────────────────────────────────────────────────
  has_ac:                 talent.avenging_crusader
  has_bov:                talent.beacon_of_virtue
  has_holy_prism:         talent.holy_prism
  has_eternal_flame:      talent.eternal_flame
  has_empyrean_legacy:    talent.empyrean_legacy
  has_divine_purpose:     talent.divine_purpose
  has_hand_of_divinity:   talent.hand_of_divinity
  has_righteous_judgment: talent.righteous_judgment
  has_beacon_of_faith:    talent.beacon_of_faith
  has_tyrs_deliverance:   talent.tyrs_deliverance

  # ── Content Mode ──────────────────────────────────────────────────────────
  is_mplus: config.content_mode=1
  is_raid:  config.content_mode=2

  # ── Holy Power ────────────────────────────────────────────────────────────
  hp_capped:     holy_power>=5
  hp_spendable:  holy_power>=3|buff.divine_purpose.up
  hp_deficit_ok: holy_power.deficit>=3

  # ── Buffs ─────────────────────────────────────────────────────────────────
  in_aw:               buff.avenging_wrath.up
  in_ac:               buff.avenging_crusader.up
  in_burst:            buff.avenging_wrath.up|buff.avenging_crusader.up
  in_bov:              buff.beacon_of_virtue.up
  iof_proc:            buff.infusion_of_light.up
  dp_proc:             buff.divine_purpose.up
  el_proc:             buff.empyrean_legacy.up
  hod_proc:            buff.hand_of_divinity.up
  suns_avatar_up:      buff.suns_avatar.up
  tyrs_deliverance_up: buff.tyrs_deliverance.up
  rising_sunlight_up:  buff.rising_sunlight.up
  awakening_up:        buff.awakening.up

  # ── Cooldowns ─────────────────────────────────────────────────────────────
  holy_shock_ready:       cooldown.holy_shock.charges>=1
  avenging_wrath_ready:   cooldown.avenging_wrath.ready
  tyrs_deliverance_ready: var.has_tyrs_deliverance&cooldown.tyrs_deliverance.ready

  # ── Group Health ──────────────────────────────────────────────────────────
  tank_needs_healing:   group.tanks.lowest.health.pct<config.tank_hp
  tank_critical:        group.tanks.lowest.health.pct<config.tank_critical_hp
  group_emergency: group.count(cycle.health.pct<config.emergency_hp)>=1
  group_critical:  group.count(cycle.health.pct<config.emergency_hp)>=2
  group_needs_healing:  group.count(cycle.health.pct<config.group_needs_hp)>=2
  needs_member_healing: group.lowest.health.pct<config.word_of_glory_hp

  # ── CD Gates ──────────────────────────────────────────────────────────────
  aw_condition:  group.count(cycle.health.pct<config.avenging_wrath_hp)>=config.avenging_wrath_injured
  am_condition:  (group.count(cycle.health.pct<config.aura_mastery_hp)>=config.aura_mastery_injured)|var.group_critical
  bov_condition: group.count(cycle.health.pct<config.bov_hp)>=config.beacon_of_virtue_injured

  # ── Mouseover ─────────────────────────────────────────────────────────────
  mo_valid: mouseover.exists&mouseover.alive&mouseover.friendly


# ============================================================================
# LISTS
# ============================================================================
lists:

  # Out of combat — aura, beacons, rez, post/pre-pull heals
  out_of_combat:
    - devotion_aura,if=buff.devotion_aura.down
    - beacon_of_light,cycle=tanks,if=!var.has_bov&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=var.has_beacon_of_faith&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down
    - redemption,cycle=members,if=cycle.dead
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=cycle.health.pct<config.flash_of_light_hp

  # Emergency — interrupt=true overrides current cast
  emergency:
    - divine_shield,interrupt=true,if=health.pct<config.divine_shield_hp&!debuff.forbearance.up
    - lay_on_hands,cycle=tanks,interrupt=true,if=cycle.health.pct<config.lay_on_hands_hp&cycle.range<=40
    - lay_on_hands,cycle=members,interrupt=true,if=cycle.health.pct<config.lay_on_hands_hp&cycle.range<=40
    - divine_protection,if=health.pct<config.divine_protection_hp&cooldown.divine_protection.ready
    - blessing_of_sacrifice,cycle=tanks,if=cycle.health.pct<config.blessing_of_sacrifice_hp&health.pct>config.bos_self_hp
    - light_of_dawn,if=var.hp_capped&var.group_emergency&var.is_raid
    - eternal_flame,target=lowest,if=var.hp_capped&var.group_emergency&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.hp_capped&var.group_emergency&!var.has_eternal_flame&var.is_mplus

  # Interrupts — uses dev interrupt.X.check syntax
  interrupts:
    - hammer_of_justice,if=interrupt.target.check
    - hammer_of_justice.mouseover,if=interrupt.mouseover.check
    - hammer_of_justice.focus,if=interrupt.focus.check
    - blinding_light,if=interrupt.stun.aoe.check
    - quaking_palm,if=interrupt.cc.check
    - haymaker,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    - bull_rush,if=interrupt.stun.aoe.check
    - arcane_pulse,if=interrupt.stun.aoe.check

  # Utility — dispels and freedom
  utility:
    - cleanse,cycle=members,if=config.auto_cleanse&cycle.dispelable.list&cycle.range<=40
    - blessing_of_freedom.player,if=config.auto_blessing_of_freedom&(player.rooted|player.has_magic_debuff)
    - blessing_of_freedom,cycle=members,if=config.auto_blessing_of_freedom&(cycle.debuff.snare.up|cycle.debuff.root.up)&cycle.range<=40

  # Beacon maintenance
  beacon_maintenance:
    - beacon_of_light,cycle=tanks,if=!var.has_bov&group.count(cycle.buff.beacon_of_light.up)=0&cycle.range<=40
    - beacon_of_faith,cycle=dps,if=var.has_beacon_of_faith&group.count(cycle.buff.beacon_of_faith.up)=0&cycle.range<=40
    - beacon_of_the_savior,if=config.auto_beacon_of_savior&buff.beacon_of_the_savior.down

  # Major cooldowns — all need-based, never fire on a full-health group
  major_cooldowns:
    - avenging_wrath,if=!var.has_ac&var.avenging_wrath_ready&var.aw_condition
    - avenging_crusader,if=var.has_ac&cooldown.avenging_crusader.ready&!var.in_ac&var.aw_condition
    - aura_mastery,if=cooldown.aura_mastery.ready&var.am_condition
    # DT — inline only (variable chain fails); interrupt=true so casts don't delay it
    - divine_toll,interrupt=true,if=cooldown.divine_toll.ready&holy_power<5&group.lowest.health.pct<config.dt_hp_threshold&var.use_herald&(active_enemies>=2|!var.group_needs_healing)&target.enemy
    - divine_toll,target=lowest,interrupt=true,if=cooldown.divine_toll.ready&holy_power<5&group.lowest.health.pct<config.dt_hp_threshold
    - holy_prism,if=var.has_holy_prism&holy_power<=2&cooldown.holy_prism.ready&var.group_needs_healing&target.enemy
    - holy_prism,target=lowest,if=var.has_holy_prism&holy_power<=2&cooldown.holy_prism.ready&var.group_needs_healing&!target.enemy
    - beacon_of_virtue,target=lowest,if=var.has_bov&cooldown.beacon_of_virtue.ready&var.bov_condition&var.hp_spendable
    - tyrs_deliverance,if=var.tyrs_deliverance_ready&var.group_needs_healing

  # Tank healing — priority path before general rotation
  tank_healing:
    - light_of_dawn,if=var.hp_capped&var.tank_critical&var.is_raid
    - eternal_flame,target=tanks.lowest,if=var.hp_capped&var.has_eternal_flame&var.tank_critical
    - word_of_glory,target=tanks.lowest,if=var.hp_capped&!var.has_eternal_flame&var.tank_critical
    - holy_light,target=tanks.lowest,if=var.hod_proc
    - flash_of_light,target=tanks.lowest,if=var.iof_proc&var.tank_needs_healing
    - holy_shock,target=tanks.lowest,if=var.holy_shock_ready&var.tank_needs_healing
    - eternal_flame,target=tanks.lowest,if=var.hp_spendable&var.has_eternal_flame&var.tank_needs_healing
    - word_of_glory,target=tanks.lowest,if=var.hp_spendable&!var.has_eternal_flame&var.tank_needs_healing
    - flash_of_light,target=tanks.lowest,if=group.tanks.lowest.health.pct<config.flash_of_light_hp

  # Mouseover — mo_valid gate prevents misfires on enemies/dead
  mouseover_members:
    - intercession.mouseover,if=mouseover.dead
    - lay_on_hands.mouseover,if=config.mouseover_spells.has(1)&mouseover.health.pct<config.lay_on_hands_hp
    - eternal_flame.mouseover,if=config.mouseover_spells.has(2)&var.has_eternal_flame&mouseover.health.pct<config.word_of_glory_hp&var.hp_spendable
    - word_of_glory.mouseover,if=config.mouseover_spells.has(2)&!var.has_eternal_flame&mouseover.health.pct<config.word_of_glory_hp&var.hp_spendable
    - holy_shock.mouseover,if=config.mouseover_spells.has(3)&mouseover.health.pct<config.holy_shock_hp&var.holy_shock_ready
    - flash_of_light.mouseover,if=config.mouseover_spells.has(4)&mouseover.health.pct<config.flash_of_light_hp

  # Virtue window — active while Beacon of Virtue is up
  virtue_window:
    - light_of_dawn,if=var.hp_capped&group.count(cycle.health.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.hp_capped&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_capped&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.dp_proc&group.count(cycle.health.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.dp_proc&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.dp_proc&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.pct<config.flash_of_light_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - judgment,if=var.hp_deficit_ok&target.enemy

  # Avenging Crusader — Judgment and CS convert to healing; maximize both
  avenging_crusader_rotation:
    - light_of_dawn,if=var.hp_capped&group.count(cycle.health.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.hp_capped&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_capped&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.hp_capped&!var.group_needs_healing
    - light_of_dawn,if=var.dp_proc&group.count(cycle.health.pct<config.light_of_dawn_hp)>=2
    - eternal_flame,cycle=members,if=var.dp_proc&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.dp_proc&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.dp_proc&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=var.in_ac&!var.in_aw&cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&holy_power.deficit>=1
    - consecration,if=var.has_righteous_judgment&!buff.consecration.up
    - holy_light,cycle=members,if=var.hod_proc&cycle.health.pct<config.holy_light_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.pct<config.flash_of_light_hp

  # Moving — instant-only rotation
  moving:
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock_hp
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.hp_spendable&group.count(cycle.health.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - holy_shock,if=var.holy_shock_ready&target.enemy&!var.group_needs_healing

  # Preemptive heal while enemy is casting
  preemptive_healing:
    - holy_shock,if=var.holy_shock_ready&casting_target.health.pct<config.holy_shock_hp
    - flash_of_light,if=var.iof_proc&casting_target.health.pct<config.flash_of_light_hp

  # Trinkets — framework sync handles burst window and CD checks
  trinkets:
    - trinket_1,if=trinket_1.sync
    - trinket_2,if=trinket_2.sync

  # Spenders — Wowhead: EL proc → HP cap → DP proc → 3+ HP → SotR DPS
  spenders:
    - eternal_flame,target=lowest,if=var.el_proc&var.has_eternal_flame
    - word_of_glory,target=lowest,if=var.el_proc&!var.has_eternal_flame
    - light_of_dawn,if=var.hp_capped&var.is_raid
    - eternal_flame,target=lowest,if=var.hp_capped&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.hp_capped&!var.has_eternal_flame&var.is_mplus
    - light_of_dawn,if=var.dp_proc&var.is_raid
    - eternal_flame,target=lowest,if=var.dp_proc&var.has_eternal_flame&var.is_mplus
    - word_of_glory,target=lowest,if=var.dp_proc&!var.has_eternal_flame&var.is_mplus
    - light_of_dawn,if=var.hp_spendable&var.is_raid&group.count(cycle.health.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured&!var.in_bov
    - eternal_flame,target=lowest,if=var.hp_spendable&var.has_eternal_flame&var.is_mplus&var.needs_member_healing
    - word_of_glory,target=lowest,if=var.hp_spendable&!var.has_eternal_flame&var.is_mplus&var.needs_member_healing
    - shield_of_the_righteous,if=var.hp_spendable&!var.group_needs_healing

  # Generators — Holy Shock on cooldown above all else
  generators:
    - consecration,if=var.has_righteous_judgment&!buff.consecration.up
    - holy_light,cycle=members,if=var.hod_proc&cycle.health.pct<config.holy_light_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&var.tyrs_deliverance_up&cycle.health.pct<config.holy_shock_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&var.rising_sunlight_up&cycle.health.pct<config.holy_shock_hp
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock_hp
    - holy_shock,if=var.holy_shock_ready&target.enemy&!var.group_needs_healing
    - hammer_of_wrath,override=judgment,if=var.in_burst&holy_power.deficit>=1
    - judgment,if=cooldown.judgment.ready&target.enemy&holy_power.deficit>=1
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.pct<config.flash_of_light_hp
    - judgment,if=var.iof_proc&!var.group_needs_healing&target.enemy
    - flash_of_light,cycle=members,if=cycle.health.pct<config.flash_of_light_hp

  # Member healing — cycles group when anyone is below word_of_glory_hp
  member_healing:
    - eternal_flame,cycle=members,if=var.hp_spendable&var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - word_of_glory,cycle=members,if=var.hp_spendable&!var.has_eternal_flame&cycle.health.pct<config.word_of_glory_hp
    - light_of_dawn,if=var.hp_spendable&var.is_raid&group.count(cycle.health.pct<config.light_of_dawn_hp)>=config.light_of_dawn_injured
    - holy_shock,cycle=members,if=var.holy_shock_ready&cycle.health.pct<config.holy_shock_hp
    - flash_of_light,cycle=members,if=var.iof_proc&cycle.health.pct<config.flash_of_light_hp
    - holy_light,cycle=members,if=cycle.health.pct<config.holy_light_hp&mana.pct>config.mana_holy_light
    - flash_of_light,cycle=members,if=cycle.health.pct<config.flash_of_light_hp

  # Racial — Arcane Torrent (Blood Elf mana return only)
  racial:
    - arcane_torrent,if=mana.pct<=config.arcane_torrent_mana

  # Main
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=auto_combat.player
    - return,if=player.channeling
    - call_action_list,name=emergency
    - call_action_list,name=major_cooldowns
    - call_action_list,name=interrupts
    - return,if=player.cc
    - call_action_list,name=utility
    - call_action_list,name=beacon_maintenance
    - call_action_list,name=mouseover_members,if=config.mouseover_spells>0&var.mo_valid&!player.casting
    - call_action_list,name=virtue_window,if=var.in_bov
    - call_action_list,name=avenging_crusader_rotation,if=var.in_ac
    - call_action_list,name=moving,if=player.moving
    - call_action_list,name=preemptive_healing,if=target.casting&casting_target.health.pct<config.word_of_glory_hp
    - call_action_list,name=racial
    - call_action_list,name=trinkets
    - call_action_list,name=tank_healing,if=var.tank_needs_healing
    - call_action_list,name=spenders
    - call_action_list,name=member_healing,if=var.needs_member_healing
    - call_action_list,name=generators
    - return,if=auto_combat.target