version: V2.0.0
author: Khan
spec: 270
name: Khan's Mistweaver Monk
description: |
  Mistweaver Monk healing rotation for Midnight 12.0.
  Method.gg guide-informed priority system.
  TFT usage split by hero build: CotC → ReM (haste/Flowing Wisdom),
  MoH → EnvM (versatility/Aspect of Harmony proc).
  Proper Yu'lon opener (TFT→ReM → Yu'lon → EnvM×2 → ReM → RWK → instant Vivify).
  Proper Chi-Ji opener (TFT→EnvM → Chi-Ji → instant EnvM → RSK → BOK→ RSK reset).
  Celestial Conduit channel support (alternate RWK/ReM for CDR ramp).
  Zen Pulse proc awareness, Vivacious Vivification instant Vivify tracking.
  Rushing Wind Kick / Rising Sun Kick content-aware interchangeability.

entry: main

movement_allowed: true

config:

  content_type:
    label: "Content Type"
    type: dropdown
    options:
      - label: "Auto (M+ default)"
        value: 0
      - label: "Raid"
        value: 1
      - label: "Mythic+"
        value: 2
    default: 0

  emergency_hp:
    label: "Emergency HP %"
    type: slider
    min: 1
    max: 100
    default: 35

  tank_heal_hp:
    label: "Tank Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 80

  member_heal_hp:
    label: "Member Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 65

  enveloping_hp:
    label: "Enveloping Mist HP %"
    type: slider
    min: 1
    max: 100
    default: 70

  soothing_mist_hp:
    label: "Soothing Mist HP %"
    type: slider
    min: 1
    max: 100
    default: 85

  vivify_group_count:
    label: "Vivify Min Injured"
    type: slider
    min: 1
    max: 5
    default: 1

  mana_tea_threshold:
    label: "Mana Tea Below %"
    type: slider
    min: 1
    max: 100
    default: 50

  low_mana_threshold:
    label: "Low Mana Conserve %"
    type: slider
    min: 1
    max: 100
    default: 25

  yulon_trigger_count:
    label: "Yu'lon Injured Count"
    type: slider
    min: 1
    max: 5
    default: 3

  chiji_trigger_count:
    label: "Chi-Ji Injured Count"
    type: slider
    min: 1
    max: 4
    default: 2

  hero_build:
    label: "Hero Talent Build"
    type: dropdown
    options:
      - label: "Auto-Detect"
        value: 0
      - label: "Conduit of the Celestials"
        value: 1
      - label: "Master of Harmony"
        value: 2
    default: 1

  auto_dispel:
    label: "Auto Dispel"
    type: checkbox
    default: true

  trinket_usage:
    label: "Trinket Usage"
    type: dropdown
    options:
      - label: "On Cooldown"
        value: 1
      - label: "With Major Cooldowns"
        value: 2
      - label: "When Group Damaged"
        value: 3
      - label: "Manual Only"
        value: 0
    default: 2

variables:

  # === HERO BUILD DETECTION ===
  cotc_build: config.hero_build=1|talent.celestial_harmony.enabled
  moh_build: config.hero_build=2|(!talent.celestial_harmony.enabled&config.hero_build=0)

  # === CONTENT TYPE ===
  is_raid: config.content_type=1
  is_mythic_plus: config.content_type=2|(config.content_type=0)

  # === GROUP HEALTH STATE ===
  needs_emergency: group.lowest.health.pct<config.emergency_hp
  needs_tank_healing: group.tanks.lowest.health.pct<config.tank_heal_hp
  needs_member_healing: group.lowest.health.pct<config.member_heal_hp
  group_heavy_damage: group.count(cycle.health.pct<config.member_heal_hp)>=config.vivify_group_count
  group_critical: group.count(cycle.health.pct<config.emergency_hp)>=3
  tank_emergency: group.tanks.lowest.health.pct<config.emergency_hp
  player_low: health.pct<config.emergency_hp
  player_needs_healing: health.pct<config.member_heal_hp

  # === MANA STATE ===
  mana_ok: mana.pct>config.low_mana_threshold
  mana_healthy: mana.pct>50

  # === COOLDOWN READINESS ===
  rsk_ready: cooldown.rising_sun_kick.ready
  rwk_ready: cooldown.rushing_wind_kick.ready
  tft_ready: cooldown.thunder_focus_tea.ready
  life_cocoon_ready: cooldown.life_cocoon.ready
  revival_ready: cooldown.revival.ready|cooldown.restoral.ready
  yulon_ready: cooldown.invoke_yulon_the_jade_serpent.ready
  chiji_ready: cooldown.invoke_chi_ji_the_red_crane.ready
  mana_tea_ready: cooldown.mana_tea.ready
  celestial_conduit_ready: cooldown.celestial_conduit.ready

  # === ACTIVE BUFFS ===
  tft_up: buff.thunder_focus_tea.up
  teachings_up: buff.teachings_of_the_monastery.up
  teachings_stacks: buff.teachings_of_the_monastery.stack
  chiji_active: buff.invoke_chi_ji_the_red_crane.up
  yulon_active: buff.invoke_yulon_the_jade_serpent.up
  in_celestial_window: var.chiji_active|var.yulon_active
  # Celestial Conduit channel — CotC active ability providing CDR on RWK + ReM
  celestial_conduit_channel: player.channeling&buff.celestial_conduit.up
  # Vivacious Vivification proc — next Vivify is instant and free
  vivacious_vivify_ready: buff.vivacious_vivification.up
  # Zen Pulse proc — triggered by Vivify after TFT (Deep Clarity talent)
  zen_pulse_ready: buff.zen_pulse.up
  # Spiritfont — triggered when TFT is used with EnvM
  spiritfont_active: buff.spiritfont.up

  # === RENEWING MIST MANAGEMENT ===
  rem_charges_full: cooldown.renewing_mist.charges>=2
  rem_charges_have: cooldown.renewing_mist.charges>=1
  rem_wide_coverage: group.count(cycle.buff.renewing_mist.up)>=4

  # === TFT TARGETING LOGIC (split by hero build, per Method.gg) ===
  # CotC: TFT → ReM — longer duration, Secret Infusion haste, Flowing Wisdom + Heart of the Jade Serpent
  # MoH:  TFT → EnvM — Secret Infusion versatility, Aspect of Harmony proc, Spiritfont trigger
  # Both: Override to EnvM for tank emergency burst
  tft_target_envm_emergency: var.tft_up&var.tank_emergency
  tft_target_envm_moh: var.tft_up&var.moh_build&!var.tft_target_envm_emergency
  tft_target_rem_cotc: var.tft_up&var.cotc_build&!var.tft_target_envm_emergency
  # During celestial openers: TFT→ReM for Yu'lon (haste), TFT→EnvM for Chi-Ji (versatility+Spiritfont)
  tft_yulon_opener: var.tft_up&var.yulon_active&var.cotc_build
  tft_chiji_opener: var.tft_up&var.chiji_active

lists:

  spell_queue:
    - queue_spell

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.loot_nearby

  pre_pull_setup:
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40

  out_of_combat:
    - expel_harm,range_check=none,if=var.player_needs_healing&cooldown.expel_harm.ready
    - soothing_mist.player,range_check=none,if=var.player_needs_healing&!player.channeling
    - enveloping_mist.player,casting_check=soothing_mist,range_check=none,if=var.player_needs_healing&buff.enveloping_mist.remains<3
    - renewing_mist.player,casting_check=soothing_mist,range_check=none,if=var.player_needs_healing&buff.renewing_mist.down
    - enveloping_mist,casting_check=soothing_mist,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.buff.enveloping_mist.remains<3&cycle.range>0&cycle.range<=40
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40

  auto_target:
    - target_enemy,if=player.combat&(!target.exists|target.dead|target.friendly)&active_enemies>0
    - target_enemy,if=player.combat&!target.valid&active_enemies>0

  dispel:
    - detox,cycle=members,if=config.auto_dispel&cycle.dispelable.list&cycle.range>0&cycle.range<=40

  emergency_healing:
    # Life Cocoon — instant absorb on dying target
    - life_cocoon,cycle=members,interrupt=true,range_check=none,if=player.combat&var.life_cocoon_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=40
    - life_cocoon.player,interrupt=true,range_check=none,if=player.combat&var.life_cocoon_ready&var.player_low
    # Revival / Restoral — mass group save
    - revival,interrupt=true,range_check=none,if=cooldown.revival.ready&var.group_critical
    - restoral,interrupt=true,range_check=none,if=talent.restoral.enabled&cooldown.restoral.ready&var.group_critical
    # TFT → EnvM emergency burst (both builds override to EnvM for tank emergency)
    - thunder_focus_tea,interrupt=true,range_check=none,if=var.tft_ready&!var.tft_up&var.tank_emergency
    - enveloping_mist,cycle=tanks,interrupt=true,if=var.tft_up&var.tank_emergency&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,interrupt=true,if=var.tft_up&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    # EnvM direct on emergency targets
    - enveloping_mist,cycle=tanks,interrupt=true,if=var.tank_emergency&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # M+: Sheilun's Gift preferred for emergency single target
    - sheiluns_gift,cycle=members,interrupt=true,if=talent.sheiluns_gift.enabled&(var.is_mythic_plus|!talent.vivify.enabled)&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,interrupt=true,if=cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    - sheiluns_gift.player,interrupt=true,if=talent.sheiluns_gift.enabled&var.player_low
    - vivify.player,interrupt=true,if=var.player_low

  defensive_cooldowns:
    - fortifying_brew,interrupt=true,range_check=none,if=player.combat&var.player_low&cooldown.fortifying_brew.ready
    - expel_harm,range_check=none,if=health.pct<config.member_heal_hp&cooldown.expel_harm.ready

  major_cooldowns:
    # Yu'lon — raid preferred; heavy group damage window
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&var.is_raid&var.group_heavy_damage&!var.chiji_active
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&var.is_raid&group.count(cycle.health.pct<70)>=config.yulon_trigger_count
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&var.is_raid&state.cds
    # Chi-Ji — M+ preferred; mana-efficient active CD, very short CD
    - invoke_chi_ji_the_red_crane,if=player.combat&var.chiji_ready&var.is_mythic_plus&var.needs_member_healing&!var.yulon_active
    - invoke_chi_ji_the_red_crane,if=player.combat&var.chiji_ready&var.is_mythic_plus&group.count(cycle.health.pct<80)>=config.chiji_trigger_count
    # Fallback: use whichever celestial is available if content_type=auto and state.cds
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&!var.chiji_active&state.cds
    - invoke_chi_ji_the_red_crane,if=player.combat&var.chiji_ready&!var.yulon_active&state.cds
    # Celestial Conduit (CotC active ability — triggers CDR window on RWK + ReM)
    - celestial_conduit,if=player.combat&talent.celestial_conduit.enabled&var.celestial_conduit_ready&var.group_heavy_damage&!var.in_celestial_window
    - celestial_conduit,if=player.combat&talent.celestial_conduit.enabled&var.celestial_conduit_ready&state.cds
    # Mana Tea — use when low mana OR during safe (no active healing) windows with stacks
    - mana_tea,range_check=none,if=player.combat&var.mana_tea_ready&mana.pct<config.mana_tea_threshold
    - mana_tea,range_check=none,if=player.combat&talent.refreshment.enabled&var.mana_tea_ready&!var.needs_member_healing&buff.mana_tea.stack>=3
    # Burst heals during heavy damage
    - sheiluns_gift,if=player.combat&talent.sheiluns_gift.enabled&var.is_mythic_plus&var.group_heavy_damage&var.mana_ok
    - vivify,if=player.combat&var.is_raid&var.group_heavy_damage&var.mana_ok

  trinkets:
    - trinket_1,if=trinket_1.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.in_celestial_window)|(config.trinket_usage=3&var.group_heavy_damage))
    - trinket_2,if=trinket_2.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.in_celestial_window)|(config.trinket_usage=3&var.group_heavy_damage))

  # === THUNDER FOCUS TEA ===
  # CotC build (Method.gg): TFT → ReM — longer duration, Secret Infusion haste,
  #   Flowing Wisdom + Heart of the Jade Serpent interaction
  # MoH build (Method.gg): TFT → EnvM — Secret Infusion versatility, Aspect of Harmony proc, Spiritfont
  # Both: Emergency always overrides to EnvM for instant burst on dying target
  # Yu'lon opener: TFT → ReM (haste for celestial window, skip if already haste buffed)
  # Chi-Ji opener: TFT → EnvM (versatility + Spiritfont trigger)
  thunder_focus_tea_usage:
    # 1. Emergency override — tank dying, TFT → EnvM instant bomb (both builds)
    - thunder_focus_tea,interrupt=true,range_check=none,if=player.combat&var.tft_ready&!var.tft_up&var.tank_emergency
    - enveloping_mist,cycle=tanks,if=var.tft_target_envm_emergency&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.tft_target_envm_emergency&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    # 2. Yu'lon opener — CotC: TFT → ReM for Secret Infusion haste
    - thunder_focus_tea,interrupt=true,range_check=none,if=player.combat&var.tft_ready&!var.tft_up&var.yulon_active&var.cotc_build&var.rem_charges_have
    - renewing_mist,cycle=members,if=var.tft_yulon_opener&cycle.range>0&cycle.range<=40
    # 3. Chi-Ji opener — TFT → EnvM for Secret Infusion versatility + Spiritfont
    - thunder_focus_tea,interrupt=true,range_check=none,if=player.combat&var.tft_ready&!var.tft_up&var.chiji_active
    - enveloping_mist,cycle=members,if=var.tft_chiji_opener&cycle.buff.enveloping_mist.down&cycle.health.pct<85&cycle.range>0&cycle.range<=40
    # 4. CotC normal — TFT → ReM (haste + Flowing Wisdom + extended duration)
    - thunder_focus_tea,interrupt=true,range_check=none,if=player.combat&var.tft_ready&!var.tft_up&var.cotc_build&!var.needs_emergency&var.rem_charges_have
    - renewing_mist,cycle=members,if=var.tft_target_rem_cotc&cycle.range>0&cycle.range<=40
    # 5. MoH normal — TFT → EnvM (versatility + Aspect of Harmony proc)
    - thunder_focus_tea,interrupt=true,range_check=none,if=player.combat&var.tft_ready&!var.tft_up&var.moh_build&!var.needs_emergency&var.needs_member_healing
    - enveloping_mist,cycle=members,if=var.tft_target_envm_moh&cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # 6. TFT is up and unspent — burn on ReM/EnvM to not waste
    - renewing_mist,cycle=members,if=var.tft_up&var.cotc_build&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.tft_up&cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40

  # === CELESTIAL CONDUIT CHANNEL (CotC active ability) ===
  # While channeling Celestial Conduit, alternate RWK and ReM to ramp CDR.
  # This builds Renewing Mist coverage quickly for Zen Pulse payoff from TFT.
  # Instant casts fire INTO the channel via casting_check=celestial_conduit.
  celestial_conduit_rotation:
    # Priority: spread ReM first (CDR ramp goal), then RWK for damage→healing
    - renewing_mist,casting_check=celestial_conduit,cycle=members,if=var.rem_charges_have&cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40
    - rushing_wind_kick,casting_check=celestial_conduit,if=talent.rushing_wind_kick.enabled&var.rwk_ready&target.valid
    - rising_sun_kick,casting_check=celestial_conduit,if=var.rsk_ready&target.valid
    - renewing_mist,casting_check=celestial_conduit,cycle=members,if=var.rem_charges_full&cycle.range>0&cycle.range<=40

  # === CHI-JI ROTATION ===
  # Method.gg opener: TFT→EnvM (handled in TFT section) → Chi-Ji →
  #   instant EnvM spam → RSK (Jadefire Teachings) → BOK 4-stack →
  #   RSK reset if proc'd → SG/EnvM fill → TP+BOK for more Teachings stacks
  chiji_rotation:
    # Consume 4-stack Teachings immediately (Chi-Ji grants stacks on summon — Celestial Harmony)
    - blackout_kick,if=var.teachings_stacks>=4&target.valid
    # Instant EnvM spam — free/cheap during Chi-Ji, covers group for Gust of Mists
    - enveloping_mist,cycle=members,if=cycle.health.pct<85&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # RSK/RWK — Jadefire Teachings converts damage to healing; Rapid Diffusion spreads ReM
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # AoE Gust of Mists on multiple allies
    - spinning_crane_kick,if=active_enemies>=2&target.valid
    # BOK with any Teachings stacks — proc RSK resets
    - blackout_kick,if=var.teachings_up&target.valid
    # M+: Sheilun's Gift for focused direct heals; Raid: Vivify for bounce healing
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&var.is_mythic_plus&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=var.is_raid&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # Tiger Palm — filler to build Teachings stacks
    - tiger_palm,if=target.valid

  # === YU'LON ROTATION ===
  # Method.gg opener: TFT→ReM (handled in TFT section) → Yu'lon →
  #   EnvM×2 → ReM → RWK (extend HoTs via Rising Mist) →
  #   instant Vivify (Vivacious Vivification) → repeat
  yulon_rotation:
    # 1. EnvM×2 first — coat raid members; 30% faster cast via Celestial Harmony (CotC)
    - enveloping_mist,cycle=members,if=cycle.buff.enveloping_mist.down&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # 2. Consume Vivacious Vivification instant Vivify proc (Method.gg: use after RWK)
    - vivify,cycle=members,casting_check=none,if=var.vivacious_vivify_ready&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # 3. Renewing Mist — feeds Rising Mist extension; spread wide
    - renewing_mist,cycle=members,if=var.rem_charges_have&cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40
    # 4. RWK/RSK on cooldown — extends ALL HoTs via Rising Mist + Rapid Diffusion ReM spread
    - rushing_wind_kick,if=talent.rushing_wind_kick.enabled&var.rwk_ready&target.valid
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # 5. Vivify — bounces to all ReM targets via Invigorating Mists;
    #    also consumes Zen Pulse proc (Deep Clarity) for bonus splash heal
    #    Method.gg: "keep using Vivify after every Rushing Wind Kick"
    - vivify,cycle=members,if=cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # 6. Keep weaving more EnvM after every few globals to sustain HoTs
    - enveloping_mist,cycle=members,if=cycle.health.pct<85&cycle.range>0&cycle.range<=40
    # 7. SG as Vivify alternative in M+
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&cycle.health.pct<90&cycle.range>0&cycle.range<=40

  # === RENEWING MIST MAINTENANCE ===
  # "Keep Renewing Mist on cooldown at all times" — Method.gg rule #1
  hot_maintenance:
    # Never cap charges (RSK needs wide ReM coverage to work)
    - renewing_mist,cycle=members,if=var.rem_charges_full&cycle.range>0&cycle.range<=40
    # Spread to any injured member missing it
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.health.pct<90&var.rem_charges_have&cycle.range>0&cycle.range<=40
    # Pandemic refresh
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.refreshable&var.rem_charges_have&cycle.range>0&cycle.range<=40
    # RSK/RWK on cooldown when coverage is wide (Rising Mist core loop)
    # Method.gg: "keep Rising Sun Kick on cooldown at all times"
    - rushing_wind_kick,if=talent.rushing_wind_kick.enabled&var.rwk_ready&var.rem_wide_coverage&target.valid
    - rising_sun_kick,if=var.rsk_ready&var.rem_wide_coverage&target.valid
    # After RSK/RWK: Vivify to consume Zen Pulse proc (Deep Clarity) if talented
    # Method.gg: "use Vivify after every Rushing Wind Kick"
    - vivify,cycle=members,if=var.zen_pulse_ready&talent.deep_clarity.enabled&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    - vivify.player,if=var.zen_pulse_ready&talent.deep_clarity.enabled&var.player_needs_healing

  tank_healing:
    # Emergency tank — always interrupt
    - enveloping_mist,cycle=tanks,interrupt=true,if=var.tank_emergency&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=tanks,interrupt=true,if=talent.sheiluns_gift.enabled&var.tank_emergency&cycle.range>0&cycle.range<=40
    - vivify,cycle=tanks,interrupt=true,if=var.tank_emergency&cycle.range>0&cycle.range<=40
    - rushing_wind_kick,if=talent.rushing_wind_kick.enabled&var.rwk_ready&target.valid
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # Sustained tank maintenance
    - enveloping_mist,cycle=tanks,interrupt=true,if=cycle.health.pct<config.tank_heal_hp&cycle.buff.enveloping_mist.down&var.mana_ok&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=tanks,interrupt=true,if=talent.sheiluns_gift.enabled&cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=tanks,interrupt=true,if=cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=40

  group_healing:
    # RSK/RWK to extend all HoTs when coverage is wide (highest throughput)
    - rushing_wind_kick,if=talent.rushing_wind_kick.enabled&var.rwk_ready&var.rem_wide_coverage&target.valid
    - rising_sun_kick,if=var.rsk_ready&var.rem_wide_coverage&target.valid
    # M+: Sheilun's Gift preferred for group healing (focused burst)
    # Raid: Vivify preferred (bounces via Invigorating Mists to all ReM targets)
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&var.is_mythic_plus&group.count(cycle.health.pct<80)>=3&cycle.health.pct<config.member_heal_hp&var.mana_ok&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=var.is_raid&group.count(cycle.health.pct<80)>=3&cycle.health.pct<config.member_heal_hp&var.mana_ok&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&group.count(cycle.health.pct<80)>=3&cycle.health.pct<config.member_heal_hp&var.mana_ok&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=group.count(cycle.health.pct<80)>=3&cycle.health.pct<config.member_heal_hp&var.mana_ok&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    # Essence Font — channel HoTs on up to 18 allies (talent check)
    - essence_font,if=talent.essence_font.enabled&group.count(cycle.health.pct<config.member_heal_hp)>=5&var.mana_healthy
    # EnvM on members who need it and don't have the HoT
    - enveloping_mist,cycle=members,if=cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.down&var.mana_ok&cycle.range>0&cycle.range<=40
    # Chi Burst / Jadefire Stomp — AoE heal fillers
    - chi_burst,if=talent.chi_burst.enabled&group.count(cycle.health.pct<85)>=3&target.valid
    - jadefire_stomp,if=talent.jadefire_stomp.enabled&group.count(cycle.health.pct<85)>=2&target.valid

  single_target_healing:
    - enveloping_mist,cycle=members,casting_check=soothing_mist,if=cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.remains<3&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,if=cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.remains<3&cycle.range>0&cycle.range<=40
    # M+: Sheilun's Gift preferred; Raid: Vivify preferred (Method.gg guide recommendation)
    - sheiluns_gift,cycle=members,casting_check=soothing_mist,if=talent.sheiluns_gift.enabled&var.is_mythic_plus&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,casting_check=soothing_mist,if=var.is_raid&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,casting_check=soothing_mist,if=talent.sheiluns_gift.enabled&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,casting_check=soothing_mist,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,if=talent.sheiluns_gift.enabled&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - sheiluns_gift.player,if=talent.sheiluns_gift.enabled&var.player_needs_healing
    - vivify.player,if=var.player_needs_healing
    - soothing_mist,cycle=members,if=cycle.health.pct<config.soothing_mist_hp&cycle.range>0&cycle.range<=40

  movement:
    - renewing_mist,cycle=members,if=player.moving&var.rem_charges_have&cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40
    - sheiluns_gift,cycle=members,if=player.moving&talent.sheiluns_gift.enabled&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=player.moving&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - rushing_wind_kick,if=player.moving&talent.rushing_wind_kick.enabled&var.rwk_ready&target.valid
    - rising_sun_kick,if=player.moving&var.rsk_ready&target.valid
    - blackout_kick,if=player.moving&var.teachings_up&target.valid
    - expel_harm,if=player.moving&var.player_needs_healing&cooldown.expel_harm.ready

  # === DPS FILLERS ===
  # Method.gg: "Fill any remaining time with Blackout Kick and Tiger Palm"
  # RSK/RWK top priority — healing contribution via Ancient Teachings / Jadefire Teachings
  dps_fillers:
    - rushing_wind_kick,if=talent.rushing_wind_kick.enabled&var.rwk_ready&target.valid
    - rising_sun_kick,if=var.rsk_ready&target.valid
    - jadefire_stomp,if=talent.jadefire_stomp.enabled&target.valid&active_enemies>=1
    - blackout_kick,if=var.teachings_up&target.valid
    - chi_burst,if=talent.chi_burst.enabled&target.valid
    - spinning_crane_kick,if=active_enemies>=3&target.valid
    - tiger_palm,if=target.valid

  interrupts:
    - leg_sweep,if=interrupt.cc.check
    - paralysis,if=interrupt.cc.check
    - quaking_palm,if=interrupt.cc.check
    - haymaker,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    - bull_rush,if=interrupt.stun.aoe.check
    - tail_swipe,if=interrupt.stun.aoe.check

  racial_defensive:
    - stoneform,if=player.dispelable
    - fireblood,if=player.dispelable
    - will_of_the_forsaken,if=player.feared|player.charmed
    - escape_artist,if=player.rooted
    - gift_of_the_naaru,if=health.pct<30
    - stoneform,if=health.pct<30
    - fireblood,if=health.pct<30

  racial_offensive:
    - berserking,if=var.in_celestial_window
    - blood_fury,if=var.in_celestial_window
    - ancestral_call,if=var.in_celestial_window
    - fireblood,if=var.in_celestial_window&!player.dispelable

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=interrupts
    - call_action_list,name=pre_pull_setup,if=!player.combat&target.exists&target.boss
    - call_action_list,name=out_of_combat,if=!player.combat
    # Combat check 
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    # Emergency healing fires first
    - call_action_list,name=emergency_healing,if=var.needs_emergency
    - call_action_list,name=defensive_cooldowns
    # Celestial Conduit channel — fire instants INTO the channel (CotC)
    # No early return here; casting_check handles the channel correctly
    - call_action_list,name=celestial_conduit_rotation,if=var.celestial_conduit_channel
    # Hold channel unless tank needs healing OR celestial conduit is channeling
    - return,if=player.channeling&!var.needs_tank_healing&!var.celestial_conduit_channel
    - call_action_list,name=dispel
    - call_action_list,name=racial_defensive
    - call_action_list,name=major_cooldowns
    - call_action_list,name=trinkets
    # Thunder Focus Tea — off-GCD, pairs with the GCD spell that consumes it
    - call_action_list,name=thunder_focus_tea_usage
    # Celestial window rotations take full priority when active
    - call_action_list,name=chiji_rotation,if=var.chiji_active
    - call_action_list,name=yulon_rotation,if=var.yulon_active
    # Core healing priority
    - call_action_list,name=hot_maintenance
    - call_action_list,name=tank_healing,if=var.needs_tank_healing
    - call_action_list,name=group_healing,if=var.group_heavy_damage
    - call_action_list,name=single_target_healing,if=var.needs_member_healing
    - call_action_list,name=movement,if=player.moving
    - call_action_list,name=racial_offensive,if=var.in_celestial_window
    - call_action_list,name=dps_fillers