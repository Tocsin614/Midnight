version: 1.2.0
author: Khan
spec: 270
name: Khan's Mistweaver Monk
description: |
  Mistweaver Monk healing rotation for Midnight 12.0.
  Supports Conduit of the Celestials and Master of Harmony hero builds.
  Aggressive Renewing Mist spread, smart Thunder Focus Tea usage,
  proper Yu'lon and Chi-Ji rotation windows. Mana-aware healing.

entry: main

movement_allowed: true

config:

  emergency_hp:
    label: "Emergency HP %"
    type: slider
    min: 10
    max: 40
    default: 25

  tank_heal_hp:
    label: "Tank Heal HP %"
    type: slider
    min: 40
    max: 90
    default: 70

  member_heal_hp:
    label: "Member Heal HP %"
    type: slider
    min: 50
    max: 95
    default: 80

  enveloping_hp:
    label: "Enveloping Mist HP %"
    type: slider
    min: 30
    max: 80
    default: 55

  soothing_mist_hp:
    label: "Soothing Mist HP %"
    type: slider
    min: 20
    max: 60
    default: 40

  vivify_group_count:
    label: "Vivify Min Injured"
    type: slider
    min: 2
    max: 5
    default: 3

  mana_tea_threshold:
    label: "Mana Tea Below %"
    type: slider
    min: 20
    max: 70
    default: 50

  low_mana_threshold:
    label: "Low Mana Conserve %"
    type: slider
    min: 10
    max: 40
    default: 25

  yulon_trigger_count:
    label: "Yu'lon Injured Count"
    type: slider
    min: 1
    max: 5
    default: 3

  chiji_trigger_count:
    label: "Chi-Ji Injured Count"
    type: slider
    min: 1
    max: 4
    default: 2

  hero_build:
    label: "Hero Talent Build"
    type: dropdown
    options:
      - label: "Auto-Detect"
        value: 0
      - label: "Conduit of the Celestials"
        value: 1
      - label: "Master of Harmony"
        value: 2
    default: 0

  auto_dispel:
    label: "Auto Dispel"
    type: checkbox
    default: true

  mouseover:
    label: "Enable Mouseover Healing"
    type: checkbox
    default: true

  trinket_usage:
    label: "Trinket Usage"
    type: dropdown
    options:
      - label: "On Cooldown"
        value: 1
      - label: "With Major Cooldowns"
        value: 2
      - label: "When Group Damaged"
        value: 3
      - label: "Manual Only"
        value: 0
    default: 1

variables:

  # === HERO BUILD DETECTION ===
  # CotC has Celestial Harmony talent; fall back to dropdown override
  cotc_build: config.hero_build=1|talent.celestial_harmony.enabled
  moh_build: config.hero_build=2|(!talent.celestial_harmony.enabled&config.hero_build=0)

  # === GROUP HEALTH STATE ===
  needs_emergency: group.lowest.health.pct<config.emergency_hp
  needs_tank_healing: group.tanks.lowest.health.pct<config.tank_heal_hp
  needs_member_healing: group.lowest.health.pct<config.member_heal_hp
  group_heavy_damage: group.count(cycle.health.pct<config.member_heal_hp)>=config.vivify_group_count
  group_critical: group.count(cycle.health.pct<config.emergency_hp)>=3
  tank_emergency: group.tanks.lowest.health.pct<config.emergency_hp
  player_low: health.pct<config.emergency_hp
  player_needs_healing: health.pct<config.member_heal_hp

  # === MANA STATE ===
  mana_ok: mana.pct>config.low_mana_threshold
  mana_healthy: mana.pct>50

  # === COOLDOWN READINESS ===
  rsk_ready: cooldown.rising_sun_kick.ready
  tft_ready: cooldown.thunder_focus_tea.ready
  life_cocoon_ready: cooldown.life_cocoon.ready
  revival_ready: cooldown.revival.ready|cooldown.restoral.ready
  yulon_ready: cooldown.invoke_yulon_the_jade_serpent.ready
  chiji_ready: cooldown.invoke_chi_ji_the_red_crane.ready
  mana_tea_ready: cooldown.mana_tea.ready

  # === ACTIVE BUFFS ===
  tft_up: buff.thunder_focus_tea.up
  teachings_up: buff.teachings_of_the_monastery.up
  teachings_stacks: buff.teachings_of_the_monastery.stack
  chiji_active: buff.invoke_chi_ji_the_red_crane.up
  yulon_active: buff.invoke_yulon_the_jade_serpent.up
  in_celestial_window: var.chiji_active|var.yulon_active

  # === RENEWING MIST MANAGEMENT ===
  # Never sit on 2 charges (or 3 with Pool of Mists)
  rem_charges_full: cooldown.renewing_mist.charges>=2
  rem_charges_have: cooldown.renewing_mist.charges>=1
  rem_wide_coverage: group.count(cycle.buff.renewing_mist.up)>=4

  # === TFT TARGETING LOGIC ===
  # Use TFT on Enveloping Mist for emergency single-target burst,
  # otherwise on Renewing Mist for extension + Secret Infusion haste,
  # and on Rising Sun Kick during celestial windows for faster resets
  tft_target_envm: var.tft_up&var.tank_emergency
  tft_target_rsk: var.tft_up&var.in_celestial_window&!var.tft_target_envm
  tft_target_rem: var.tft_up&!var.tft_target_envm&!var.tft_target_rsk

  # === MOUSEOVER ===
  mo_friendly_valid: mouseover.exists&mouseover.alive&mouseover.friendly&mouseover.range>0&mouseover.range<=40

lists:

  spell_queue:
    - queue_spell

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.loot_nearby

  pre_pull_setup:
    # Spread Renewing Mist wide before combat begins
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40

  out_of_combat:
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.mana_ok&cycle.health.pct<70&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify.player,if=var.player_needs_healing

  auto_target:
    - target_enemy,if=player.combat&(!target.exists|target.dead|target.friendly)&active_enemies>0
    - target_enemy,if=player.combat&!target.valid&active_enemies>0

  dispel:
    # Detox removes magic + poison + disease from allies
    - detox,cycle=members,if=config.auto_dispel&cycle.dispelable.list&cycle.range>0&cycle.range<=40

  emergency_healing:
    # Life Cocoon — instant absorb shield on dying target, not on GCD
    - life_cocoon,cycle=members,interrupt=true,range_check=none,if=var.life_cocoon_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=40
    - life_cocoon.player,interrupt=true,range_check=none,if=var.life_cocoon_ready&var.player_low
    # Revival / Restoral — mass group heal for critical states
    - revival,interrupt=true,range_check=none,if=cooldown.revival.ready&var.group_critical
    - restoral,interrupt=true,range_check=none,if=talent.restoral.enabled&cooldown.restoral.ready&var.group_critical
    # TFT → Enveloping Mist instant bomb on emergency single target
    - thunder_focus_tea,interrupt=true,range_check=none,if=var.tft_ready&!var.tft_up&var.tank_emergency
    - enveloping_mist,cycle=tanks,interrupt=true,if=var.tft_up&var.tank_emergency&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,interrupt=true,if=var.tft_up&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    # Enveloping Mist on emergency targets without it
    - enveloping_mist,cycle=tanks,interrupt=true,if=var.tank_emergency&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # Vivify for emergency group members
    - vivify,cycle=members,interrupt=true,if=cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    - vivify.player,interrupt=true,if=var.player_low

  defensive_cooldowns:
    # Fortifying Brew — personal defensive
    - fortifying_brew,interrupt=true,range_check=none,if=var.player_low&cooldown.fortifying_brew.ready
    # Expel Harm — cheap self heal that also deals damage
    - expel_harm,range_check=none,if=health.pct<config.member_heal_hp&cooldown.expel_harm.ready

  major_cooldowns:
    # Yu'lon — heavy group damage window, enables Enveloping Mist spam
    # CotC: Gift of the Celestials gives a shorter CD on Yu'lon
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&var.group_heavy_damage&!var.chiji_active
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&group.count(cycle.health.pct<70)>=config.yulon_trigger_count
    - invoke_yulon_the_jade_serpent,if=player.combat&var.yulon_ready&state.cds
    # Chi-Ji — mana-efficient active healing CD, very short CD
    - invoke_chi_ji_the_red_crane,if=player.combat&var.chiji_ready&var.needs_member_healing&!var.yulon_active
    - invoke_chi_ji_the_red_crane,if=player.combat&var.chiji_ready&group.count(cycle.health.pct<80)>=config.chiji_trigger_count
    # Mana Tea — restore mana when running low
    - mana_tea,range_check=none,if=player.combat&var.mana_tea_ready&mana.pct<config.mana_tea_threshold
    # Sheilun's Gift — use as a powerful AoE burst during heavy damage
    - sheiluns_gift,if=player.combat&cooldown.sheiluns_gift.ready&var.group_heavy_damage&var.mana_ok

  trinkets:
    - trinket_1,if=trinket_1.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.in_celestial_window)|(config.trinket_usage=3&var.group_heavy_damage))
    - trinket_2,if=trinket_2.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.in_celestial_window)|(config.trinket_usage=3&var.group_heavy_damage))

  # Thunder Focus Tea — off-GCD empowerment, pair with best target spell
  # Priority: 1) Enveloping Mist for emergency tank burst
  #           2) Rising Sun Kick during celestial windows (9s reset)
  #           3) Renewing Mist for HoT extension + Secret Infusion haste
  thunder_focus_tea_usage:
    # Pop TFT for emergency → immediately follow with EnvM instant cast
    - thunder_focus_tea,interrupt=true,range_check=none,if=var.tft_ready&!var.tft_up&var.tank_emergency
    - enveloping_mist,cycle=tanks,if=var.tft_target_envm&cycle.range>0&cycle.range<=40
    - enveloping_mist,cycle=members,if=var.tft_target_envm&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=40
    # Pop TFT during celestial window → RSK for faster resets
    - thunder_focus_tea,interrupt=true,range_check=none,if=var.tft_ready&!var.tft_up&var.in_celestial_window&var.rsk_ready
    - rising_sun_kick,if=var.tft_target_rsk&target.valid
    # Pop TFT on ReM for extension + haste (Secret Infusion) — normal uptime
    - thunder_focus_tea,interrupt=true,range_check=none,if=var.tft_ready&!var.tft_up&!var.needs_emergency&var.rem_charges_have
    - renewing_mist,cycle=members,if=var.tft_target_rem&cycle.range>0&cycle.range<=40
    # TFT is up but nothing matched above — burn it on RSK to not waste it
    - rising_sun_kick,if=var.tft_up&target.valid
    - enveloping_mist,cycle=members,if=var.tft_up&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40

  # Chi-Ji window — DPS abilities trigger Gust of Mists on 2 allies
  # Open with 4-stack Blackout Kick (Chi-Ji grants Teachings stacks on summon),
  # then weave instant Enveloping Mists and keep RSK rolling
  chiji_rotation:
    # Consume 4-stack Teachings of the Monastery proc immediately
    - blackout_kick,if=var.teachings_stacks>=4&target.valid
    # Enveloping Mist is instant + 20% cheaper mana during Chi-Ji
    - enveloping_mist,cycle=members,if=cycle.health.pct<85&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # RSK on cooldown for healing procs + Rapid Diffusion ReM spread + resets
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # Spinning Crane Kick for AoE Mastery: Gust of Mists on multiple allies
    - spinning_crane_kick,if=active_enemies>=2&target.valid
    # Blackout Kick with any Teachings stacks for reset procs
    - blackout_kick,if=var.teachings_up&target.valid
    # Vivify to top people off between Gust of Mists procs
    - vivify,cycle=members,if=cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # Tiger Palm as melee filler
    - tiger_palm,if=target.valid

  # Yu'lon window — Enveloping Mist spam strategy
  # Goal: coat group in EnvM HoTs → RSK to extend via Rising Mist →
  # Vivify spam to leverage all extra ReM from Rapid Diffusion procs
  yulon_rotation:
    # 1. Spread Enveloping Mist to multiple raid members (30% faster cast via Celestial Harmony)
    - enveloping_mist,cycle=members,if=cycle.buff.enveloping_mist.down&cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # 2. RSK on cooldown — extends all HoTs via Rising Mist + Rapid Diffusion ReM spread
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # 3. Vivify — makes use of all extra Renewing Mists generated by Rapid Diffusion
    - vivify,cycle=members,if=cycle.health.pct<90&cycle.range>0&cycle.range<=40
    # 4. Keep weaving more EnvM after every couple of globals to sustain HoTs
    - enveloping_mist,cycle=members,if=cycle.health.pct<85&cycle.range>0&cycle.range<=40

  # Renewing Mist maintenance — cornerstone of Mistweaver healing
  # Never sit on 2 charges (3 with Pool of Mists); keep wide coverage
  hot_maintenance:
    # Critical: dump charges before capping — RSK needs wide ReM coverage to work
    - renewing_mist,cycle=members,if=var.rem_charges_full&cycle.range>0&cycle.range<=40
    # Spread to any member missing it during active healing
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.down&cycle.health.pct<90&var.rem_charges_have&cycle.range>0&cycle.range<=40
    # General refresh in pandemic window
    - renewing_mist,cycle=members,if=cycle.buff.renewing_mist.refreshable&var.rem_charges_have&cycle.range>0&cycle.range<=40
    # RSK on cooldown when ReM coverage is wide (Rising Mist build core)
    - rising_sun_kick,if=var.rsk_ready&var.rem_wide_coverage&target.valid

  tank_healing:
    # Emergency tank healing
    - enveloping_mist,cycle=tanks,if=var.tank_emergency&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    - vivify,cycle=tanks,if=var.tank_emergency&cycle.range>0&cycle.range<=40
    - rising_sun_kick,if=var.rsk_ready&target.valid
    # Sustained tank maintenance
    - enveloping_mist,cycle=tanks,if=cycle.health.pct<config.tank_heal_hp&cycle.buff.enveloping_mist.down&var.mana_ok&cycle.range>0&cycle.range<=40
    - vivify,cycle=tanks,if=cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=40

  group_healing:
    # RSK to extend all HoTs when coverage is wide (highest throughput)
    - rising_sun_kick,if=var.rsk_ready&var.rem_wide_coverage&target.valid
    # Sheilun's Gift — powerful instant group heal during hairy moments
    - sheiluns_gift,if=cooldown.sheiluns_gift.ready&group.count(cycle.health.pct<80)>=3&var.mana_ok
    # Vivify for group — bounces to all ReM targets via Invigorating Mists
    - vivify,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    # Essence Font — channel HoTs on up to 18 allies (talent check)
    - essence_font,if=talent.essence_font.enabled&group.count(cycle.health.pct<config.member_heal_hp)>=5&var.mana_healthy
    # EnvM on members who need it and don't have the HoT
    - enveloping_mist,cycle=members,if=cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.down&var.mana_ok&cycle.range>0&cycle.range<=40
    # Chi Burst — talent, bounces to heal allies
    - chi_burst,if=talent.chi_burst.enabled&group.count(cycle.health.pct<85)>=3&target.valid
    # Jadefire Stomp — Midnight AoE heal + damage
    - jadefire_stomp,if=talent.jadefire_stomp.enabled&group.count(cycle.health.pct<85)>=2&target.valid

  # Single-target sustained healing
  # Soothing Mist enables instant EnvM/Vivify mid-channel (Midnight: follows casts to new targets)
  single_target_healing:
    # EnvM first if target needs heavy healing and we're not channeling
    - enveloping_mist,cycle=members,if=cycle.health.pct<config.enveloping_hp&cycle.buff.enveloping_mist.down&cycle.range>0&cycle.range<=40
    # Vivify with EnvM up for efficient spot healing
    - vivify,cycle=members,if=cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - vivify.player,if=var.player_needs_healing
    # Soothing Mist — channel for consistent sustained damage (EnvM/Vivify interrupt it naturally in Midnight)
    - soothing_mist,cycle=members,if=cycle.health.pct<config.soothing_mist_hp&cycle.range>0&cycle.range<=40

  mouseover_healing:
    # Life Cocoon on mouseover — off GCD emergency
    - life_cocoon.mouseover,interrupt=true,range_check=none,if=mouseover.health.pct<15&var.life_cocoon_ready
    - enveloping_mist.mouseover,if=mouseover.health.pct<config.enveloping_hp&mouseover.buff.enveloping_mist.down
    - vivify.mouseover,if=mouseover.health.pct<config.member_heal_hp

  movement:
    # Instant casts only while moving
    - renewing_mist,cycle=members,if=player.moving&var.rem_charges_have&cycle.buff.renewing_mist.down&cycle.range>0&cycle.range<=40
    - vivify,cycle=members,if=player.moving&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=40
    - rising_sun_kick,if=player.moving&var.rsk_ready&target.valid
    - blackout_kick,if=player.moving&var.teachings_up&target.valid
    - expel_harm,if=player.moving&var.player_needs_healing&cooldown.expel_harm.ready

  # DPS fillers — generate passive healing through Ancient Teachings / Crane Style
  # Rising Sun Kick is always the top priority filler for its healing contribution
  dps_fillers:
    - rising_sun_kick,if=var.rsk_ready&target.valid
    - jadefire_stomp,if=talent.jadefire_stomp.enabled&target.valid&active_enemies>=1
    - blackout_kick,if=var.teachings_up&target.valid
    - chi_burst,if=talent.chi_burst.enabled&target.valid
    - tiger_palm,if=target.valid
    - spinning_crane_kick,if=active_enemies>=3&target.valid
    - crackling_jade_lightning,if=target.valid&!player.moving,global_delay=200

  racial_defensive:
    - stoneform,if=player.dispelable
    - fireblood,if=player.dispelable
    - will_of_the_forsaken,if=player.feared|player.charmed
    - escape_artist,if=player.rooted
    - gift_of_the_naaru,if=health.pct<30
    - stoneform,if=health.pct<30
    - fireblood,if=health.pct<30

  racial_offensive:
    - berserking,if=var.in_celestial_window
    - blood_fury,if=var.in_celestial_window
    - ancestral_call,if=var.in_celestial_window
    - fireblood,if=var.in_celestial_window&!player.dispelable

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pre_pull_setup,if=!player.combat&target.exists&target.boss
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat
    - call_action_list,name=auto_target,if=player.combat
    # Emergency healing fires first — interrupts everything including channels
    - call_action_list,name=emergency_healing,if=var.needs_emergency
    - call_action_list,name=defensive_cooldowns
    # Dispels
    - call_action_list,name=dispel
    - call_action_list,name=racial_defensive
    # Cooldowns and resources
    - call_action_list,name=major_cooldowns
    - call_action_list,name=trinkets
    # Thunder Focus Tea — off-GCD, fires alongside the GCD spell that consumes it
    - call_action_list,name=thunder_focus_tea_usage
    # Celestial window rotations take full priority when active
    - call_action_list,name=chiji_rotation,if=var.chiji_active
    - call_action_list,name=yulon_rotation,if=var.yulon_active
    # Core healing priority
    - call_action_list,name=hot_maintenance
    - call_action_list,name=tank_healing,if=var.needs_tank_healing
    - call_action_list,name=group_healing,if=var.group_heavy_damage
    - call_action_list,name=single_target_healing,if=var.needs_member_healing
    # Mouseover and movement support
    - call_action_list,name=mouseover_healing,if=config.mouseover&var.mo_friendly_valid&!player.casting
    - call_action_list,name=movement,if=player.moving
    # DPS fillers — blocked during active channels (Soothing Mist, Essence Font, etc.)
    - return,if=player.channeling
    - call_action_list,name=racial_offensive,if=var.in_celestial_window
    - call_action_list,name=dps_fillers