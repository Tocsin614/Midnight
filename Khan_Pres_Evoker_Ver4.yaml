version: 4.0.7
author: Khan
spec: 1468
name: Khan's Preservation Evoker
description: |
  Preservation Evoker healing rotation for Midnight 12.0.
  Method.GG two-layer rotation model. Supports Chronowarden and Flameshaper.
  Layer 1 (Maintenance): Temporal Anomaly → Reversion blanket for Grace Period,
    Golden Hour, and Merithra's Blessing passive mitigation. Dream Breath Rank 1
    rolling on cooldown for HoT coverage and guaranteed Merithra's Blessing procs.
    Chronowarden: Temporal Anomaly also used for Verdant Embrace spread
    (Reverberations HoT + Primacy haste stacks via Nozdormu Adept).
  Layer 2 (Damage Response): Echo ramp pre-placed on targets before damage events,
    cashed with Merithra's Blessing (burst) or Dream Breath (sustained).
    Twin Echoes via Emerald Blossom (Essence Burst free cast) for efficient ramp
    building without consuming existing Echoes. Double Reversion (Echo → Reversion)
    for tank Grace Period stacking + Golden Hour. Verdant Embrace for single-target
    Lifebind stabilization.
  Chronowarden: Echo → Verdant Embrace for sustained healing (Reverberations/Primacy).
    Tip the Scales used at damage start, immediately consumed by Empower spell.
  Flameshaper: Dream Breath two charges (Legacy of the Lifebinder), Rank 1 to keep
    HoT rolling for Consume Flame interaction with Verdant Embrace and Emerald Blossom.
  DPS: Fire Breath on cooldown, Leaping Flames → Living Flame top priority,
    Disintegrate filler (Energy Loop mana recovery). No Azure Strike.
  Empowered spells use casting_check release lines at top of main.
  v4.0.0: Full Method.GG rotation rewrite. No mouseovers. No Azure Strike.

entry: main

movement_allowed: true

config:

  hero_build:
    label: "Hero Talent Build"
    type: dropdown
    options:
      - label: "Chronowarden"
        value: 1
      - label: "Flameshaper"
        value: 2
    default: 1

  emergency_hp:
    label: "Emergency HP %"
    type: slider
    min: 10
    max: 40
    default: 25

  tank_heal_hp:
    label: "Tank Heal HP %"
    type: slider
    min: 40
    max: 90
    default: 70

  member_heal_hp:
    label: "Member Heal HP %"
    type: slider
    min: 50
    max: 95
    default: 80

  group_heal_count:
    label: "AoE Injured Count"
    type: slider
    min: 2
    max: 5
    default: 3

  echo_hp:
    label: "Echo Apply HP %"
    type: slider
    min: 40
    max: 95
    default: 80

  reversion_hp:
    label: "Reversion HoT HP %"
    type: slider
    min: 40
    max: 90
    default: 75

  reversion_spread_enabled:
    label: "Reversion Group Spread"
    type: checkbox
    default: true

  verdant_embrace_hp:
    label: "Verdant Embrace HP %"
    type: slider
    min: 40
    max: 95
    default: 80

  emerald_blossom_hp:
    label: "Emerald Blossom HP %"
    type: slider
    min: 50
    max: 95
    default: 80

  living_flame_heal_hp:
    label: "Living Flame Heal HP %"
    type: slider
    min: 20
    max: 70
    default: 50

  dream_breath_empower:
    label: "D. Breath Emp. Level"
    type: slider
    min: 1
    max: 4
    default: 1

  fire_breath_empower_chrono:
    label: "F. Breath Emp. (Chrono)"
    type: slider
    min: 1
    max: 3
    default: 3

  fire_breath_empower_flame:
    label: "F. Breath Emp. (Flame)"
    type: slider
    min: 1
    max: 4
    default: 4

  cauterizing_flame_hp:
    label: "Cauterizing Flame HP %"
    type: slider
    min: 20
    max: 100
    default: 45

  trinket_usage:
    label: "Trinket Usage"
    type: dropdown
    options:
      - label: "On Cooldown"
        value: 1
      - label: "With Major Cooldowns"
        value: 2
      - label: "When Group Damaged"
        value: 3
      - label: "Manual Only"
        value: 0
    default: 1

  mana_conserve_threshold:
    label: "Low Mana Conserve %"
    type: slider
    min: 10
    max: 40
    default: 20

  auto_dispel:
    label: "Auto Dispel"
    type: checkbox
    default: true

  deep_breath_enabled:
    label: "Enable Deep Breath"
    type: checkbox
    default: false

variables:

  # === HERO BUILD DETECTION ===
  chrono_build: config.hero_build=1
  flame_build: config.hero_build=2

  # === GROUP HEALTH STATE ===
  needs_emergency: group.lowest.health.pct<config.emergency_hp
  needs_tank_healing: group.tanks.lowest.range>0&group.tanks.lowest.health.pct<config.tank_heal_hp
  needs_member_healing: group.lowest.health.pct<config.member_heal_hp
  group_heavy_damage: group.count(cycle.health.pct<config.member_heal_hp)>=config.group_heal_count
  group_critical: group.count(cycle.health.pct<config.emergency_hp)>=3
  tank_emergency: group.tanks.lowest.health.pct<config.emergency_hp
  player_low: health.pct<config.emergency_hp
  player_needs_healing: health.pct<config.member_heal_hp

  # === MANA STATE ===
  mana_ok: mana.pct>config.mana_conserve_threshold
  mana_healthy: mana.pct>50

  # === RESOURCE STATE ===
  essence_burst_up: buff.essence_burst.up
  have_essence_echo: essence>=2
  have_essence_blossom: essence>=3

  # === KEY PROCS & BUFFS ===
  merithra_proc: buff.merithras_blessing.up
  leaping_flames_up: buff.leaping_flames.up
  temporal_burst_active: buff.temporal_burst.up
  primacy_stacks: buff.primacy.stack
  lifespark_proc: buff.lifespark.up

  # === COOLDOWN READINESS ===
  temporal_anomaly_ready: cooldown.temporal_anomaly.ready
  dream_breath_ready: cooldown.dream_breath.ready
  fire_breath_ready: cooldown.fire_breath.ready
  verdant_embrace_ready: cooldown.verdant_embrace.ready
  tip_the_scales_ready: cooldown.tip_the_scales.ready&talent.tip_the_scales.enabled
  stasis_ready: cooldown.stasis.ready&talent.stasis.enabled
  dream_flight_ready: cooldown.dream_flight.ready&talent.dream_flight.enabled
  zephyr_ready: cooldown.zephyr.ready&talent.zephyr.enabled
  time_dilation_ready: cooldown.time_dilation.ready&talent.time_dilation.enabled
  rewind_ready: cooldown.rewind.ready&talent.rewind.enabled
  stasis_spells_ready: cooldown.dream_breath.remains<3&cooldown.temporal_anomaly.remains<3

  # === ECHO MANAGEMENT ===
  echo_spread_wide: group.count(cycle.buff.echo.up)>=3
  reversion_spread: group.count(cycle.buff.reversion.up)>=3

lists:

  empower_releases:
    # casting_check gates these to ONLY fire while mid-empower — top of main always
    - dream_breath,casting_check=dream_breath,empower_to=1,if=config.dream_breath_empower=1
    - dream_breath,casting_check=dream_breath,empower_to=2,if=config.dream_breath_empower=2
    - dream_breath,casting_check=dream_breath,empower_to=3,if=config.dream_breath_empower=3
    - dream_breath,casting_check=dream_breath,empower_to=4,if=config.dream_breath_empower=4
    - fire_breath,casting_check=fire_breath,empower_to=1,if=var.chrono_build&config.fire_breath_empower_chrono=1
    - fire_breath,casting_check=fire_breath,empower_to=2,if=var.chrono_build&config.fire_breath_empower_chrono=2
    - fire_breath,casting_check=fire_breath,empower_to=3,if=var.chrono_build&config.fire_breath_empower_chrono=3
    - fire_breath,casting_check=fire_breath,empower_to=1,if=var.flame_build&config.fire_breath_empower_flame=1
    - fire_breath,casting_check=fire_breath,empower_to=2,if=var.flame_build&config.fire_breath_empower_flame=2
    - fire_breath,casting_check=fire_breath,empower_to=3,if=var.flame_build&config.fire_breath_empower_flame=3
    - fire_breath,casting_check=fire_breath,empower_to=4,if=var.flame_build&config.fire_breath_empower_flame=4

  spell_queue:
    - queue_spell

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.loot_nearby

  out_of_combat:
    # Pre-pull: tank prep — Echo then double Reversion for immediate Grace Period + Golden Hour
    - echo,cycle=tanks,if=cycle.buff.echo.down&cycle.range>0&cycle.range<=30
    - merithras_blessing,cycle=tanks,if=var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30
    - reversion,cycle=tanks,if=!var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30
    # Pre-pull: spread Echo to members
    - echo,cycle=members,if=cycle.buff.echo.down&cycle.range>0&cycle.range<=30&var.have_essence_echo
    # Pre-pull: Temporal Anomaly for Resonating Sphere shield + Echo spread at the pull
    - temporal_anomaly,if=var.temporal_anomaly_ready
    # OOC healing
    - echo.player,if=health.pct<90&buff.echo.down&var.have_essence_echo
    - echo,cycle=members,if=cycle.health.pct<90&cycle.buff.echo.down&cycle.range>0&cycle.range<=30&var.have_essence_echo
    - merithras_blessing.player,if=var.merithra_proc&health.pct<config.member_heal_hp&buff.reversion.down
    - merithras_blessing,cycle=members,if=var.merithra_proc&cycle.health.pct<config.member_heal_hp&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30
    - reversion.player,if=!var.merithra_proc&health.pct<config.member_heal_hp&buff.reversion.down
    - reversion,cycle=members,if=!var.merithra_proc&cycle.health.pct<config.member_heal_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace.player,if=health.pct<config.verdant_embrace_hp&var.verdant_embrace_ready
    - verdant_embrace,cycle=members,if=cycle.health.pct<config.verdant_embrace_hp&var.verdant_embrace_ready&cycle.range>0&cycle.range<=30

  auto_target:
    - target_enemy,if=player.combat&(!target.exists|target.dead|target.friendly)&active_enemies>0
    - target_enemy,if=player.combat&!target.valid&active_enemies>0

  dispel:
    - naturalize,cycle=members,if=config.auto_dispel&(cycle.dispelable.magic|cycle.dispelable.poison)&cycle.range>0&cycle.range<=30
    - naturalize.player,if=config.auto_dispel&(player.dispelable.magic|player.dispelable.poison)
    - cauterizing_flame,cycle=tanks,if=config.auto_dispel&(cycle.dispelable.disease|cycle.dispelable.curse|cycle.dispelable.poison|cycle.dispelable)&cycle.health.pct<config.cauterizing_flame_hp&cycle.range>0&cycle.range<=30
    - cauterizing_flame,cycle=members,if=config.auto_dispel&(cycle.dispelable.disease|cycle.dispelable.curse|cycle.dispelable.poison|cycle.dispelable)&cycle.health.pct<config.cauterizing_flame_hp&cycle.range>0&cycle.range<=30
    - cauterizing_flame.player,if=config.auto_dispel&(player.dispelable.disease|player.dispelable.curse|player.dispelable.poison|player.dispelable)&health.pct<config.cauterizing_flame_hp

  emergency_healing:
    # Tip the Scales + Dream Breath — instant max-rank AoE panic; fires at 2+ critical members
    - tip_the_scales,interrupt=true,range_check=none,if=var.tip_the_scales_ready&!buff.tip_the_scales.up&group.count(cycle.health.pct<config.emergency_hp)>=2
    - dream_breath,interrupt=true,if=buff.tip_the_scales.up&var.group_critical
    # Rewind — big damage-undo; use right after heavy hit when group is chunked
    - rewind,interrupt=true,range_check=none,if=var.rewind_ready&var.group_critical
    # Verdant Embrace — instant single-target burst on dying tank or member
    - verdant_embrace.player,interrupt=true,if=var.verdant_embrace_ready&health.pct<15
    - verdant_embrace,cycle=tanks,interrupt=true,if=var.verdant_embrace_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    - verdant_embrace,cycle=members,interrupt=true,if=var.verdant_embrace_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    # Time Dilation — buys extra time on tank or low member
    - time_dilation,cycle=tanks,interrupt=true,if=var.time_dilation_ready&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    - time_dilation,cycle=members,interrupt=true,if=var.time_dilation_ready&cycle.health.pct<15&cycle.range>0&cycle.range<=30
    # Merithra's Blessing proc on emergency targets
    - merithras_blessing.player,interrupt=true,if=var.merithra_proc&var.player_low
    - merithras_blessing,cycle=tanks,interrupt=true,if=var.merithra_proc&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    - merithras_blessing,cycle=members,interrupt=true,if=var.merithra_proc&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30
    # Emergency Reversion on anyone critical
    - reversion,cycle=members,interrupt=true,if=!var.merithra_proc&cycle.health.pct<config.emergency_hp&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30
    - reversion.player,interrupt=true,if=!var.merithra_proc&var.player_low

  defensive_cooldowns:
    - obsidian_scales,range_check=none,if=cooldown.obsidian_scales.ready&health.pct<50
    - zephyr,range_check=none,if=var.zephyr_ready&var.group_heavy_damage
    - time_dilation,cycle=tanks,if=var.time_dilation_ready&cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=30

  major_cooldowns:
    # Tip the Scales (Chronowarden) — planned burst window: fire as damage starts,
    # then immediately consume with Dream Breath so TtS goes on cooldown
    - tip_the_scales,range_check=none,if=var.tip_the_scales_ready&var.chrono_build&var.group_heavy_damage&player.combat&!buff.tip_the_scales.up
    - tip_the_scales,range_check=none,if=var.tip_the_scales_ready&var.chrono_build&state.cds&player.combat&!buff.tip_the_scales.up
    # Stasis — M+ default (Chronowarden); load when Dream Breath and TA are nearly ready
    # Released copies cost no mana; targeted spells (VE) keep their original targets
    - stasis,range_check=none,if=var.stasis_ready&var.stasis_spells_ready&state.cds&player.combat
    # Dream Flight (Flameshaper) — flying AoE heal + long HoT; fire on group damage windows
    - dream_flight,range_check=none,if=var.dream_flight_ready&var.flame_build&var.group_heavy_damage&player.combat
    - dream_flight,range_check=none,if=var.dream_flight_ready&var.flame_build&state.cds&player.combat

  trinkets:
    - trinket_1,if=trinket_1.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&(var.tip_the_scales_ready|buff.temporal_burst.up))|(config.trinket_usage=3&var.group_heavy_damage))
    - trinket_2,if=trinket_2.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&(var.tip_the_scales_ready|buff.temporal_burst.up))|(config.trinket_usage=3&var.group_heavy_damage))

  temporal_anomaly_rotation:
    # Layer 1 — always cast on cooldown; Resonating Sphere applies Echoes to 5 targets
    # Primary flow: TA → Reversion = efficient group Reversion coverage with free Echo spread
    - temporal_anomaly,if=var.temporal_anomaly_ready&player.combat

  chronowarden_ve_spread:
    # Chronowarden only: Nozdormu Adept lowers TA cost/CD, enabling TA → Verdant Embrace
    # VE through TA Echo = Reverberations HoT + Primacy haste stacks on spread targets
    # Only spread VE once Reversion blanket is established (var.reversion_spread)
    - verdant_embrace,cycle=tanks,if=var.chrono_build&var.verdant_embrace_ready&var.reversion_spread&cycle.range>0&cycle.range<=30&player.combat
    - verdant_embrace,cycle=members,if=var.chrono_build&var.verdant_embrace_ready&var.reversion_spread&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30&player.combat

  reversion_spread:
    # Layer 1 — maintenance HoT; blanket everyone regardless of HP on every pull
    # No HP gate — Method.GG: treat Reversion blanket as highest priority, always rolling
    # Grace Period (+10% healing received per Reversion, stacks multiplicatively)
    # Merithra's Blessing proc lines first — upgraded Reversion with bounce heal
    - merithras_blessing.player,if=config.reversion_spread_enabled&var.merithra_proc&buff.reversion.down&player.combat
    - merithras_blessing,cycle=tanks,if=config.reversion_spread_enabled&var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30&player.combat
    - merithras_blessing,cycle=members,if=config.reversion_spread_enabled&var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30&player.combat
    - reversion.player,if=config.reversion_spread_enabled&!var.merithra_proc&buff.reversion.down&player.combat
    - reversion,cycle=tanks,if=config.reversion_spread_enabled&!var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30&player.combat
    - reversion,cycle=members,if=config.reversion_spread_enabled&!var.merithra_proc&cycle.buff.reversion.down&cycle.range>0&cycle.range<=30&player.combat

  dream_breath_rotation:
    # Layer 1 — keep rolling on cooldown for HoT coverage + guaranteed Merithra's Blessing proc
    # Rank 1 default: same total healing as higher ranks, faster cycling for more proc opportunities
    # Flameshaper: two charges (Legacy of the Lifebinder); fire when ready, hold one for burst only
    # Higher ranks used when slider is set for content requiring more front-loaded healing
    - dream_breath,empower_to=1,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=1&!player.casting.dream_breath
    - dream_breath,empower_to=2,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=2&!player.casting.dream_breath
    - dream_breath,empower_to=3,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=3&!player.casting.dream_breath
    - dream_breath,empower_to=4,if=var.dream_breath_ready&player.combat&config.dream_breath_empower=4&!player.casting.dream_breath

  echo_ramp:
    # Layer 2 — pre-place Echo on targets before damage events; cash with right follow-up spell
    # Echo costs 2 Essence; tank priority, then members below threshold
    - echo.player,if=var.have_essence_echo&buff.echo.down&health.pct<config.tank_heal_hp&player.combat
    - echo,cycle=tanks,if=var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.tank_heal_hp&cycle.range>0&cycle.range<=30&player.combat
    - echo,cycle=members,if=var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.emergency_hp&cycle.range>0&cycle.range<=30&player.combat
    - echo,cycle=members,if=var.have_essence_echo&cycle.buff.echo.down&var.group_heavy_damage&cycle.health.pct<config.echo_hp&cycle.range>0&cycle.range<=30&player.combat
    # Safety dump — spread Echo to avoid Essence overcap
    - echo,cycle=members,if=essence>=4&cycle.buff.echo.down&cycle.range>0&cycle.range<=30&player.combat

  essence_management:
    # Twin Echoes flow: Essence Burst → Emerald Blossom (free, doesn't consume Echoes)
    # Emerald Blossom activates Twin Echoes buff → next Echo applies two Echoes at once
    # This is the core ramp-building engine for Layer 2
    - emerald_blossom,target=lowest,if=var.essence_burst_up&group.lowest.health.pct<config.emerald_blossom_hp&var.mana_ok&player.combat
    # Flameshaper: Emerald Blossom spends Dream Breath HoT (Consume Flame) for bonus healing
    # Fire when Dream Breath HoT is active and AoE healing is needed
    - emerald_blossom,target=lowest,if=var.flame_build&var.group_heavy_damage&group.lowest.health.pct<config.emerald_blossom_hp&var.mana_ok&player.combat
    # Backup AoE when group needs efficient multi-target healing
    - emerald_blossom,target=lowest,if=var.have_essence_blossom&var.group_heavy_damage&group.lowest.health.pct<config.emerald_blossom_hp&var.mana_ok&player.combat

  echo_consumption:
    # Layer 2 — cash Echo ramps with the right follow-up spell per situation
    # Priority per Method.GG: Merithra's proc → Double Reversion → Chrono VE → VE

    # 1. Merithra's Blessing proc (interrupt) — strongest healing spell; use immediately
    # Bounces up to 4 times, prioritizes lowest health; doubles in value through Echo
    - merithras_blessing.player,interrupt=true,if=var.merithra_proc&health.pct<config.member_heal_hp
    - merithras_blessing,cycle=tanks,interrupt=true,if=var.merithra_proc&cycle.buff.echo.up&cycle.range>0&cycle.range<=30
    - merithras_blessing,cycle=members,interrupt=true,if=var.merithra_proc&cycle.buff.echo.up&cycle.range>0&cycle.range<=30
    - merithras_blessing,cycle=members,interrupt=true,if=var.merithra_proc&cycle.range>0&cycle.range<=30

    # 2. Merithra's proc paired with Reversion refresh (maintain blanket while cashing proc)
    - merithras_blessing.player,if=config.reversion_spread_enabled&var.merithra_proc&buff.reversion.down&health.pct<config.reversion_hp&player.combat
    - merithras_blessing,cycle=tanks,if=config.reversion_spread_enabled&var.merithra_proc&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat
    - merithras_blessing,cycle=members,if=config.reversion_spread_enabled&var.merithra_proc&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat

    # 3. Double Reversion setup (Echo → Reversion) — Grace Period stacks multiplicatively
    # Golden Hour rewinds 15% recent damage taken; echoed = doubles the effect
    - reversion.player,if=config.reversion_spread_enabled&!var.merithra_proc&buff.reversion.down&health.pct<config.reversion_hp&player.combat
    - reversion,cycle=tanks,if=config.reversion_spread_enabled&!var.merithra_proc&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat
    - reversion,cycle=members,if=config.reversion_spread_enabled&!var.merithra_proc&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30&player.combat

    # 4. Chronowarden: Echo → Verdant Embrace for sustained healing (Reverberations + Primacy)
    # Method.GG: for sustained healing, Chrono echoes VE over Dream Breath
    - verdant_embrace.player,if=var.chrono_build&var.verdant_embrace_ready&buff.echo.up&health.pct<config.verdant_embrace_hp
    - verdant_embrace,cycle=tanks,if=var.chrono_build&var.verdant_embrace_ready&cycle.buff.echo.up&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace,cycle=members,if=var.chrono_build&var.verdant_embrace_ready&cycle.buff.echo.up&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30

    # 5. Verdant Embrace — single-target Lifebind stabilization; strongest reliable spot heal
    - verdant_embrace.player,if=var.verdant_embrace_ready&health.pct<config.verdant_embrace_hp
    - verdant_embrace,cycle=tanks,if=var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace,cycle=members,if=var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30

  living_flame_heal_filler:
    # Light chip damage filler per Method.GG — lowest-priority single-target heal
    # Ancient Flame: cast after Emerald Blossom or Verdant Embrace for 40% reduced cast time
    # Lifespark proc: instant cast + 50% bonus healing — fire immediately when up
    # Chronowarden: chrono_flames is the morph and fires above living_flame
    - chrono_flames.player,if=var.chrono_build&var.lifespark_proc&health.pct<config.living_flame_heal_hp
    - living_flame.player,if=!var.chrono_build&var.lifespark_proc&health.pct<config.living_flame_heal_hp
    - chrono_flames,cycle=members,if=var.chrono_build&var.lifespark_proc&cycle.health.pct<config.living_flame_heal_hp&cycle.range>0&cycle.range<=30
    - living_flame,cycle=members,if=!var.chrono_build&var.lifespark_proc&cycle.health.pct<config.living_flame_heal_hp&cycle.range>0&cycle.range<=30
    - chrono_flames.player,if=var.chrono_build&health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0
    - living_flame.player,if=!var.chrono_build&health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0
    - chrono_flames,cycle=members,if=var.chrono_build&cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&cycle.range>0&cycle.range<=30
    - living_flame,cycle=members,if=!var.chrono_build&cycle.health.pct<config.living_flame_heal_hp&var.verdant_embrace_ready=0&cycle.range>0&cycle.range<=30

  fire_breath_leaping_flames:
    # Fire Breath on cooldown — main damage button; Leaping Flames proc via empower_releases
    - fire_breath,empower_to=1,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=1&!player.casting.fire_breath
    - fire_breath,empower_to=2,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=2&!player.casting.fire_breath
    - fire_breath,empower_to=3,if=var.fire_breath_ready&target.valid&player.combat&var.chrono_build&config.fire_breath_empower_chrono=3&!player.casting.fire_breath
    - fire_breath,empower_to=1,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=1&!player.casting.fire_breath
    - fire_breath,empower_to=2,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=2&!player.casting.fire_breath
    - fire_breath,empower_to=3,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=3&!player.casting.fire_breath
    - fire_breath,empower_to=4,if=var.fire_breath_ready&target.valid&player.combat&var.flame_build&config.fire_breath_empower_flame=4&!player.casting.fire_breath

  movement:
    # Instant casts only while moving
    # Merithra's proc — instant, highest value; use immediately on lowest/tanks
    - merithras_blessing.player,if=player.moving&var.merithra_proc&health.pct<config.member_heal_hp
    - merithras_blessing,cycle=tanks,if=player.moving&var.merithra_proc&cycle.range>0&cycle.range<=30
    - merithras_blessing,cycle=members,if=player.moving&var.merithra_proc&cycle.range>0&cycle.range<=30
    - echo.player,if=player.moving&var.have_essence_echo&buff.echo.down&health.pct<config.echo_hp
    - echo,cycle=members,if=player.moving&var.have_essence_echo&cycle.buff.echo.down&cycle.health.pct<config.echo_hp&cycle.range>0&cycle.range<=30
    - reversion.player,if=player.moving&!var.merithra_proc&buff.reversion.down&health.pct<config.reversion_hp
    - reversion,cycle=members,if=player.moving&!var.merithra_proc&cycle.buff.reversion.down&cycle.health.pct<config.reversion_hp&cycle.range>0&cycle.range<=30
    - verdant_embrace.player,if=player.moving&var.verdant_embrace_ready&health.pct<config.verdant_embrace_hp
    - verdant_embrace,cycle=members,if=player.moving&var.verdant_embrace_ready&cycle.health.pct<config.verdant_embrace_hp&cycle.range>0&cycle.range<=30
    - emerald_blossom,target=lowest,if=player.moving&var.essence_burst_up&group.lowest.health.pct<config.emerald_blossom_hp

  dps_fillers:
    # Deep Breath — AoE damage on 2+ enemies (never fly into danger)
    - deep_breath,if=config.deep_breath_enabled&active_enemies>=2&group.lowest.health.pct>80&target.valid
    # Leaping Flames proc — top priority while buff is active
    # Chronowarden: Chrono Flames is the morph; Afterimage fires extra Chrono Flames
    - chrono_flames,if=var.chrono_build&var.leaping_flames_up&target.valid
    - living_flame,if=!var.chrono_build&var.leaping_flames_up&target.valid
    # Disintegrate — main Essence damage spender; Energy Loop supports mana economy
    - disintegrate,if=target.valid&var.mana_ok
    # Living Flame / Chrono Flame filler — Essence Burst procs, Enkindled/Lifeforce Mender boosts
    - chrono_flames,if=var.chrono_build&target.valid
    - living_flame,if=!var.chrono_build&target.valid

  racial_defensive:
    - stoneform,if=player.dispelable
    - fireblood,if=player.dispelable
    - will_of_the_forsaken,if=player.feared|player.charmed
    - escape_artist,if=player.rooted
    - gift_of_the_naaru,if=health.pct<30
    - stoneform,if=health.pct<30
    - fireblood,if=health.pct<30

  racial_offensive:
    - berserking,if=var.group_heavy_damage|buff.temporal_burst.up
    - blood_fury,if=var.group_heavy_damage|buff.temporal_burst.up
    - ancestral_call,if=var.group_heavy_damage|buff.temporal_burst.up
    - fireblood,if=(var.group_heavy_damage|buff.temporal_burst.up)&!player.dispelable

  main:
    - call_action_list,name=empower_releases
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    # Interrupts
    - wing_buffet,if=interrupt.target.check
    - wing_buffet.focus,if=interrupt.focus.check
    - tail_swipe,if=interrupt.stun.aoe.check
    - quaking_palm,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    - call_action_list,name=out_of_combat,if=!player.combat
    # Combat check
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    # Emergency healing — interrupts everything
    - call_action_list,name=emergency_healing,if=var.needs_emergency
    - call_action_list,name=defensive_cooldowns
    # Block non-emergency healing during channels; empower releases still fire above this
    - return,if=player.channeling
    # Dispels
    - call_action_list,name=dispel
    - call_action_list,name=racial_defensive
    # Cooldowns
    - call_action_list,name=major_cooldowns
    - call_action_list,name=trinkets
    # LAYER 1: Maintenance — Reversion blanket is highest-priority maintenance task
    - call_action_list,name=temporal_anomaly_rotation
    - call_action_list,name=reversion_spread
    # LAYER 1: Chronowarden VE spread via TA Echo (Reverberations/Primacy)
    - call_action_list,name=chronowarden_ve_spread,if=var.chrono_build
    # LAYER 1: Dream Breath rolling on cooldown (Rank 1 default)
    - call_action_list,name=dream_breath_rotation
    # LAYER 2: Pre-place Echo before damage events
    - call_action_list,name=echo_ramp
    # LAYER 2: Essence Burst → Emerald Blossom for Twin Echoes ramp access
    - call_action_list,name=essence_management
    # LAYER 2: Cash Echo ramps (Merithra's → Double Reversion → Chrono VE → VE)
    - call_action_list,name=echo_consumption
    # Light chip filler when stronger tools unavailable
    - call_action_list,name=living_flame_heal_filler,if=var.needs_member_healing
    # Fire Breath on cooldown — Leaping Flames proc + Afterimage (Chrono)
    - call_action_list,name=fire_breath_leaping_flames
    # Movement instants
    - call_action_list,name=movement,if=player.moving
    # DPS fillers — only when group is healthy
    - call_action_list,name=racial_offensive
    - call_action_list,name=dps_fillers,if=!var.needs_member_healing