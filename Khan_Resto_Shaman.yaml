spec: 264
name: "Khan Resto Shaman"
version: "1.2.7"
author: "Khan"
date: "2026-03-26"
patch: "12.0"
movement_allowed: true

config:
  content_mode:
    section: "General"
    label: "Content Mode"
    type: dropdown
    options:
      - label: "Mythic+"
        value: 1
      - label: "Raid"
        value: 2
    default: 1

  hero_build:
    section: "General"
    label: "Hero Build"
    type: dropdown
    options:
      - label: "Auto-Detect"
        value: 0
      - label: "Totemic"
        value: 1
      - label: "Farseer"
        value: 2
    default: 2

  emergency_hp:
    section: "Healing"
    label: "Emergency HP %"
    type: slider
    min: 1
    max: 60
    default: 34

  tank_heal_hp:
    section: "Healing"
    label: "Tank Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 85

  member_heal_hp:
    section: "Healing"
    label: "Member Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 80

  riptide_hp:
    section: "Healing"
    label: "Riptide Movement HP %"
    type: slider
    min: 1
    max: 100
    default: 90

  chain_heal_hp:
    section: "Healing"
    label: "Chain Heal HP %"
    type: slider
    min: 1
    max: 100
    default: 80

  chain_heal_count:
    section: "Healing"
    label: "Chain Heal Min Targets"
    type: slider
    min: 1
    max: 5
    default: 3

  healing_rain_hp:
    section: "Healing"
    label: "Healing Rain HP %"
    type: slider
    min: 1
    max: 100
    default: 80

  healing_rain_count:
    section: "Healing"
    label: "Healing Rain Min Targets"
    type: slider
    min: 1
    max: 5
    default: 3

  healing_tide_count:
    section: "Cooldowns"
    label: "Healing Tide Min Targets"
    type: slider
    min: 1
    max: 5
    default: 3

  ascendance_count:
    section: "Cooldowns"
    label: "Ascendance Min Targets"
    type: slider
    min: 1
    max: 5
    default: 3

  spirit_link_hp:
    section: "Cooldowns"
    label: "Spirit Link HP %"
    type: slider
    min: 1
    max: 100
    default: 45

  astral_shift_hp:
    section: "Defensives"
    label: "Astral Shift HP %"
    type: slider
    min: 1
    max: 100
    default: 35

  mana_conserve_pct:
    section: "General"
    label: "Mana Conserve Below %"
    type: slider
    min: 5
    max: 50
    default: 20

  dps_threshold:
    section: "Damage"
    label: "DPS Threshold HP %"
    type: slider
    min: 50
    max: 100
    default: 85

  swiftness_on_cooldown:
    section: "Healing"
    label: "Use Swiftness On Cooldown"
    description: "Cast Ancestral/Nature's Swiftness on cooldown (top of healing priority). Uncheck to use only for emergencies."
    type: checkbox
    default: false

  mouseover_healing:
    section: "Healing"
    label: "Enable Mouseover Healing"
    description: "Cast Riptide, Unleash Life and Healing Wave on mouseover target."
    type: checkbox
    default: true

  earth_shield_target:
    section: "Healing"
    label: "Earth Shield Target"
    type: dropdown
    options:
      - label: "Tank 1"
        value: 1
      - label: "Tank 2"
        value: 2
      - label: "Tank 3"
        value: 3
    default: 1

  auto_dispel:
    section: "General"
    label: "Auto Dispel"
    type: checkbox
    default: true

variables:
  mythic_plus: config.content_mode=1
  raid: config.content_mode=2
  mana_ok: player.mana.pct>config.mana_conserve_pct
  mana_low: player.mana.pct<=config.mana_conserve_pct

  # Health States
  tank_emergency: group.tank.health.pct<config.emergency_hp
  player_low: player.health.pct<config.emergency_hp
  group_heavy_damage: group.count(cycle.health.effective.pct<config.chain_heal_hp)>=config.chain_heal_count
  group_hurting: group.lowest.health.pct<config.member_heal_hp

  # Totem State
  surging_totem_up: totem.surging_totem.up
  surging_totem_expires_soon: totem.surging_totem.up&totem.surging_totem.remains<8
  healing_stream_up: totem.healing_stream_totem.up
  earthen_wall_up: totem.earthen_wall_totem.up

  # Proc / Buff Tracking
  lava_surge_up: buff.lava_surge.up
  unleash_life_up: buff.unleash_life.up
  natures_swiftness_up: buff.natures_swiftness.up
  ancestral_swiftness_up: buff.ancestral_swiftness.up
  ascendance_active: buff.ascendance.up

  # Cooldown Readiness
  healing_tide_ready: cooldown.healing_tide_totem.ready&group.count(cycle.health.effective.pct<config.member_heal_hp)>=config.healing_tide_count
  ascendance_ready: cooldown.ascendance.ready&group.count(cycle.health.effective.pct<config.member_heal_hp)>=config.ascendance_count&talent.ascendance.enabled
  spirit_link_ready: cooldown.spirit_link_totem.ready&group.lowest.health.pct<config.spirit_link_hp
  ancestral_guidance_ready: cooldown.ancestral_guidance.ready&talent.ancestral_guidance.enabled&var.group_heavy_damage

  # Riptide charge management — prevent overcap (2 charges baseline)
  riptide_overcap: cooldown.riptide.charges>=2

entry: main

lists:
  out_of_combat:
    # Self buffs — keep active at all times
    - water_shield,range_check=none,if=!buff.water_shield.up
    - skyfury,range_check=none,if=!buff.skyfury.up
    - earthliving_weapon,range_check=none,if=!mainhand.enchant.up
    # HoTs and shields on group
    - riptide,cycle=members,if=cycle.buff.riptide.down&cycle.health.effective.pct<95&cycle.range<=40
    - earth_shield,target=tank1,if=talent.earth_shield.enabled&config.earth_shield_target=1&!tank1.buff.974.up&tank1.range<=40
    - earth_shield,target=tank2,if=talent.earth_shield.enabled&config.earth_shield_target=2&!tank2.buff.974.up&tank2.range<=40
    - earth_shield,target=tank3,if=talent.earth_shield.enabled&config.earth_shield_target=3&!tank3.buff.974.up&tank3.range<=40
    - earth_shield.player,range_check=none,if=talent.earth_shield.enabled&talent.elemental_orbit.enabled&!buff.383648.up

  emergency_healing:
    # Nature's Swiftness — instant cast for critical emergencies
    - ancestral_swiftness,range_check=none,if=talent.ancestral_swiftness.enabled&!var.ancestral_swiftness_up&(var.tank_emergency|var.player_low|group.lowest.health.pct<config.emergency_hp)
    - natures_swiftness,range_check=none,if=talent.natures_swiftness.enabled&!var.natures_swiftness_up&(var.tank_emergency|var.player_low|group.lowest.health.pct<config.emergency_hp)

  defensives:
    - astral_shift,range_check=none,if=player.health.pct<config.astral_shift_hp&!buff.astral_shift.up
    - earth_elemental,range_check=none,if=talent.earth_elemental.enabled&player.health.pct<config.astral_shift_hp&!cooldown.astral_shift.ready

  interrupts:
    - wind_shear,interrupt=true,if=target.incoming_cast.kickable.ready

  dispels:
    - purify_spirit,cycle=members,if=config.auto_dispel&cycle.dispelable.purify_spirit&cycle.range<=40
    - cleanse_spirit,cycle=members,if=config.auto_dispel&cycle.dispelable.cleanse_spirit&cycle.range<=40
    - poison_cleansing_totem,range_check=none,if=config.auto_dispel&talent.poison_cleansing_totem.enabled&group.count(cycle.dispelable.cleanse_spirit)>=2&cooldown.poison_cleansing_totem.ready

  utility:
    - wind_rush_totem,range_check=none,if=talent.wind_rush_totem.enabled&cooldown.wind_rush_totem.ready&movement.active
    - capacitor_totem,range_check=none,if=talent.capacitor_totem.enabled&cooldown.capacitor_totem.ready&group.enemies>=2

  major_cooldowns:
    # Spirit Link Totem — redistribute health + 10% DR when group critically low
    - spirit_link_totem,interrupt=true,range_check=none,if=player.combat&!player.channeling&var.spirit_link_ready
    # Healing Tide Totem — powerful group HoT when multiple damaged
    - healing_tide_totem,interrupt=true,range_check=none,if=player.combat&!player.channeling&var.healing_tide_ready&!totem.healing_tide_totem.up
    # Ascendance — instant group heal burst
    - ascendance,interrupt=true,range_check=none,if=player.combat&!player.channeling&var.ascendance_ready
    # Ancestral Guidance — converts damage to group healing
    - ancestral_guidance,interrupt=true,range_check=none,if=player.combat&!player.channeling&var.ancestral_guidance_ready
    # Earthen Wall Totem — absorb shield on clustered group
    - earthen_wall_totem,interrupt=true,range_check=none,if=talent.earthen_wall_totem.enabled&player.combat&!player.channeling&cooldown.earthen_wall_totem.ready&var.group_heavy_damage&!var.earthen_wall_up
    # Mana Tide Totem — mana recovery when critically low
    - mana_tide_totem,interrupt=true,range_check=none,if=talent.mana_tide_totem.enabled&player.combat&!player.channeling&cooldown.mana_tide_totem.ready&var.mana_low

  trinkets:
    - trinket_1,range_check=none,if=player.combat&trinket_1.sync
    - trinket_2,range_check=none,if=player.combat&trinket_2.sync

  totems:
    # Surging Totem — keep active at all times if talented
    - surging_totem,range_check=none,if=talent.surging_totem.enabled&!var.surging_totem_up&cooldown.surging_totem.ready
    # Healing Stream Totem — keep on cooldown always (both builds)
    - healing_stream_totem,range_check=none,if=!var.healing_stream_up&cooldown.healing_stream_totem.ready
    # Earth Shield on tank — maintain if talented
    - earth_shield,target=tank1,if=talent.earth_shield.enabled&config.earth_shield_target=1&!tank1.buff.974.up&tank1.range<=40
    - earth_shield,target=tank2,if=talent.earth_shield.enabled&config.earth_shield_target=2&!tank2.buff.974.up&tank2.range<=40
    - earth_shield,target=tank3,if=talent.earth_shield.enabled&config.earth_shield_target=3&!tank3.buff.974.up&tank3.range<=40
    - earth_shield.player,range_check=none,if=talent.earth_shield.enabled&talent.elemental_orbit.enabled&!buff.383648.up

  healing:
    # Mouseover healing — fires first if UI enabled; targets mouseover/focus
    - riptide.focus_mouseover,range_check=mouseover,if=config.mouseover_healing&mouseover.buff.riptide.down&mouseover.health.pct<=100
    - unleash_life.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100&cooldown.unleash_life.ready
    - healing_wave.focus_mouseover,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100
    # 0. Swiftness on cooldown — fires before everything if UI option enabled
    - ancestral_swiftness,interrupt=true,range_check=none,if=config.swiftness_on_cooldown&talent.ancestral_swiftness.enabled&!var.ancestral_swiftness_up&cooldown.ancestral_swiftness.ready
    - natures_swiftness,interrupt=true,range_check=none,if=config.swiftness_on_cooldown&talent.natures_swiftness.enabled&!var.natures_swiftness_up&cooldown.natures_swiftness.ready
    # 1. Unleash Life — top priority; on cooldown, empowers next heal (Chain Heal / Healing Wave)
    - unleash_life,interrupt=true,target=lowest,if=cooldown.unleash_life.ready&group.lowest.range<=40
    # 2. Riptide — cycle members missing it; dump on lowest if overcapping charges
    - riptide,cycle=members,if=cycle.buff.riptide.down&cycle.range<=40
    - riptide,target=lowest,if=var.riptide_overcap&group.lowest.range<=40
    # 3. Healing Rain — on cooldown when group needs healing (Totemic)
    - healing_rain,range_check=none,if=talent.healing_rain.enabled&cooldown.healing_rain.ready&group.count(cycle.health.effective.pct<config.healing_rain_hp)>=config.healing_rain_count
    # 4. Downpour — before Surging Totem expires to maximize value; then on group damage
    - downpour,range_check=none,if=talent.downpour.enabled&cooldown.downpour.ready&var.surging_totem_expires_soon
    - downpour,range_check=none,if=talent.downpour.enabled&cooldown.downpour.ready&var.group_heavy_damage
    # 5. Primordial Wave — spread Riptide and buff Chain Heal
    - primordial_wave,target=lowest,if=talent.primordial_wave.enabled&cooldown.primordial_wave.ready&group.lowest.range<=40
    # 6. Chain Heal — AoE filler when multiple targets need healing; prefer after Unleash Life
    - chain_heal,target=lowest,if=var.group_heavy_damage&var.unleash_life_up&group.lowest.range<=40
    - chain_heal,target=lowest,if=var.group_heavy_damage&group.lowest.range<=40
    # 7. Healing Wave — heal absorb emergency first, then raw HP fallback
    - healing_wave,interrupt=true,cycle=members,if=cycle.heal_absorb.pct>0&cycle.range<=40
    - healing_wave,cycle=members,if=cycle.health.pct<93&cycle.range<=40

  damage_mythic_plus:
    - flame_shock,if=debuff.flame_shock.down
    - lava_burst,if=cooldown.lava_burst.charges>=1&debuff.flame_shock.remains>2
    - chain_lightning,ignore_queue=true,if=active_enemies>=3&var.mana_ok
    - lightning_bolt,ignore_queue=true,if=var.mana_ok

  damage_raid:
    # Raid — only free Lava Surge procs, never sacrifice a healing GCD
    - lava_burst,if=var.lava_surge_up

  movement:
    # Instant casts available while moving
    - riptide,target=lowest,if=group.lowest.health.pct<config.riptide_hp&group.lowest.range<=40
    - unleash_life,target=lowest,if=cooldown.unleash_life.ready&group.lowest.range<=40
    - flame_shock,if=debuff.flame_shock.down
    - lava_burst,if=var.lava_surge_up

  main:
    # shared calls
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target_ranged

    # Interrupts — always available, before OOC check
    - call_action_list,name=interrupts

    # Out of combat — maintain HoTs only on hurt targets, then hard stop
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat

    # Defensives
    - call_action_list,name=defensives

    # Emergency healing — highest priority in combat, fires before everything else
    - call_action_list,name=emergency_healing

    # Dispels — handle debuffs promptly
    - call_action_list,name=dispels,if=player.combat

    # Major cooldowns — gated by state.cds
    - call_action_list,name=major_cooldowns,if=player.combat&state.cds

    # Trinkets
    - call_action_list,name=trinkets,if=player.combat

    # Totem maintenance — Surging Totem, Healing Stream Totem, Earth Shield
    - call_action_list,name=totems,if=player.combat

    # Movement — instant casts while moving in combat
    - call_action_list,name=movement,if=player.combat&player.moving

    # Utility — Wind Rush, Capacitor Totem
    - call_action_list,name=utility,if=player.combat

    # Healing priority rotation
    - call_action_list,name=healing,if=player.combat

    # DPS contribution — only when group is healthy
    - call_action_list,name=damage_mythic_plus,if=player.combat&var.mythic_plus&group.lowest.health.pct>=config.dps_threshold
    - call_action_list,name=damage_raid,if=player.combat&var.raid&group.lowest.health.pct>=config.dps_threshold
