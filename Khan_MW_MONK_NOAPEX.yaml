version: "1.0.2"
spec: 270
name: "MW Monk No Apex M+"
description: "M+ No-Apex build."
author: "Khan"
date: "2026-04-16"
patch: "12.0.1"
movement_allowed: true

config:
  aoe_threshold:
    section: "Profile v1.0.2 No-Apex M+"
    type: slider
    label: "SCK Threshold (enemies in 8y)"
    min: 1
    max: 10
    default: 3
  renm_mob_threshold:
    section: "Melee Weave"
    type: slider
    label: "RenM Use Below Target Count"
    min: 1
    max: 30
    default: 3
  cooldown_threshold:
    section: "Cooldowns"
    type: slider
    label: "Chi-Ji CD Threshold - group HP%"
    min: 1
    max: 100
    default: 75
  celestial_conduit_threshold:
    section: "Cooldowns"
    type: slider
    label: "Celestial Conduit Threshold - group HP%"
    min: 1
    max: 100
    default: 50
  auto_celestials:
    section: "Cooldowns"
    type: checkbox
    label: "Auto-use Celestial CDs (uncheck for manual timing)"
    value: true
  use_life_cocoon:
    section: "Cooldowns"
    type: checkbox
    label: "Enable Life Cocoon"
    value: true
  life_cocoon_threshold:
    section: "Cooldowns"
    type: slider
    label: "Life Cocoon HP% Threshold"
    min: 1
    max: 100
    default: 55
  melee_weave_hp:
    section: "Melee Weave"
    type: slider
    label: "Melee Weave Above HP%"
    min: 1
    max: 100
    default: 65
  ancient_teachings_hp:
    section: "Melee Weave"
    type: slider
    label: "TP/BoK Ancient Teachings HP% (2+ members below)"
    min: 1
    max: 100
    default: 93
  vv_proc_hp:
    section: "Melee Weave"
    type: slider
    label: "Instant Sheiluns Gift HP%"
    min: 1
    max: 100
    default: 70
  fortifying_brew_hp:
    section: "Defensives"
    type: slider
    label: "Fortifying Brew HP% Threshold"
    min: 1
    max: 99
    default: 60

variables:
  is_cotc: talent.celestial_conduit
  hotjs_active: buff.heart_of_the_jade_serpent.up
  chiji_active: buff.invoke_chiji_the_red_crane.up
  zen_pulse_ready: buff.zen_pulse.stack>=2
  spiritfont_ready: buff.spiritfont.stack>=2
  sox_proc: buff.strength_of_the_black_ox.up
  vivacious_up: buff.vivacious_vivification.up
  dance_of_chiji: buff.dance_of_chiji.up
  has_rwk: talent.rushing_wind_kick
  has_focused_thunder: talent.focused_thunder
  has_pool_of_mists: talent.pool_of_mists
  has_spiritfont: talent.spiritfont
  has_sheiluns_gift: talent.sheiluns_gift
  has_veil_of_pride: talent.veil_of_pride
  has_endless_draught: talent.endless_draught
  has_refreshment: talent.refreshment
  renm_capped: cooldown.renewing_mist.charges>=3
  renm_has_charge: cooldown.renewing_mist.charges>=1
  rsk_ready: cooldown.rising_sun_kick.ready
  rwk_ready: cooldown.rushing_wind_kick.ready
  tft_ready: cooldown.thunder_focus_tea.ready
  tft_capped: cooldown.thunder_focus_tea.charges=cooldown.thunder_focus_tea.max_charges
  melee_weave_ok: group.lowest.health.effective.pct>=config.melee_weave_hp
  group_needs_at: group.count(cycle.health.effective.pct<config.ancient_teachings_hp)>=2
  renm_ok: enemies.combat.8y<config.renm_mob_threshold&group.lowest.health.effective.pct<config.melee_weave_hp
  group_critical: group.lowest.health.effective.pct<50
  group_needs_cd: group.lowest.health.effective.pct<config.cooldown_threshold
  group_needs_conduit: group.lowest.health.effective.pct<config.celestial_conduit_threshold

lists:

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=auto_heal,if=player.combat
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat
    - touch_of_death,if=target.exists&target.enemy&target.range<=5&target.health.current<player.health.max&cooldown.touch_of_death.ready
    - call_action_list,name=soothing_mist_channel,if=buff.soothing_mist.up
    - call_action_list,name=defensives
    - leg_sweep,if=interrupt.stun.aoe.check
    - quaking_palm,if=interrupt.cc.check
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.health.effective.pct<config.vv_proc_hp&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.health.effective.pct<config.vv_proc_hp&group.lowest.range<=40
    - life_cocoon.focus,range_check=focus,interrupt=true,if=config.use_life_cocoon&focus.exists&focus.alive&focus.friendly&focus.health.effective.pct<config.life_cocoon_threshold&focus.range<=40&player.combat&cooldown.life_cocoon.ready
    - spinning_crane_kick,if=var.dance_of_chiji&target.exists&target.enemy&target.range<=8
    - rushing_wind_kick,if=var.has_rwk&buff.thunder_focus_tea.up&target.exists&target.enemy&target.range<=5
    - rising_sun_kick
    - call_action_list,name=emergency_heal
    - call_action_list,name=cooldowns,if=state.cds
    - thunder_focus_tea,range_check=none,if=var.tft_ready
    - rushing_wind_kick
    - call_action_list,name=noapex_mplus
    - call_action_list,name=tank_heal
    - call_action_list,name=healer_heal
    - call_action_list,name=dps_noapex,if=var.melee_weave_ok

  out_of_combat:
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&var.vivacious_up&group.lowest.health.effective.pct<100&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&var.vivacious_up&group.lowest.health.effective.pct<100&group.lowest.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.effective.pct<100&group.lowest.range<=40&!player.moving
    - vivify,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.effective.pct<100&group.lowest.range<=40&!player.moving
  soothing_mist_channel:
    - vivify,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.effective.pct<25&group.lowest.range<=40
    - sheiluns_gift,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.effective.pct<25&group.lowest.range<=40
    - enveloping_mist,casting_check=soothing_mist,ignore_usable=true,cycle=members,if=!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.melee_weave_hp&cycle.range<=40
    - vivify,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.effective.pct<config.melee_weave_hp&group.lowest.range<=40
    - sheiluns_gift,casting_check=soothing_mist,ignore_usable=true,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.effective.pct<config.melee_weave_hp&group.lowest.range<=40

  defensives:
    - fortifying_brew,range_check=none,if=health.pct<=config.fortifying_brew_hp&cooldown.fortifying_brew.ready

  emergency_heal:
    - revival,interrupt=true,if=!talent.restoral&cooldown.revival.ready&group.lowest.range<=40&(group.count(cycle.health.effective.pct<35)>=3|(group.tanks.lowest.health.effective.pct<15&cooldown.life_cocoon.down))
    - restoral,if=talent.restoral&cooldown.restoral.ready&group.lowest.range<=40&(group.count(cycle.health.effective.pct<40)>=3|(group.tanks.lowest.health.effective.pct<15&cooldown.life_cocoon.down))
    - soothing_mist,cycle=members,if=!buff.soothing_mist.up&group.count(cycle.health.effective.pct<config.melee_weave_hp)=1&cycle.health.effective.pct<40&cycle.range<=40

  tank_heal:
    - vivify,target=tanks.lowest,if=!var.has_sheiluns_gift&group.tanks.lowest.health.effective.pct<config.melee_weave_hp&group.tanks.lowest.range<=40&var.vivacious_up
    - sheiluns_gift,target=tanks.lowest,if=var.has_sheiluns_gift&group.tanks.lowest.health.effective.pct<config.melee_weave_hp&group.tanks.lowest.range<=40&var.vivacious_up

  healer_heal:
    - vivify,target=healers.lowest,if=!var.has_sheiluns_gift&group.healers.lowest.health.effective.pct<config.melee_weave_hp&group.healers.lowest.range<=40&var.vivacious_up
    - sheiluns_gift,target=healers.lowest,if=var.has_sheiluns_gift&group.healers.lowest.health.effective.pct<config.melee_weave_hp&group.healers.lowest.range<=40&var.vivacious_up

  cooldowns:
    - trinket_1,if=trinket_1.usable&trinket_1.ready
    - trinket_2,if=trinket_2.usable&trinket_2.ready

  noapex_mplus:
    - call_action_list,name=noapex_chiji,if=var.chiji_active
    - call_action_list,name=noapex_hotjs,if=var.hotjs_active
    - renewing_mist,cycle=members,if=!buff.thunder_focus_tea.up&var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_ok
    - renewing_mist,if=!buff.thunder_focus_tea.up&var.renm_capped&var.renm_ok
    - invoke_chiji_the_red_crane,interrupt=true,if=state.cds&config.auto_celestials&cooldown.invoke_chiji_the_red_crane.ready&var.group_needs_cd&group.lowest.range<=40
    - celestial_conduit,interrupt=true,if=state.cds&config.auto_celestials&cooldown.celestial_conduit.ready&var.group_needs_conduit&group.lowest.range<=40
    - mana_tea,range_check=none,if=buff.mana_tea.stack>=2&mana.pct<98&group.lowest.health.effective.pct>85&!buff.soothing_mist.up
    - mana_tea,range_check=none,if=buff.mana_tea.stack>=1&buff.mana_tea.stack<=3&!buff.soothing_mist.up
    - blackout_kick,if=buff.teachings_of_the_monastery.stack>=2&target.range<=5
    - tiger_palm,if=var.group_needs_at&target.exists&target.enemy&target.range<=5
    - spinning_crane_kick,if=var.melee_weave_ok&target.exists&target.enemy&enemies.combat.8y>=config.aoe_threshold
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.effective.pct<config.melee_weave_hp&group.lowest.range<=40
    - vivify,target=lowest,if=!var.has_sheiluns_gift&group.lowest.health.effective.pct<config.melee_weave_hp&group.lowest.range<=40
    - renewing_mist,cycle=members,if=!buff.thunder_focus_tea.up&!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge&var.renm_ok
    - tiger_palm,if=target.exists&target.enemy&target.range<=5

  noapex_chiji:
    - enveloping_mist,cycle=members,if=!buff.thunder_focus_tea.up&!cycle.buff.enveloping_mist.up&cycle.health.effective.pct<config.melee_weave_hp&cycle.range<=40
    - sheiluns_gift,target=lowest,if=var.has_sheiluns_gift&group.lowest.health.effective.pct<config.melee_weave_hp&group.lowest.range<=40
    - tiger_palm,if=target.exists&target.enemy&target.range<=5

  noapex_hotjs:
    - renewing_mist,cycle=members,if=!buff.thunder_focus_tea.up&var.renm_capped&!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_ok
    - renewing_mist,if=!buff.thunder_focus_tea.up&var.renm_capped&var.renm_ok
    - thunder_focus_tea,range_check=none,if=var.tft_ready
    - renewing_mist,cycle=members,if=!buff.thunder_focus_tea.up&!cycle.buff.renewing_mist.up&cycle.range<=40&var.renm_has_charge&var.renm_ok

  dps_noapex:
    - call_action_list,name=dps_noapex_hotjs,if=var.hotjs_active
    - spinning_crane_kick,if=var.dance_of_chiji&target.exists&target.enemy
    - spinning_crane_kick,if=target.exists&target.enemy&enemies.combat.8y>=config.aoe_threshold

  dps_noapex_hotjs:
    - thunder_focus_tea,range_check=none,if=var.tft_ready
