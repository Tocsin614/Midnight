version: "2.1.8"
author: Khan
spec: 264
name: Khan Resto Shaman
movement_allowed: true
description: |
  Restoration Shaman | Midnight 12.0
  Spell priority built from WarcraftLogs top healer data. New method
entry: main
config:
  mouseover_healing:
    section: "Healing v2.1.8"
    label: "Mouseover Healing"
    type: checkbox
    default: true
  riptide_threshold:
    section: "Healing"
    label: "Riptide HP %"
    type: slider
    min: 70
    max: 100
    default: 92
  chain_heal_threshold:
    section: "Healing"
    label: "Chain Heal HP %"
    type: slider
    min: 60
    max: 95
    default: 85
  chain_heal_members:
    section: "Healing"
    label: "Chain Heal - Min Injured Members"
    type: slider
    min: 2
    max: 5
    default: 3
  healing_wave_threshold:
    section: "Healing"
    label: "Healing Wave HP %"
    type: slider
    min: 50
    max: 95
    default: 90
  healing_rain_members:
    section: "Healing"
    label: "Healing Rain - Min Injured Members"
    type: slider
    min: 2
    max: 5
    default: 3
  healing_tide_members:
    section: "Cooldowns"
    label: "Healing Tide - Min Injured Members"
    type: slider
    min: 1
    max: 5
    default: 3
  spirit_link_threshold:
    section: "Cooldowns"
    label: "Spirit Link HP %"
    type: slider
    min: 20
    max: 50
    default: 40
  astral_shift_hp:
    section: "Defensives"
    label: "Astral Shift HP %"
    type: slider
    min: 10
    max: 60
    default: 35
  earth_shield_tanks:
    section: "Healing"
    label: "Earth Shield on Tanks"
    type: checkbox
    default: true
  swiftness_on_cooldown:
    section: "Healing"
    label: "Nature's Swiftness On Cooldown"
    type: checkbox
    default: true
  dps_threshold:
    section: "Damage"
    label: "DPS Filler - Group HP % Minimum"
    type: slider
    min: 50
    max: 100
    default: 85
variables:
  has_absorbs: group.count(cycle.heal_absorb.pct>0)>=1
  needs_member_healing: group.lowest.health.pct<config.riptide_threshold
  group_needs_healing: group.count(cycle.health.pct<85)>=2
  group_emergency: group.count(cycle.health.pct<50)>=2
  group_critical: group.count(cycle.health.pct<30)>=1
  unleash_life_up: buff.unleash_life.up
  natures_swiftness_up: buff.natures_swiftness.up
  ancestral_swiftness_up: buff.ancestral_swiftness.up
  lava_surge_up: buff.lava_surge.up
  surging_totem_up: totem.surging_totem.up
  surging_totem_expires_soon: totem.surging_totem.up&totem.surging_totem.remains<8
  stormstream_up: totem.stormstream_totem.up
  healing_stream_up: totem.healing_stream_totem.up
  healing_tide_ready: cooldown.healing_tide_totem.ready&group.count(cycle.health.pct<config.healing_wave_threshold)>=config.healing_tide_members
  spirit_link_ready: cooldown.spirit_link_totem.ready&group.lowest.health.pct<config.spirit_link_threshold
  ascendance_ready: cooldown.ascendance.ready&talent.ascendance.enabled&var.group_needs_healing
  ancestors_ready: cooldown.call_of_the_ancestors.ready&talent.call_of_the_ancestors.enabled&var.group_needs_healing
  riptide_overcap: cooldown.riptide.charges>=2
  mo_friendly_valid: mouseover.exists&mouseover.alive&mouseover.friendly
  racial_defensive_hp: 50
  racial_emergency_hp: 35
  racial_heal_ally_hp: 65
lists:
  out_of_combat:
    - water_shield,range_check=none,if=!buff.water_shield.up
    - skyfury,range_check=none,if=!buff.skyfury.up
    - earthliving_weapon,range_check=none,if=!mainhand.enchant.up
    - ghost_wolf,range_check=none,if=player.moving&!buff.ghost_wolf.up&cooldown.riptide.charges<2
    - earth_shield,cycle=tanks,if=talent.earth_shield.enabled&config.earth_shield_tanks&cycle.buff.earth_shield.down&cycle.range>0&cycle.range<=40
    - earth_shield.player,range_check=none,if=talent.earth_shield.enabled&talent.elemental_orbit.enabled&!buff.earth_shield.up
    - riptide,cycle=members,if=cycle.buff.riptide.down
    - healing_wave,cycle=members,if=cycle.health.pct<70
    - chain_heal,cycle=members,if=cycle.health.pct<55
  emergency:
    - astral_shift,range_check=none,if=player.health.pct<config.astral_shift_hp&!buff.astral_shift.up
    - earth_elemental,range_check=none,if=talent.earth_elemental.enabled&player.health.pct<config.astral_shift_hp&!cooldown.astral_shift.ready
    - spirit_link_totem,interrupt=true,range_check=none,if=var.group_critical&var.spirit_link_ready&!player.moving.time>3
    - ancestral_swiftness,interrupt=true,range_check=none,if=talent.ancestral_swiftness.enabled&!var.ancestral_swiftness_up&group.lowest.health.pct<config.astral_shift_hp
    - natures_swiftness,interrupt=true,range_check=none,if=talent.natures_swiftness.enabled&!var.natures_swiftness_up&group.lowest.health.pct<config.astral_shift_hp
    - healing_surge,interrupt=true,cycle=members,if=(var.natures_swiftness_up|var.ancestral_swiftness_up)&cycle.health.pct<config.astral_shift_hp
    - healing_surge,interrupt=true,cycle=members,if=cycle.health.pct<25
    - riptide,interrupt=true,cycle=members,if=cycle.health.pct<35&var.riptide_overcap
  major_cooldowns:
    - bloodlust,range_check=none,if=var.group_emergency&cooldown.bloodlust.ready
    - healing_tide_totem,interrupt=true,range_check=none,if=var.healing_tide_ready
    - ascendance,interrupt=true,range_check=none,if=var.ascendance_ready
    - call_of_the_ancestors,interrupt=true,range_check=none,if=var.ancestors_ready
    - ancestral_guidance,interrupt=true,range_check=none,if=talent.ancestral_guidance.enabled&cooldown.ancestral_guidance.ready&var.group_needs_healing
    - earthen_wall_totem,interrupt=true,range_check=none,if=talent.earthen_wall_totem.enabled&cooldown.earthen_wall_totem.ready&var.group_needs_healing
    - mana_tide_totem,interrupt=true,range_check=none,if=talent.mana_tide_totem.enabled&cooldown.mana_tide_totem.ready&player.mana.pct<25
    - spirit_link_totem,interrupt=true,range_check=none,if=var.spirit_link_ready&var.group_emergency&!player.moving.time>3
    - wind_rush_totem,range_check=none,if=talent.wind_rush_totem.enabled&cooldown.wind_rush_totem.ready&player.moving.time>3
  totem_maintenance:
    - surging_totem,range_check=none,if=talent.surging_totem.enabled&!var.surging_totem_up
    - stormstream_totem,range_check=none,if=!var.stormstream_up&cooldown.stormstream_totem.ready
    - healing_stream_totem,range_check=none,if=!var.healing_stream_up&!player.moving.time>3.time>3
    - earth_shield,cycle=tanks,if=talent.earth_shield.enabled&config.earth_shield_tanks&cycle.buff.earth_shield.down&cycle.range>0&cycle.range<=40
    - earth_shield.player,range_check=none,if=talent.earth_shield.enabled&talent.elemental_orbit.enabled&!buff.earth_shield.up
  member_healing:
    - unleash_life.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100&cooldown.unleash_life.ready
    - riptide.focus_mouseover,range_check=mouseover,if=config.mouseover_healing&mouseover.buff.riptide.down
    - healing_wave.focus_mouseover,interrupt=true,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=100
    - chain_heal.focus_mouseover,range_check=mouseover,if=config.mouseover_healing&mouseover.health.pct<=config.chain_heal_threshold
    - riptide,interrupt=true,cycle=members,if=cycle.heal_absorb.pct>0&var.riptide_overcap
    - chain_heal,cycle=members,if=cycle.heal_absorb.pct>0&group.count(cycle.heal_absorb.pct>0)>=2
    - healing_wave,interrupt=true,cycle=members,if=cycle.heal_absorb.pct>0
    - natures_swiftness,interrupt=true,range_check=none,if=config.swiftness_on_cooldown&talent.natures_swiftness.enabled&!var.natures_swiftness_up&cooldown.natures_swiftness.ready
    - ancestral_swiftness,interrupt=true,range_check=none,if=config.swiftness_on_cooldown&talent.ancestral_swiftness.enabled&!var.ancestral_swiftness_up&cooldown.ancestral_swiftness.ready
    - unleash_life,interrupt=true,target=lowest,if=cooldown.unleash_life.ready
    - riptide,cycle=members,if=cycle.buff.riptide.down&cycle.health.pct<config.riptide_threshold
    - riptide,target=lowest,if=var.riptide_overcap
    - healing_rain,range_check=none,if=talent.healing_rain.enabled&cooldown.healing_rain.ready&group.count(cycle.health.pct<90)>=config.healing_rain_members
    - downpour,range_check=none,if=talent.downpour.enabled&cooldown.downpour.ready&var.surging_totem_expires_soon
    - downpour,range_check=none,if=talent.downpour.enabled&cooldown.downpour.ready&var.group_needs_healing
    - primordial_wave,target=lowest,if=talent.primordial_wave.enabled&cooldown.primordial_wave.ready
    - chain_heal,target=lowest,if=group.count(cycle.health.pct<config.chain_heal_threshold)>=config.chain_heal_members&var.unleash_life_up
    - chain_heal,target=lowest,if=group.count(cycle.health.pct<config.chain_heal_threshold)>=config.chain_heal_members
    - spouting_spirits,interrupt=true,range_check=none,if=talent.spouting_spirits.enabled&cooldown.spouting_spirits.ready&var.group_needs_healing
    - restorative_mists,cycle=members,if=talent.restorative_mists.enabled&cycle.health.pct<config.healing_wave_threshold
    - healing_wave,cycle=members,if=(var.natures_swiftness_up|var.ancestral_swiftness_up)&cycle.health.pct<config.healing_wave_threshold
    - healing_wave,cycle=members,if=var.unleash_life_up&cycle.health.pct<config.healing_wave_threshold
    - healing_wave,cycle=members,if=cycle.health.pct<config.healing_wave_threshold
  mouseover_friendly:
    - riptide.mouseover,if=config.mouseover_healing&mouseover.buff.riptide.down&cooldown.riptide.charges>=1
    - chain_heal.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.chain_heal_threshold
    - healing_wave.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.healing_wave_threshold
    - unleash_life.mouseover,if=config.mouseover_healing&mouseover.health.pct<config.healing_wave_threshold&cooldown.unleash_life.ready
  moving:
    - spiritwalkers_grace,interrupt=true,range_check=none,if=!buff.spiritwalkers_grace.up&var.needs_member_healing
    - riptide,target=lowest,if=group.lowest.health.pct<config.riptide_threshold
    - riptide,cycle=members,if=cycle.buff.riptide.down&cycle.health.pct<config.riptide_threshold
    - unleash_life,interrupt=true,target=lowest,if=cooldown.unleash_life.ready
    - surging_totem,range_check=none,if=talent.surging_totem.enabled&!var.surging_totem_up
    - stormstream_totem,range_check=none,if=!var.stormstream_up&cooldown.stormstream_totem.ready
    - lava_burst,if=var.lava_surge_up
  dps_filler:
    - flame_shock,if=!dot.flame_shock.ticking&target.valid&target.enemy
    - lava_burst,if=dot.flame_shock.ticking&cooldown.lava_burst.charges>=1
    - lava_burst,if=var.lava_surge_up
    - chain_lightning,if=active_enemies>=3
    - lightning_bolt,if=active_enemies<3
  racial_defensive:
    - gift_of_the_naaru,if=player.health.pct<var.racial_emergency_hp
    - regeneratin,if=player.health.pct<var.racial_emergency_hp&!player.combat
    - stoneform,if=player.health.pct<var.racial_defensive_hp
    - fireblood,if=player.health.pct<var.racial_defensive_hp
  racial_offensive:
    - berserking,if=var.group_needs_healing
    - blood_fury,if=var.group_needs_healing
    - ancestral_call,if=var.group_needs_healing
    - fireblood,if=var.group_needs_healing
  racial_utility:
    - arcane_torrent,if=player.mana.pct<=90
    - gift_of_the_naaru,target=lowest,if=group.lowest.health.pct<var.racial_heal_ally_hp
    - bag_of_tricks,target=lowest,if=group.lowest.health.pct<var.racial_heal_ally_hp
    - shadowmeld,if=target.threat>=3&!player.casting
  trinkets:
    - trinket_1,if=trinket_1.sync&(var.group_needs_healing|var.group_emergency)
    - trinket_2,if=trinket_2.sync&(var.group_needs_healing|var.group_emergency)
    - trinket_1,if=trinket_1.ready&var.group_emergency
    - trinket_2,if=trinket_2.ready&var.group_emergency
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target_ranged
    # Devouring Rift (440313) — temp mechanic line, remove/comment when Simia adds support
    # 3+ affected: drop totem for AoE cleanse; 1-2 affected: single-target Purify Spirit (8s CD covers up to 2)
    - poison_cleansing_totem,range_check=none,interrupt=true,if=group.count(cycle.debuff.spell_440313.up)>=3&!totem.poison_cleansing_totem.up
    - purify_spirit,cycle=members,interrupt=true,if=group.count(cycle.debuff.spell_440313.up)>=1&group.count(cycle.debuff.spell_440313.up)<3&cycle.debuff.spell_440313.up&cycle.range<=40
    - wind_shear,if=interrupt.target.check
    - wind_shear.mouseover,if=interrupt.mouseover.check
    - capacitor_totem,range_check=none,if=interrupt.stun.aoe.check&!player.moving.time>3
    - call_action_list,name=auto_heal,if=player.combat
    - call_action_list,name=out_of_combat,if=!player.combat
    - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
    - return,if=!player.combat&config.auto_combat.has(0)
    - return,if=player.channeling
    - call_action_list,name=emergency
    - call_action_list,name=major_cooldowns
    - call_action_list,name=racial_defensive
    - return,if=player.cc
    - call_action_list,name=totem_maintenance
    - call_action_list,name=racial_offensive,if=var.group_needs_healing
    - call_action_list,name=moving,if=player.moving
    - call_action_list,name=mouseover_friendly,if=var.mo_friendly_valid&!player.casting
    - call_action_list,name=racial_utility
    - call_action_list,name=trinkets
    - call_action_list,name=member_healing,if=var.needs_member_healing|var.has_absorbs
    - call_action_list,name=dps_filler,if=group.lowest.health.pct>=config.dps_threshold&!(config.mouseover_healing&var.mo_friendly_valid)
